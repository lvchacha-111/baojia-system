<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作业流程 - 报价系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5; min-height: 100vh;
        }

        .bg-gradient {
            position: fixed; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(34,197,94,0.05) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(99,102,241,0.03) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        .header {
            position: relative; z-index: 1;
            background: #fff; border-bottom: 1px solid #eee;
            padding: 0 32px; height: 56px;
            display: flex; align-items: center; gap: 16px;
        }

        .btn-back {
            font-size: 13px; color: #666;
            background: none; border: none; cursor: pointer;
            padding: 6px 0; text-decoration: none;
        }
        .btn-back:hover { color: #1a1a1a; }

        .header-title { font-size: 16px; font-weight: 600; color: #1a1a1a; }

        .main {
            position: relative; z-index: 1;
            max-width: 800px; margin: 0 auto; padding: 32px;
        }

        .page-title {
            font-size: 24px; font-weight: 600; color: #1a1a1a;
            margin-bottom: 20px;
        }

        .search-box {
            position: relative; margin-bottom: 28px;
        }
        .search-box input {
            width: 100%; height: 44px;
            border: 1px solid #ddd; border-radius: 10px;
            padding: 0 44px 0 16px; font-size: 14px;
            outline: none; transition: border-color 0.15s;
        }
        .search-box input:focus { border-color: #6366f1; }
        .search-box .search-icon {
            position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%);
            width: 18px; height: 18px;
            fill: none; stroke: #ccc; stroke-width: 2;
        }
        .search-box .search-clear {
            display: none; position: absolute; right: 40px; top: 50%;
            transform: translateY(-50%); width: 20px; height: 20px;
            border-radius: 50%; background: #ddd; border: none;
            color: #fff; font-size: 12px; cursor: pointer; line-height: 20px; text-align: center;
        }
        .search-box .search-clear.show { display: block; }

        .no-search-result {
            text-align: center; padding: 40px 0; color: #bbb;
        }

        .customer-group { margin-bottom: 32px; }

        .customer-group-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px; padding-bottom: 8px;
            border-bottom: 2px solid #eee;
        }

        .customer-name { font-size: 18px; font-weight: 600; color: #1a1a1a; }

        .customer-count { font-size: 13px; color: #999; }

        .quote-card {
            background: #fff; border-radius: 10px;
            border: 1px solid #eee;
            padding: 16px 20px; margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quote-card:hover {
            border-color: #ddd;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .quote-card-top {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 10px;
        }

        .quote-number {
            font-size: 13px; font-weight: 600; color: #6366f1;
            letter-spacing: 0.5px;
        }

        .quote-date { font-size: 12px; color: #999; }

        .quote-card-meta {
            font-size: 13px; color: #888;
            display: flex; gap: 20px; margin-bottom: 10px;
        }

        .quote-card-meta span { white-space: nowrap; }

        .progress-wrap {
            display: flex; align-items: center; gap: 10px;
        }

        .progress-bar {
            flex: 1; height: 6px;
            background: #eee; border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%; border-radius: 3px;
            background: #22c55e;
            transition: width 0.4s;
        }

        .progress-pct { font-size: 12px; font-weight: 600; color: #22c55e; min-width: 36px; text-align: right; }

        .state-msg { text-align: center; padding: 60px 0; color: #999; }
        .state-msg h3 { font-size: 18px; color: #666; margin-bottom: 8px; }

        .section-badge {
            font-size: 11px; padding: 3px 8px; border-radius: 4px;
            font-weight: 500;
        }
        .badge-published { background: #eef2ff; color: #6366f1; }

        .status-badge {
            display: inline-block; font-size: 11px; font-weight: 500;
            padding: 2px 8px; border-radius: 4px;
        }
        .status-confirmed { background: #fef3c7; color: #b45309; }
        .status-in_production { background: #eff6ff; color: #2563eb; }
        .status-completed { background: #f0fdf4; color: #16a34a; }

        .payment-tag {
            display: inline-block; font-size: 10px; font-weight: 500;
            padding: 2px 6px; border-radius: 3px;
        }
        .payment-tag.monthly { background: #eff6ff; color: #2563eb; }
        .payment-tag.credit { background: #f3e8ff; color: #7c3aed; }
        .payment-tag.pay_before_ship { background: #fff7ed; color: #c2410c; }
        .payment-tag.prepaid { background: #f0fdf4; color: #16a34a; }

        @media (max-width: 600px) {
            .main { padding: 24px 16px; }
            .header { padding: 0 16px; }
            .modal-container { margin: 20px 10px; padding: 24px 16px; }
            .quote-card-meta { flex-wrap: wrap; gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <header class="header">
        <a href="myorders.html" class="btn-back">← 返回</a>
        <span class="header-title">作业流程</span>
    </header>

    <main class="main">
        <h1 class="page-title">作业流程</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索客户名称...">
            <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <button class="search-clear" id="searchClear">×</button>
        </div>
        <div id="content">
            <div class="state-msg"><p>加载中...</p></div>
        </div>
    </main>

    <script type="module">
        import { auth, db, getCurrentUser } from "./firebase-init.js";
        import { collection, getDocs, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const user = await getCurrentUser();
        if (!user) { window.location.href = 'login.html'; throw new Error('未登录'); }

        const DEFAULT_STEPS = ['作图', '厂内工作', '包装', '发货'];

        let allQuotes = [];
        let clientPoolMap = {}; // name → { paymentMethod, creditLimit, creditUsed }

        async function loadQuotes() {
            const content = document.getElementById('content');
            try {
                // Load client profiles for payment method tags
                const poolSnap = await getDocs(collection(db, 'clientProfiles'));
                clientPoolMap = {};
                poolSnap.forEach(d => {
                    const data = d.data();
                    if (data.name) clientPoolMap[data.name] = { paymentMethod: data.paymentMethod || null, creditLimit: data.creditLimit || null, creditUsed: data.creditUsed || 0 };
                });

                const ref = collection(db, 'users', user.uid, 'quotes');
                const q = query(ref, orderBy('createdAt', 'desc'));
                const snapshot = await getDocs(q);

                allQuotes = [];
                snapshot.forEach(d => {
                    const data = d.data();
                    if (data.status === 'confirmed' || data.status === 'in_production' || data.status === 'completed') {
                        allQuotes.push({ id: d.id, ...data });
                    }
                });

                if (allQuotes.length === 0) {
                    content.innerHTML = '<div class="state-msg"><h3>暂无待处理订单</h3><p>客户确认报价后可在此查看工序</p></div>';
                    return;
                }
                renderQuotes();
            } catch (err) {
                console.error('加载失败:', err);
                content.innerHTML = '<div class="state-msg"><p style="color:#dc2626;">加载失败，请刷新重试</p></div>';
            }
        }

        function calcProgress(proc, status) {
            if (status === 'completed') return 100;
            if (!proc || !proc.steps || proc.steps.length === 0) return 0;
            const total = proc.steps.length;
            const done = proc.steps.filter(s => s.done).length;
            return total > 0 ? Math.round(done / total * 100) : 0;
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function renderQuotes(filterKeyword) {
            const content = document.getElementById('content');
            const kw = (filterKeyword || '').toLowerCase();

            // Filter by keyword
            let filtered = allQuotes;
            if (kw) {
                filtered = allQuotes.filter(q => {
                    const name = (q.customerName || '').toLowerCase();
                    const qnum = (q.quoteNumber || '').toLowerCase();
                    const prod = (q.productName || '').toLowerCase();
                    return name.includes(kw) || qnum.includes(kw) || prod.includes(kw);
                });
            }

            if (filtered.length === 0) {
                content.innerHTML = kw
                    ? '<div class="no-search-result"><p>未找到匹配的结果</p></div>'
                    : '<div class="state-msg"><h3>暂无待处理订单</h3><p>客户确认报价后可在此查看工序</p></div>';
                return;
            }

            const groups = {};
            filtered.forEach(q => {
                const name = q.customerName || '未命名客户';
                if (!groups[name]) groups[name] = [];
                groups[name].push(q);
            });

            let html = '';
            for (const [name, quotes] of Object.entries(groups)) {
                html += '<div class="customer-group">';
                html += '<div class="customer-group-header">';
                html += '<span class="customer-name">' + esc(name) + '</span>';
                html += '<span class="customer-count">' + quotes.length + ' 条订单</span>';
                html += '</div>';

                quotes.forEach(q => {
                    const date = q.createdAt ? new Date(q.createdAt.seconds * 1000).toLocaleDateString('zh-CN') : '-';
                    const pct = calcProgress(q.process, q.status);

                    html += '<div class="quote-card" data-qid="' + q.id + '">';
                    html += '<div class="quote-card-top">';
                    html += '<span class="quote-number">' + esc(q.quoteNumber || '-') + '</span>';
                    html += '<span style="display:flex;align-items:center;gap:8px">';
                    const statusLabels = { confirmed:'已确认', in_production:'生产中', completed:'已完成' };
                    const s = q.status || 'confirmed';
                    html += '<span class="status-badge status-' + s + '">' + (statusLabels[s] || '已确认') + '</span>';
                    if (q.processPublished) html += '<span class="section-badge badge-published">已发布</span>';
                    // Payment method tag
                    const poolInfo = clientPoolMap[q.customerName];
                    if (poolInfo && poolInfo.paymentMethod) {
                        const pmLabels = { monthly: '月付', credit: '信用额度', pay_before_ship: '款到发货', prepaid: '预付款' };
                        html += '<span class="payment-tag ' + poolInfo.paymentMethod + '">' + (pmLabels[poolInfo.paymentMethod] || poolInfo.paymentMethod) + '</span>';
                    }
                    html += '<span class="quote-date">' + date + '</span></span>';
                    html += '</div>';
                    html += '<div class="quote-card-meta">';
                    html += '<span>客户：' + esc(q.customerName || '-') + '</span>';
                    html += '<span>产品：' + esc(q.productName || '-') + '</span>';
                    html += '<span>喷漆：' + esc(q.paint || '-') + '</span>';
                    html += '</div>';
                    html += '<div class="progress-wrap">';
                    html += '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
                    html += '<span class="progress-pct">' + pct + '%</span>';
                    html += '</div>';
                    html += '</div>';
                });
                html += '</div>';
            }

            content.innerHTML = html;

            content.querySelectorAll('.quote-card').forEach(card => {
                card.addEventListener('click', function() {
                    window.location.href = 'factory-detail.html?id=' + this.dataset.qid;
                });
            });
        }

        // Search
        const searchInput = document.getElementById('searchInput');
        const searchClear = document.getElementById('searchClear');
        let searchTimer = null;
        searchInput.addEventListener('input', function() {
            const val = this.value.trim();
            searchClear.classList.toggle('show', val.length > 0);
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => renderQuotes(val), 150);
        });
        searchClear.addEventListener('click', function() {
            searchInput.value = '';
            this.classList.remove('show');
            renderQuotes();
            searchInput.focus();
        });

        loadQuotes();
    </script>
</body>
</html>
