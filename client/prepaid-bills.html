<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预付款管理 - 报价系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f5f5; min-height: 100vh; }
        .bg-gradient { position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(ellipse at 30% 20%, rgba(99,102,241,0.04) 0%, transparent 50%), radial-gradient(ellipse at 70% 80%, rgba(34,197,94,0.03) 0%, transparent 50%); pointer-events: none; z-index: 0; }
        .header { position: relative; z-index: 2; background: #fff; border-bottom: 1px solid #eee; padding: 0 32px; height: 56px; display: flex; align-items: center; gap: 16px; }
        .btn-back { font-size: 13px; color: #666; background: none; border: none; cursor: pointer; padding: 6px 0; text-decoration: none; }
        .btn-back:hover { color: #1a1a1a; }
        .header-title { font-size: 16px; font-weight: 600; color: #1a1a1a; flex: 1; }
        .header-bell { position: relative; cursor: pointer; padding: 6px; border-radius: 8px; border: none; background: none; }
        .header-bell:hover { background: #f5f5f5; }
        .header-bell svg { width: 20px; height: 20px; color: #666; display: block; }
        .header-bell-badge { position: absolute; top: 1px; right: 1px; min-width: 16px; height: 16px; background: #dc2626; color: #fff; font-size: 10px; font-weight: 700; border-radius: 8px; display: none; align-items: center; justify-content: center; padding: 0 4px; }
        .header-bell-badge.show { display: flex; }

        .main { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 32px; }

        .section-title { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .section-count { font-size: 12px; font-weight: 400; color: #999; }
        .section-count.danger { color: #dc2626; }
        .section-count.warn { color: #f59e0b; }

        .order-card { background: #fff; border-radius: 10px; border: 1px solid #eee; padding: 16px 20px; margin-bottom: 10px; transition: all 0.15s; }
        .order-card:hover { border-color: #d0d0d0; }
        .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .card-quote { font-size: 14px; font-weight: 600; color: #1a1a1a; }
        .card-total { font-size: 14px; font-weight: 700; color: #1a1a1a; }
        .card-product { font-size: 12px; color: #888; margin-bottom: 10px; }
        .card-date { font-size: 11px; color: #bbb; }

        .pay-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; gap: 12px; }
        .pay-row.deposit { background: #fefce8; }
        .pay-row.remainder { background: #f0fdf4; }
        .pay-row.done { background: #f8f9fa; opacity: 0.7; }
        .pay-label { font-size: 12px; font-weight: 500; color: #1a1a1a; }
        .pay-amount { font-size: 14px; font-weight: 600; color: #1a1a1a; }
        .pay-status { font-size: 11px; padding: 3px 10px; border-radius: 4px; font-weight: 500; }
        .pay-status.paid { background: #f0fdf4; color: #16a34a; }
        .pay-status.unpaid { background: #fef2f2; color: #dc2626; }
        .btn-pay { font-size: 11px; padding: 5px 14px; border-radius: 5px; border: none; cursor: pointer; font-weight: 500; white-space: nowrap; }
        .btn-pay.deposit-btn { background: #f59e0b; color: #fff; }
        .btn-pay.deposit-btn:hover { background: #d97706; }
        .btn-pay.remainder-btn { background: #16a34a; color: #fff; }
        .btn-pay.remainder-btn:hover { background: #15803d; }
        .btn-pay:disabled { opacity: 0.5; cursor: default; }

        .status-badge { font-size: 10px; padding: 2px 8px; border-radius: 3px; font-weight: 500; }
        .status-badge.waiting-deposit { background: #fef2f2; color: #dc2626; }
        .status-badge.waiting-remainder { background: #fff7ed; color: #c2410c; }
        .status-badge.in-prod { background: #eff6ff; color: #2563eb; }
        .status-badge.done { background: #f0fdf4; color: #16a34a; }

        .no-data { text-align: center; padding: 60px 20px; color: #bbb; }
        .no-data p { margin-bottom: 4px; }

        .notif-toast { position: fixed; top: 20px; right: 20px; background: #16a34a; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 13px; z-index: 500; opacity: 0; transform: translateY(-20px); transition: all 0.3s; pointer-events: none; }
        .notif-toast.show { opacity: 1; transform: translateY(0); }

        @media (max-width: 600px) {
            .main { padding: 24px 16px; }
            .header { padding: 0 16px; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <header class="header">
        <a href="user.html" class="btn-back">← 返回</a>
        <span class="header-title">预付款管理</span>
        <button class="header-bell" id="headerBell" onclick="goToNotifications()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="header-bell-badge" id="bellBadge">0</span>
        </button>
    </header>

    <main class="main">
        <div id="depositSection">
            <div class="section-title">待付定金 <span class="section-count danger" id="depositCount"></span></div>
            <div id="depositList"></div>
        </div>
        <div id="remainderSection" style="margin-top:28px">
            <div class="section-title">待付尾款 <span class="section-count warn" id="remainderCount"></span></div>
            <div id="remainderList"></div>
        </div>
        <div id="doneSection" style="margin-top:28px">
            <div class="section-title">已付清 <span class="section-count" id="doneCount"></span></div>
            <div id="doneList"></div>
        </div>
        <div class="no-data" id="noData" style="display:none"><p>暂无预付款订单</p><p style="font-size:12px;margin-top:4px">您的预付款订单将在此显示</p></div>
    </main>

    <div class="notif-toast" id="toast"></div>

    <script type="module">
        import { auth, db, getCurrentUser } from "../shared/firebase-init.js";
        import { collection, getDocs, doc, updateDoc, query, where, orderBy, serverTimestamp, addDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const user = await getCurrentUser();
        if (!user) { window.location.href = '../auth/login.html'; throw new Error('未登录'); }

        function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
        function fmt(n) { return Number(n || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

        let allOrders = [];
        let depositPercent = 0;
        let clientUid = user.uid;

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        async function loadData() {
            try {
                const profSnap = await getDocs(query(collection(db, 'clientProfiles'), where('contactEmail', '==', user.email)));
                profSnap.forEach(d => {
                    const data = d.data();
                    clientUid = d.id;
                    depositPercent = data.depositPercent || 0;
                });

                const q = query(collection(db, 'users', clientUid, 'quotes'), orderBy('publishedAt', 'desc'));
                const snap = await getDocs(q);
                allOrders = [];
                snap.forEach(d => {
                    const o = { id: d.id, ...d.data() };
                    // Exclude full payment orders (depositPercent === 100), they have their own page
                    if (o.depositPercent !== 100 && (o.depositPercent || o.depositAmount)) {
                        allOrders.push(o);
                    }
                });
            } catch (e) { console.error('加载失败:', e); }
            renderAll();
        }

        function renderAll() {
            const depositOrders = allOrders.filter(o => !o.depositPaid);
            const remainderOrders = allOrders.filter(o => o.depositPaid && !o.remainderPaid);
            const doneOrders = allOrders.filter(o => o.depositPaid && o.remainderPaid);

            document.getElementById('depositCount').textContent = depositOrders.length + ' 笔';
            document.getElementById('remainderCount').textContent = remainderOrders.length + ' 笔';
            document.getElementById('doneCount').textContent = doneOrders.length + ' 笔';

            if (allOrders.length === 0) {
                document.getElementById('noData').style.display = '';
                document.getElementById('depositSection').style.display = 'none';
                document.getElementById('remainderSection').style.display = 'none';
                document.getElementById('doneSection').style.display = 'none';
                return;
            }

            document.getElementById('noData').style.display = 'none';
            document.getElementById('depositSection').style.display = depositOrders.length ? '' : 'none';
            document.getElementById('remainderSection').style.display = remainderOrders.length ? '' : 'none';
            document.getElementById('doneSection').style.display = doneOrders.length ? '' : 'none';

            document.getElementById('depositList').innerHTML = depositOrders.map(o => renderOrderCard(o, 'deposit')).join('');
            document.getElementById('remainderList').innerHTML = remainderOrders.map(o => renderOrderCard(o, 'remainder')).join('');
            document.getElementById('doneList').innerHTML = doneOrders.map(o => renderOrderCard(o, 'done')).join('');
        }

        function renderOrderCard(o, section) {
            const date = o.publishedAt ? new Date(o.publishedAt.seconds * 1000).toLocaleDateString('zh-CN') : '-';
            const total = o.totalPrice || 0;
            const dpPct = o.depositPercent || depositPercent || 0;
            const dpAmt = o.depositAmount || Math.round(total * dpPct / 100 * 100) / 100;
            const rmAmt = o.remainderAmount || Math.round((total - dpAmt) * 100) / 100;
            const statusLabels = { pending:'待确认', confirmed:'已确认', in_production:'生产中', completed:'已完成', shipped:'已发货', signed:'已签收' };

            let statusBadge = '';
            if (section === 'deposit') statusBadge = '<span class="status-badge waiting-deposit">待付定金</span>';
            else if (section === 'remainder') statusBadge = '<span class="status-badge waiting-remainder">待付尾款</span>';
            else statusBadge = '<span class="status-badge done">已付清</span>';

            let html = '<div class="order-card">';
            html += '<div class="card-top"><span class="card-quote">' + esc(o.quoteNumber || '-') + ' ' + statusBadge + '</span><span class="card-total">$' + fmt(total) + '</span></div>';
            html += '<div class="card-product">' + esc(o.productName || '-') + '</div>';
            html += '<div class="card-date">' + date + ' · ' + (statusLabels[o.status] || o.status) + '</div>';

            // Deposit row
            const dpApplied = o.clientConfirmedDeposit;
            html += '<div class="pay-row deposit' + (o.depositPaid ? ' done' : '') + '">';
            html += '<span class="pay-label">定金（' + dpPct + '%）</span>';
            html += '<span class="pay-amount">$' + fmt(dpAmt) + '</span>';
            if (o.depositPaid) {
                html += '<span class="pay-status paid">管理员已确认 ✓</span>';
            } else if (dpApplied) {
                html += '<span class="pay-status" style="background:#fefce8;color:#b45309">已申请，等待确认</span>';
            } else {
                html += '<span class="pay-status unpaid">未付</span>';
                html += '<button class="btn-pay deposit-btn" onclick="confirmPayment(\'' + o.id + '\',\'deposit\',this)">确认已付定金</button>';
            }
            html += '</div>';

            // Remainder row
            const rmApplied = o.clientConfirmedRemainder;
            html += '<div class="pay-row remainder' + (o.remainderPaid ? ' done' : '') + '">';
            html += '<span class="pay-label">尾款</span>';
            html += '<span class="pay-amount">$' + fmt(rmAmt) + '</span>';
            if (o.remainderPaid) {
                html += '<span class="pay-status paid">管理员已确认 ✓</span>';
            } else if (rmApplied) {
                html += '<span class="pay-status" style="background:#fefce8;color:#b45309">已申请，等待确认</span>';
            } else if (o.depositPaid) {
                html += '<span class="pay-status unpaid">未付</span>';
                html += '<button class="btn-pay remainder-btn" onclick="confirmPayment(\'' + o.id + '\',\'remainder\',this)">确认已付尾款</button>';
            } else {
                html += '<span class="pay-status unpaid" style="opacity:0.5">待付定金</span>';
            }
            html += '</div>';

            html += '</div>';
            return html;
        }

        window.confirmPayment = async function(orderId, type, btn) {
            const label = type === 'deposit' ? '定金' : '尾款';
            if (!confirm('确认您已支付' + label + '？\n\n管理员将核实您的付款。')) return;
            btn.disabled = true; btn.textContent = '提交中...';
            try {
                const o = allOrders.find(o => o.id === orderId);
                const amt = type === 'deposit' ? (o.depositAmount || 0) : (o.remainderAmount || 0);
                const qn = o ? (o.quoteNumber || orderId) : orderId;
                await addDoc(collection(db, 'notifications'), {
                    clientUid: clientUid,
                    type: 'bill',
                    title: '客户确认付款',
                    body: '客户确认已支付' + label + '：订单 ' + qn + '，金额 $' + fmt(amt) + '。请核实。',
                    read: false,
                    createdAt: serverTimestamp(),
                    link: '../admin/billing.html'
                });

                if (type === 'deposit') {
                    await updateDoc(doc(db, 'users', clientUid, 'quotes', orderId), { clientConfirmedDeposit: true, clientConfirmedDepositAt: serverTimestamp() });
                    if (o) o.clientConfirmedDeposit = true;
                } else {
                    await updateDoc(doc(db, 'users', clientUid, 'quotes', orderId), { clientConfirmedRemainder: true, clientConfirmedRemainderAt: serverTimestamp() });
                    if (o) o.clientConfirmedRemainder = true;
                }

                btn.textContent = '已提交 ✓';
                btn.style.background = '#bbb';
                showToast(label + '付款确认已提交，等待管理员核实');
                setTimeout(() => renderAll(), 2000);
            } catch (e) {
                alert('提交失败: ' + (e.message || '未知错误'));
                btn.disabled = false;
                btn.textContent = type === 'deposit' ? '确认已付定金' : '确认已付尾款';
            }
        };

        window.goToNotifications = function() {
            window.location.href = 'client-bills.html';
        };

        async function loadBell() {
            try {
                const snap = await getDocs(query(
                    collection(db, 'notifications'),
                    where('clientUid', '==', clientUid),
                    where('read', '==', false)
                ));
                const count = snap.size;
                const badge = document.getElementById('bellBadge');
                if (count > 0) {
                    badge.textContent = count > 99 ? '99+' : count;
                    badge.classList.add('show');
                } else {
                    badge.classList.remove('show');
                }
            } catch (e) { /* ignore */ }
        }

        await loadData();
        await loadBell();
        setInterval(loadBell, 10000);
    </script>
</body>
</html>
