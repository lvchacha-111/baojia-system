<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>报价系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
        }

        .bg-dot {
            position: fixed; inset: 0;
            background: radial-gradient(circle, #e5e5e5 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none; z-index: 0;
        }

        .header {
            position: relative; z-index: 1;
            background: #fff; border-bottom: 1px solid #eee;
            padding: 0 32px; height: 56px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .header-left {
            display: flex; align-items: center; gap: 10px;
        }

        .header-logo {
            width: 28px; height: 28px;
            background: #1a1a1a; border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
        }

        .header-logo svg {
            width: 14px; height: 14px;
            fill: none; stroke: #fff; stroke-width: 2;
        }

        .header-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }

        .header-right { display: flex; align-items: center; gap: 16px; }

        .header-user-area {
            display: flex; align-items: center; gap: 10px;
            cursor: pointer; padding: 4px 8px; border-radius: 8px;
            transition: background 0.15s;
        }
        .header-user-area:hover { background: #f5f5f5; }

        .header-pm-tag {
            display: inline-block; font-size: 11px; font-weight: 600;
            padding: 4px 10px; border-radius: 6px; white-space: nowrap;
            position: relative; cursor: default;
        }
        .header-pm-tag.monthly { background: #eff6ff; color: #2563eb; }
        .header-pm-tag.credit { background: #f3e8ff; color: #7c3aed; }
        .header-pm-tag.pay_before_ship { background: #fff7ed; color: #c2410c; }
        .header-pm-tag.prepaid { background: #f0fdf4; color: #16a34a; }

        .header-pm-popup {
            display: none; position: absolute; top: calc(100% + 8px); left: 50%;
            transform: translateX(-50%); white-space: nowrap;
            background: #1a1a1a; color: #fff; font-size: 13px; font-weight: 500;
            padding: 12px 16px; border-radius: 10px; line-height: 1.6;
            pointer-events: none; z-index: 300;
        }
        .header-pm-popup .popup-row {
            display: flex; gap: 16px; align-items: center;
        }
        .header-pm-popup .popup-label { color: #aaa; font-size: 11px; font-weight: 400; }
        .header-pm-popup .popup-val { font-size: 15px; font-weight: 700; }
        .header-pm-popup .popup-divider { color: #555; font-size: 15px; }
        .header-pm-tag:hover .header-pm-popup { display: block; }
        .header-pm-warn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 16px; height: 16px; border-radius: 50%;
            background: #f59e0b; color: #fff; font-size: 10px; font-weight: 700;
            margin-right: 3px; vertical-align: middle; cursor: help;
        }
        .header-pm-warn.danger {
            background: #dc2626;
        }
        .header-pm-tag.exhausted {
            background: #fef2f2; color: #dc2626;
        }

        .header-user-text { line-height: 1.3; }
        .header-user-name { font-size: 13px; font-weight: 500; color: #1a1a1a; display: block; }
        .header-user-email { font-size: 11px; color: #999; display: block; }

        .btn-logout {
            font-size: 13px; color: #999;
            background: none; border: none; cursor: pointer;
            padding: 6px 12px; border-radius: 6px; transition: all 0.15s;
        }

        .btn-logout:hover { color: #dc2626; background: #fef2f2; }

        .header-bell { position: relative; cursor: pointer; padding: 6px; border-radius: 8px; border: none; background: none; }
        .header-bell:hover { background: #f5f5f5; }
        .header-bell svg { width: 20px; height: 20px; color: #666; display: block; }
        .header-bell-badge { position: absolute; top: 1px; right: 1px; min-width: 16px; height: 16px; background: #dc2626; color: #fff; font-size: 10px; font-weight: 700; border-radius: 8px; display: none; align-items: center; justify-content: center; padding: 0 4px; }
        .header-bell-badge.show { display: flex; }

        .notif-dropdown {
            display: none; position: absolute; top: calc(100% + 8px); right: 0;
            width: 380px; max-height: 480px; background: #fff; border-radius: 14px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.12); border: 1px solid #eee;
            z-index: 200; flex-direction: column; overflow: hidden;
        }
        .notif-dropdown.show { display: flex; }
        .notif-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px; border-bottom: 1px solid #f0f0f0;
            font-size: 14px; font-weight: 600; color: #1a1a1a;
        }
        .notif-mark-all {
            font-size: 12px; color: #6366f1; cursor: pointer; border: none; background: none; font-weight: 500;
        }
        .notif-mark-all:hover { color: #4f46e5; }
        .notif-list { overflow-y: auto; max-height: 400px; }
        .notif-item {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 14px 18px; cursor: pointer; border-bottom: 1px solid #f9f9f9;
            transition: background 0.1s; position: relative;
        }
        .notif-item:hover { background: #f8f9fa; }
        .notif-item.unread { background: #fafaff; }
        .notif-item.unread:hover { background: #f0f0ff; }
        .notif-dot { width: 8px; height: 8px; border-radius: 50%; background: #6366f1; flex-shrink: 0; margin-top: 6px; }
        .notif-dot.read { visibility: hidden; }
        .notif-content { flex: 1; min-width: 0; }
        .notif-title { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; }
        .notif-body { font-size: 12px; color: #888; line-height: 1.5; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .notif-time { font-size: 11px; color: #bbb; flex-shrink: 0; margin-top: 2px; }
        .notif-empty { text-align: center; padding: 40px 20px; color: #ccc; font-size: 13px; }
        .notif-empty svg { width: 36px; height: 36px; margin-bottom: 8px; color: #ddd; }
        @media (max-width: 600px) {
            .notif-dropdown { width: calc(100vw - 32px); right: -60px; }
        }

        .account-input {
            width: 200px; padding: 6px 10px;
            border: 1px solid #ddd; border-radius: 6px;
            font-size: 13px; color: #1a1a1a; outline: none;
            transition: border-color 0.15s;
        }
        .account-input:focus { border-color: #6366f1; }
        .btn-save-account {
            padding: 10px 28px; background: #1a1a1a; color: #fff;
            border: none; border-radius: 10px; font-size: 14px; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-save-account:hover { background: #333; }
        .btn-save-account:disabled { opacity: 0.6; cursor: default; }
        .payment-tag {
            display: inline-block; font-size: 11px; font-weight: 500;
            padding: 2px 8px; border-radius: 4px;
        }
        .payment-tag.monthly { background: #eff6ff; color: #2563eb; }
        .payment-tag.credit { background: #f3e8ff; color: #7c3aed; }
        .payment-tag.pay_before_ship { background: #fff7ed; color: #c2410c; }
        .payment-tag.prepaid { background: #f0fdf4; color: #16a34a; }
        .payment-tag.full { background: #fef2f2; color: #dc2626; }
        .payment-tag.full { background: #fef2f2; color: #dc2626; }
        .payment-status-tag {
            font-size: 10px; font-weight: 500; padding: 2px 6px; border-radius: 3px; margin-left: 4px; vertical-align: middle;
        }
        .payment-status-tag.finalized { background: #f0fdf4; color: #16a34a; }
        .payment-status-tag.active { background: #f5f5f5; color: #888; }

        .main {
            position: relative; z-index: 1;
            max-width: 720px; margin: 0 auto; padding: 60px 32px;
        }

        .greeting { margin-bottom: 32px; }

        .greeting h2 {
            font-size: 24px; font-weight: 600; color: #1a1a1a;
            letter-spacing: -0.3px;
        }

        .greeting p { font-size: 14px; color: #999; margin-top: 4px; }

        .card-grid {
            display: grid; gap: 20px;
        }

        .card {
            background: #fff; border-radius: 14px; border: 1px solid #eee;
            padding: 36px 32px; cursor: pointer;
            transition: all 0.25s;
            text-decoration: none; display: flex; align-items: center; gap: 20px;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            border-color: #ddd;
        }

        .card-icon {
            width: 52px; height: 52px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            background: #f0f4ff; color: #4f6ef7;
        }

        .card-icon svg {
            width: 24px; height: 24px;
            fill: none; stroke: currentColor; stroke-width: 1.8;
        }

        .card-body h3 {
            font-size: 17px; font-weight: 600; color: #1a1a1a;
            margin-bottom: 4px;
        }

        .card-body p { font-size: 13px; color: #999; }

        .empty-state {
            text-align: center; padding: 80px 20px;
        }

        .empty-state .icon {
            width: 64px; height: 64px; border-radius: 50%;
            background: #f5f5f5;
            display: inline-flex; align-items: center; justify-content: center;
            margin-bottom: 20px;
        }

        .empty-state .icon svg {
            width: 28px; height: 28px;
            fill: none; stroke: #ccc; stroke-width: 1.5;
        }

        .empty-state h3 { font-size: 17px; color: #1a1a1a; margin-bottom: 6px; }
        .empty-state p { font-size: 14px; color: #999; }

        /* Order cards */
        .order-card {
            background: #fff; border-radius: 12px; border: 1px solid #eee;
            padding: 20px 24px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            transition: all 0.2s; margin-bottom: 12px;
        }
        .order-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border-color: #ddd;
        }
        .order-left .order-number {
            font-size: 15px; font-weight: 600; color: #1a1a1a;
        }
        .order-left .order-meta {
            font-size: 13px; color: #999; margin-top: 3px;
        }
        .order-sales {
            font-size: 12px; color: #888; margin-top: 4px;
        }
        .order-price {
            font-size: 18px; font-weight: 700; color: #1a1a1a;
        }

        /* Detail overlay */
        .detail-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 100; overflow-y: auto;
        }
        .detail-overlay.show { display: block; }

        .detail-container {
            background: #fff; border-radius: 16px;
            max-width: 680px; margin: 40px auto;
            padding: 40px;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .detail-close {
            position: absolute; top: 16px; right: 16px;
            width: 36px; height: 36px; border-radius: 10px;
            border: none; background: #f5f5f5;
            font-size: 20px; color: #666; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .detail-close:hover { background: #eee; color: #1a1a1a; }

        .detail-section {
            background: #fafafa; border-radius: 10px;
            padding: 16px 20px; margin-bottom: 12px;
        }
        .detail-section h4 {
            font-size: 14px; font-weight: 600; color: #1a1a1a;
            margin-bottom: 10px; padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }
        .detail-row {
            display: flex; justify-content: space-between;
            padding: 6px 0; font-size: 14px;
        }
        .detail-row .label { color: #888; }
        .detail-row .value { color: #1a1a1a; font-weight: 500; }

        .detail-total {
            text-align: right; margin-top: 16px; padding-top: 16px;
            border-top: 2px solid #eee;
            font-size: 24px; font-weight: 700; color: #1a1a1a;
        }
        .detail-total small {
            font-size: 13px; color: #999; font-weight: 400; margin-right: 8px;
        }

        .svg-preview-box {
            background: #fff; border: 1px solid #eee; border-radius: 8px;
            padding: 16px; text-align: center;
            max-height: 300px; overflow: auto;
        }
        .svg-preview-box svg { max-width: 100%; height: auto; }
        .status-badge {
            display: inline-block; font-size: 11px; font-weight: 500;
            padding: 2px 8px; border-radius: 4px; margin-left: 6px; vertical-align: middle;
        }
        .status-pending { background: #fefce8; color: #a16207; }
        .status-in_production { background: #eff6ff; color: #2563eb; }
        .status-completed { background: #f0fdf4; color: #16a34a; }
        .status-shipped { background: #faf5ff; color: #9333ea; }
        .status-signed { background: #f0fdf4; color: #15803d; }
        .status-confirmed { background: #fefce8; color: #ca8a04; }
        .progress-wrap { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
        .progress-bar { flex: 1; height: 5px; background: #eee; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 3px; background: #22c55e; transition: width 0.4s; }
        .progress-pct { font-size: 12px; font-weight: 600; color: #22c55e; min-width: 34px; text-align: right; }
        .status-help {
            display: inline-block; width: 16px; height: 16px; border-radius: 50%;
            background: #e5e5e5; color: #999; font-size: 11px; font-weight: 600;
            text-align: center; line-height: 16px; cursor: help;
            margin-left: 4px; vertical-align: middle; position: relative;
        }
        .status-help .help-tip {
            display: none; position: absolute; bottom: calc(100% + 8px); left: 50%;
            transform: translateX(-50%); white-space: nowrap;
            background: #1a1a1a; color: #fff; font-size: 12px; font-weight: 400;
            padding: 10px 14px; border-radius: 8px; line-height: 1.6;
            pointer-events: none; z-index: 300;
        }
        .status-help:hover .help-tip { display: block; }

        .lang-switch {
            font-size: 12px; color: #999; border: 1px solid #e8e8e8;
            border-radius: 6px; padding: 4px 8px; background: #fff;
            cursor: pointer; outline: none;
        }
    </style>
</head>
<body>
    <div class="bg-dot"></div>
    <header class="header">
        <div class="header-left">
            <div class="header-logo">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            <span class="header-title" data-i18n="app_name">报价系统</span>
        </div>
        <div class="header-right">
            <select class="lang-switch" onchange="switchLang(this.value)">
                <option value="zh">中文</option>
                <option value="en">EN</option>
            </select>
            <div class="header-user-area" id="headerUserArea">
                <span class="header-pm-tag" id="headerPmTag" style="display:none"></span>
                <div class="header-user-text">
                    <span class="header-user-name" id="headerUserName"></span>
                    <span class="header-user-email" id="headerUserEmail"></span>
                </div>
            </div>
            <div style="position:relative">
                <button class="header-bell" id="headerBell" onclick="toggleNotif()" title="通知">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                    <span class="header-bell-badge" id="bellBadge">0</span>
                </button>
                <div class="notif-dropdown" id="notifDropdown">
                    <div class="notif-header">
                        <span data-i18n="orders_title">消息通知</span>
                        <button class="notif-mark-all" onclick="event.stopPropagation();markAllNotifRead()" data-i18n="all">全部已读</button>
                    </div>
                    <div class="notif-list" id="notifList"></div>
                </div>
            </div>
            <button class="btn-logout" onclick="logout()" data-i18n="user_logout">退出</button>
        </div>
    </header>

    <main class="main">
        <div class="greeting">
            <h2 data-i18n="user_section_quote">欢迎</h2>
            <p data-i18n="app_name">报价系统</p>
        </div>

        <div class="card-grid">
            <a href="my-orders.html" class="card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                </div>
                <div class="card-body">
                    <h3 data-i18n="user_section_orders">我的订单</h3>
                    <p data-i18n="orders_title">查看报价和订单进度</p>
                </div>
            </a>
            <a id="billsCard" href="client-bills.html" class="card">
                <div class="card-icon" style="background:#f0fdf4;color:#16a34a">
                    <svg viewBox="0 0 24 24">
                        <rect x="2" y="3" width="20" height="18" rx="2"/>
                        <line x1="6" y1="8" x2="18" y2="8"/>
                        <line x1="6" y1="12" x2="18" y2="12"/>
                        <line x1="6" y1="16" x2="12" y2="16"/>
                    </svg>
                </div>
                <div class="card-body">
                    <h3 data-i18n="orders_detail_title">我的账单</h3>
                    <p data-i18n="orders_view_detail">查看对账单和付款</p>
                </div>
            </a>
        </div>
    </main>

    <!-- Account overlay -->
    <div class="detail-overlay" id="accountOverlay">
        <div class="detail-container" id="accountContainer"></div>
    </div>

    <script src="../shared/pocketbase.umd.js"></script>
    <script src="../shared/i18n.js" type="module"></script>
    <script type="module">
        import { auth, getCurrentUser, logout as firebaseLogout, db } from "../shared/pocketbase-init.js?v=2";
        import { collection, getDocs, query, updateDoc, doc, where } from "../shared/pocketbase-init.js?v=2";
        import { t, getLang } from "../shared/i18n.js";

        // 初始化语言选择器
        document.querySelector('.lang-switch').value = getLang();

        const user = await getCurrentUser();
        if (!user) {
            window.location.href = '../auth/login.html';
        }
        // Guard: salesperson accounts should not use client pages
        if (user.email && /^sales\d{2}@test\.com$/.test(user.email)) {
            alert('当前登录的是业务员账号（' + user.email + '），请退出后用客户账号登录。即将跳转到业务员工作台。');
            window.location.href = '../admin/myorders.html';
        }

        // Set initial header with email
        const emailPrefix = user.email.split('@')[0];
        document.getElementById('headerUserName').textContent = emailPrefix;
        document.getElementById('headerUserEmail').textContent = user.email;

        let clientProfile = null;

        function updateHeaderFromProfile() {
            const p = clientProfile;
            const nameEl = document.getElementById('headerUserName');
            const pmTag = document.getElementById('headerPmTag');
            const displayName = (p && p.name) || emailPrefix;
            nameEl.textContent = displayName;

            const pm = p ? p.paymentMethod : null;
            if (pm) {
                const pmLabels = { monthly: t('pay_monthly'), credit: t('pay_credit'), pay_before_ship: t('pay_before_ship'), prepaid: t('pay_prepaid'), full: t('pay_full') };
                pmTag.style.display = '';

                // Build popup
                let popupHtml = '';
                let warnHtml = '';
                let labelText = pmLabels[pm] || pm;
                let tagClass = 'header-pm-tag ' + pm;

                if (pm === 'credit') {
                    const limit = p.creditLimit || 0;
                    const used = p.creditUsed || 0;
                    if (limit > 0 && used >= limit) {
                        warnHtml = '<span class="header-pm-warn danger" title="' + t('orders_exhausted_title') + '">!</span>';
                        labelText = t('orders_exhausted');
                        tagClass = 'header-pm-tag exhausted';
                    } else if (limit > 0 && used >= limit * 2 / 3) {
                        warnHtml = '<span class="header-pm-warn" title="' + t('orders_almost_exhausted_title') + '">!</span>';
                    }
                    popupHtml = '<div class="header-pm-popup"><div class="popup-row">';
                    popupHtml += '<div><div class="popup-label">' + t('orders_credit_limit') + '</div><div class="popup-val">$' + fmt(limit) + '</div></div>';
                    popupHtml += '<div class="popup-divider">/</div>';
                    popupHtml += '<div><div class="popup-label">' + t('orders_used') + '</div><div class="popup-val">$' + fmt(used) + '</div></div>';
                    popupHtml += '</div></div>';
                } else {
                    popupHtml = '<div class="header-pm-popup"><div style="font-size:13px">' + (pmLabels[pm] || pm) + '</div></div>';
                }
                pmTag.className = tagClass;
                pmTag.innerHTML = warnHtml + labelText + popupHtml;

                // Update bills card link based on payment method
                const billsCard = document.getElementById('billsCard');
                if (billsCard) {
                    if (pm === 'full') billsCard.href = 'full-bills.html';
                    else if (pm === 'prepaid') billsCard.href = 'prepaid-bills.html';
                    else billsCard.href = 'client-bills.html';
                }
            } else {
                pmTag.style.display = 'none';
            }
        }

        async function loadClientProfile() {
            try {
                const q = query(collection(db, 'clientProfiles'), where('name', '==', emailPrefix));
                const snap = await getDocs(q);
                snap.forEach(d => {
                    clientProfile = { ...d.data(), id: d.id, uid: d.data().uid || d.id };
                });
                if (!clientProfile) {
                    const allSnap = await getDocs(collection(db, 'clientProfiles'));
                    allSnap.forEach(d => {
                        if (d.data().contactEmail === user.email) {
                            clientProfile = { ...d.data(), id: d.id, uid: d.data().uid || d.id };
                        }
                    });
                }
                updateHeaderFromProfile();
            } catch (e) { console.warn('加载账户信息失败:', e); }
        }
        loadClientProfile();

        window.addEventListener('langChanged', () => {
            updateHeaderFromProfile();
        });

        // Notification bell with dropdown
        let notifList = [];
        const typeIcons = {
            bill: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#16a34a" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="2"/><line x1="6" y1="8" x2="18" y2="8"/><line x1="6" y1="12" x2="18" y2="12"/></svg>',
            order: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#6366f1" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
            system: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#f59e0b" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
        };

        async function loadNotifications() {
            try {
                const q = query(collection(db, 'notifications'),
                    where('clientUid', '==', user.id));
                const snap = await getDocs(q);
                notifList = [];
                snap.forEach(d => { notifList.push({ id: d.id, ...d.data() }); });
                notifList.sort((a, b) => (new Date(b.createdAt || 0).getTime()) - (new Date(a.createdAt || 0).getTime()));
                updateBellBadge();
                renderNotifList();
            } catch (e) { /* ignore */ }
        }

        function updateBellBadge() {
            const count = notifList.filter(n => !n.read).length;
            const badge = document.getElementById('bellBadge');
            if (badge) {
                if (count > 0) { badge.textContent = count > 99 ? '99+' : count; badge.classList.add('show'); }
                else { badge.classList.remove('show'); }
            }
        }

        function renderNotifList() {
            const container = document.getElementById('notifList');
            if (!container) return;
            if (notifList.length === 0) {
                container.innerHTML = '<div class="notif-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><p>' + t('no_data') + '</p></div>';
                return;
            }
            let html = '';
            notifList.forEach(n => {
                const time = n.createdAt ? new Date(n.createdAt).toLocaleString('zh-CN', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
                const icon = typeIcons[n.type] || typeIcons.system;
                html += '<div class="notif-item' + (n.read ? '' : ' unread') + '" data-nid="' + n.id + '" data-link="' + escHTML(n.link || '') + '" onclick="clickNotif(this)">';
                html += '<div class="notif-dot' + (n.read ? ' read' : '') + '"></div>';
                html += '<div style="flex-shrink:0;margin-top:2px">' + icon + '</div>';
                html += '<div class="notif-content"><div class="notif-title">' + escHTML(n.title || '') + '</div>';
                html += '<div class="notif-body">' + escHTML(n.body || '') + '</div></div>';
                html += '<div class="notif-time">' + time + '</div>';
                html += '</div>';
            });
            container.innerHTML = html;
        }

        window.toggleNotif = function() {
            const dd = document.getElementById('notifDropdown');
            dd.classList.toggle('show');
        };

        window.clickNotif = async function(el) {
            const nid = el.dataset.nid;
            const link = el.dataset.link;
            // Mark as read
            try {
                const { updateDoc, doc } = await import("../shared/pocketbase-init.js?v=2");
                await updateDoc(doc(db, 'notifications', nid), { read: true });
                const n = notifList.find(x => x.id === nid);
                if (n) n.read = true;
                updateBellBadge();
                renderNotifList();
            } catch (e) { /* ignore */ }
            if (link) window.location.href = link;
        };

        window.markAllNotifRead = async function() {
            try {
                const { updateDoc, doc } = await import("../shared/pocketbase-init.js?v=2");
                const unread = notifList.filter(n => !n.read);
                await Promise.all(unread.map(n => updateDoc(doc(db, 'notifications', n.id), { read: true })));
                unread.forEach(n => n.read = true);
                updateBellBadge();
                renderNotifList();
            } catch (e) { /* ignore */ }
        };

        // Close dropdown on outside click
        document.addEventListener('click', function(e) {
            const dd = document.getElementById('notifDropdown');
            const bell = document.getElementById('headerBell');
            if (dd && dd.classList.contains('show') && !dd.contains(e.target) && e.target !== bell && !bell.contains(e.target)) {
                dd.classList.remove('show');
            }
        });

        await loadNotifications();
        setInterval(loadNotifications, 10000);

        document.getElementById('accountOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeAccount();
        });

        function escHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        function fmt(n) { return Number(n || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

        window.openAccount = function() {
            const overlay = document.getElementById('accountOverlay');
            const container = document.getElementById('accountContainer');
            const p = clientProfile || {};
            const pm = p.paymentMethod || '';
            const pmLabels = { monthly: t('pay_monthly'), credit: t('pay_credit'), pay_before_ship: t('pay_before_ship'), prepaid: t('pay_prepaid'), full: t('pay_full') };

            let html = '<button class="detail-close" onclick="closeAccount()">×</button>';
            html += '<div class="detail-header">';
            html += '<div class="name">' + escHTML(p.name || user.email) + '</div>';
            html += '<div class="meta">' + escHTML(user.email) + '</div>';
            html += '</div>';

            html += '<div class="detail-section"><h4 data-i18n="orders_save_changes">账户信息</h4>';
            html += '<div class="detail-row"><span class="label" data-i18n="orders_customer">客户名称</span><span class="value">' + escHTML(p.name || '-') + '</span></div>';
            html += '<div class="detail-row"><span class="label" data-i18n="register_company_label">公司名称</span>';
            html += '<input class="account-input" id="acctCompany" value="' + escHTML(p.company || '') + '" placeholder="' + t('register_company_placeholder') + '">';
            html += '</div>';
            html += '<div class="detail-row"><span class="label" data-i18n="register_email_label">联系邮箱</span>';
            html += '<input class="account-input" id="acctEmail" value="' + escHTML(p.contactEmail || '') + '" placeholder="' + t('register_email_label') + '">';
            html += '</div>';
            html += '<div class="detail-row"><span class="label" data-i18n="register_country_label">国家/地区</span>';
            html += '<input class="account-input" id="acctCountry" value="' + escHTML(p.country || '') + '" placeholder="' + t('register_country_label') + '">';
            html += '</div>';
            html += '</div>';

            html += '<div class="detail-section"><h4 data-i18n="user_billing_type">付款信息</h4>';
            html += '<div class="detail-row"><span class="label" data-i18n="user_billing_type">付款方式</span><span class="value">';
            html += pm ? '<span class="payment-tag ' + pm + '">' + (pmLabels[pm] || pm) + '</span>' : t('no_data');
            html += '</span></div>';
            if (pm === 'credit') {
                const limit = p.creditLimit || 0;
                const used = p.creditUsed || 0;
                const remain = Math.max(0, limit - used);
                html += '<div class="detail-row"><span class="label" data-i18n="orders_credit_limit">信用额度</span><span class="value">$' + fmt(limit) + '</span></div>';
                html += '<div class="detail-row"><span class="label" data-i18n="orders_used">已用额度</span><span class="value">$' + fmt(used) + '</span></div>';
                html += '<div class="detail-row"><span class="label" data-i18n="orders_remaining">剩余额度</span><span class="value" style="color:' + (remain > 0 ? '#16a34a' : '#dc2626') + ';font-weight:600">$' + fmt(remain) + '</span></div>';
            }
            html += '</div>';

            html += '<div style="text-align:right;margin-top:16px">';
            html += '<button class="btn-save-account" id="btnSaveAccount" onclick="saveAccount()">' + t('orders_save_changes') + '</button>';
            html += '</div>';

            container.innerHTML = html;
            overlay.classList.add('show');
        };

        window.closeAccount = function() {
            document.getElementById('accountOverlay').classList.remove('show');
        };

        document.getElementById('headerUserArea').addEventListener('click', function() { openAccount(); });

        window.saveAccount = async function() {
            const btn = document.getElementById('btnSaveAccount');
            btn.textContent = t('register_btn_loading');
            btn.disabled = true;
            try {
                const company = document.getElementById('acctCompany').value.trim();
                const contactEmail = document.getElementById('acctEmail').value.trim();
                const country = document.getElementById('acctCountry').value.trim();

                if (clientProfile && clientProfile.id) {
                    await updateDoc(doc(db, 'clientProfiles', clientProfile.id), {
                        company, contactEmail, country
                    });
                } else {
                    // No profile yet - create one
                    const { setDoc } = await import("../shared/pocketbase-init.js?v=2");
                    await setDoc(doc(db, 'clientProfiles', user.id), {
                        name: user.email.split('@')[0],
                        company, contactEmail, country,
                        registeredAt: new Date()
                    });
                    clientProfile = { id: user.id, name: user.email.split('@')[0], company, contactEmail, country };
                }
                clientProfile.company = company;
                clientProfile.contactEmail = contactEmail;
                clientProfile.country = country;
                btn.textContent = t('orders_saved');
                setTimeout(() => { btn.textContent = t('orders_save_changes'); btn.disabled = false; }, 1500);
            } catch (e) {
                console.error('Save failed:', e);
                alert(t('operation_failed') + ': ' + (e.message || ''));
                btn.textContent = t('orders_save_changes');
                btn.disabled = false;
            }
        };

        window.logout = async function() {
            await firebaseLogout();
            window.location.href = '../auth/login.html';
        };
    </script>
</body>
</html>
