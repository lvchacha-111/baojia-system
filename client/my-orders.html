<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单 - 报价系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
        }

        .bg-dot {
            position: fixed; inset: 0;
            background: radial-gradient(circle, #e5e5e5 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none; z-index: 0;
        }

        .header {
            position: relative; z-index: 1;
            background: #fff; border-bottom: 1px solid #eee;
            padding: 0 32px; height: 56px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .header-left {
            display: flex; align-items: center; gap: 10px;
        }

        .header-logo {
            width: 28px; height: 28px;
            background: #1a1a1a; border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
        }

        .header-logo svg {
            width: 14px; height: 14px;
            fill: none; stroke: #fff; stroke-width: 2;
        }

        .header-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }

        .header-right { display: flex; align-items: center; gap: 16px; }

        .header-user-area {
            display: flex; align-items: center; gap: 10px;
            cursor: pointer; padding: 4px 8px; border-radius: 8px;
            transition: background 0.15s;
        }
        .header-user-area:hover { background: #f5f5f5; }

        .btn-back { font-size: 13px; color: #666; background: none; border: none; cursor: pointer; padding: 6px 0; text-decoration: none; }
        .btn-back:hover { color: #1a1a1a; }

        .header-pm-tag {
            display: inline-block; font-size: 11px; font-weight: 600;
            padding: 4px 10px; border-radius: 6px; white-space: nowrap;
            position: relative; cursor: default;
        }
        .header-pm-tag.monthly { background: #eff6ff; color: #2563eb; }
        .header-pm-tag.credit { background: #f3e8ff; color: #7c3aed; }
        .header-pm-tag.pay_before_ship { background: #fff7ed; color: #c2410c; }
        .header-pm-tag.prepaid { background: #f0fdf4; color: #16a34a; }
        .header-pm-tag.full { background: #fef2f2; color: #dc2626; }

        .header-pm-popup {
            display: none; position: absolute; top: calc(100% + 8px); left: 50%;
            transform: translateX(-50%); white-space: nowrap;
            background: #1a1a1a; color: #fff; font-size: 13px; font-weight: 500;
            padding: 12px 16px; border-radius: 10px; line-height: 1.6;
            pointer-events: none; z-index: 300;
        }
        .header-pm-popup .popup-row {
            display: flex; gap: 16px; align-items: center;
        }
        .header-pm-popup .popup-label { color: #aaa; font-size: 11px; font-weight: 400; }
        .header-pm-popup .popup-val { font-size: 15px; font-weight: 700; }
        .header-pm-popup .popup-divider { color: #555; font-size: 15px; }
        .header-pm-tag:hover .header-pm-popup { display: block; }
        .header-pm-warn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 16px; height: 16px; border-radius: 50%;
            background: #f59e0b; color: #fff; font-size: 10px; font-weight: 700;
            margin-right: 3px; vertical-align: middle; cursor: help;
        }
        .header-pm-warn.danger {
            background: #dc2626;
        }
        .header-pm-tag.exhausted {
            background: #fef2f2; color: #dc2626;
        }

        .header-user-text { line-height: 1.3; }
        .header-user-name { font-size: 13px; font-weight: 500; color: #1a1a1a; display: block; }
        .header-user-email { font-size: 11px; color: #999; display: block; }

        .btn-logout {
            font-size: 13px; color: #999;
            background: none; border: none; cursor: pointer;
            padding: 6px 12px; border-radius: 6px; transition: all 0.15s;
        }

        .btn-logout:hover { color: #dc2626; background: #fef2f2; }

        .header-bell { position: relative; cursor: pointer; padding: 6px; border-radius: 8px; border: none; background: none; }
        .header-bell:hover { background: #f5f5f5; }
        .header-bell svg { width: 20px; height: 20px; color: #666; display: block; }
        .header-bell-badge { position: absolute; top: 1px; right: 1px; min-width: 16px; height: 16px; background: #dc2626; color: #fff; font-size: 10px; font-weight: 700; border-radius: 8px; display: none; align-items: center; justify-content: center; padding: 0 4px; }
        .header-bell-badge.show { display: flex; }

        .notif-dropdown {
            display: none; position: absolute; top: calc(100% + 8px); right: 0;
            width: 380px; max-height: 480px; background: #fff; border-radius: 14px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.12); border: 1px solid #eee;
            z-index: 200; flex-direction: column; overflow: hidden;
        }
        .notif-dropdown.show { display: flex; }
        .notif-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px; border-bottom: 1px solid #f0f0f0;
            font-size: 14px; font-weight: 600; color: #1a1a1a;
        }
        .notif-mark-all {
            font-size: 12px; color: #6366f1; cursor: pointer; border: none; background: none; font-weight: 500;
        }
        .notif-mark-all:hover { color: #4f46e5; }
        .notif-list { overflow-y: auto; max-height: 400px; }
        .notif-item {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 14px 18px; cursor: pointer; border-bottom: 1px solid #f9f9f9;
            transition: background 0.1s; position: relative;
        }
        .notif-item:hover { background: #f8f9fa; }
        .notif-item.unread { background: #fafaff; }
        .notif-item.unread:hover { background: #f0f0ff; }
        .notif-dot { width: 8px; height: 8px; border-radius: 50%; background: #6366f1; flex-shrink: 0; margin-top: 6px; }
        .notif-dot.read { visibility: hidden; }
        .notif-content { flex: 1; min-width: 0; }
        .notif-title { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; }
        .notif-body { font-size: 12px; color: #888; line-height: 1.5; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .notif-time { font-size: 11px; color: #bbb; flex-shrink: 0; margin-top: 2px; }
        .notif-empty { text-align: center; padding: 40px 20px; color: #ccc; font-size: 13px; }
        .notif-empty svg { width: 36px; height: 36px; margin-bottom: 8px; color: #ddd; }
        @media (max-width: 600px) {
            .notif-dropdown { width: calc(100vw - 32px); right: -60px; }
        }

        .account-input {
            width: 200px; padding: 6px 10px;
            border: 1px solid #ddd; border-radius: 6px;
            font-size: 13px; color: #1a1a1a; outline: none;
            transition: border-color 0.15s;
        }
        .account-input:focus { border-color: #6366f1; }
        .btn-save-account {
            padding: 10px 28px; background: #1a1a1a; color: #fff;
            border: none; border-radius: 10px; font-size: 14px; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-save-account:hover { background: #333; }
        .btn-save-account:disabled { opacity: 0.6; cursor: default; }
        .payment-tag {
            display: inline-block; font-size: 11px; font-weight: 500;
            padding: 2px 8px; border-radius: 4px;
        }
        .payment-tag.monthly { background: #eff6ff; color: #2563eb; }
        .payment-tag.credit { background: #f3e8ff; color: #7c3aed; }
        .payment-tag.pay_before_ship { background: #fff7ed; color: #c2410c; }
        .payment-tag.prepaid { background: #f0fdf4; color: #16a34a; }
        .payment-tag.full { background: #fef2f2; color: #dc2626; }
        .payment-status-tag {
            font-size: 10px; font-weight: 500; padding: 2px 6px; border-radius: 3px; margin-left: 4px; vertical-align: middle;
        }
        .payment-status-tag.finalized { background: #f0fdf4; color: #16a34a; }
        .payment-status-tag.active { background: #f5f5f5; color: #888; }

        /* Manager area in header */
        .header-mgr {
            display: flex; align-items: center; gap: 6px;
            padding: 4px 10px; border-radius: 8px;
            cursor: pointer; transition: all 0.15s;
            border: 1px solid transparent;
            max-width: 160px; text-decoration: none;
        }
        .header-mgr:hover { background: #f5f5f5; border-color: #e8e8e8; }
        .header-mgr.waiting { opacity: 0.55; cursor: default; }
        .header-mgr.waiting:hover { background: transparent; border-color: transparent; }
        .header-mgr-avatar {
            width: 26px; height: 26px; border-radius: 8px;
            background: #eef2ff; color: #6366f1;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 600; flex-shrink: 0;
        }
        .header-mgr.waiting .header-mgr-avatar { background: #f5f5f5; color: #ccc; }
        .header-mgr-text { line-height: 1.2; min-width: 0; }
        .header-mgr-label { font-size: 9px; color: #aaa; display: block; }
        .header-mgr-name {
            font-size: 12px; font-weight: 500; color: #1a1a1a;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .header-mgr.waiting .header-mgr-name { color: #bbb; }

        /* Chat overlay */
        .chat-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.4); z-index: 300;
            align-items: center; justify-content: center;
        }
        .chat-overlay.show { display: flex; }
        .chat-dialog {
            background: #fff; border-radius: 16px;
            width: 440px; max-width: 92vw; max-height: 580px;
            display: flex; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden;
        }
        .chat-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px; border-bottom: 1px solid #eee; flex-shrink: 0;
        }
        .chat-header-left { display: flex; align-items: center; gap: 10px; }
        .chat-header-avatar {
            width: 34px; height: 34px; border-radius: 10px;
            background: #eef2ff; color: #6366f1;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 600; flex-shrink: 0;
        }
        .chat-header-info h4 { font-size: 15px; font-weight: 600; color: #1a1a1a; }
        .chat-header-info span { font-size: 12px; color: #999; }
        .chat-header-actions { display: flex; gap: 6px; }
        .chat-btn-detail {
            width: 30px; height: 30px; border-radius: 8px;
            border: none; background: #f5f5f5; color: #888;
            font-size: 13px; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: all 0.15s; text-decoration: none;
        }
        .chat-btn-detail:hover { background: #e0e7ff; color: #6366f1; }
        .chat-close {
            width: 30px; height: 30px; border-radius: 8px;
            border: none; background: #f5f5f5;
            font-size: 18px; color: #666; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .chat-close:hover { background: #eee; color: #1a1a1a; }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 16px 18px;
            display: flex; flex-direction: column; gap: 10px;
            min-height: 200px; max-height: 360px;
        }
        .chat-messages .empty { text-align: center; color: #ccc; font-size: 13px; padding: 60px 0; }
        .chat-bubble {
            max-width: 72%; padding: 10px 14px;
            border-radius: 16px; font-size: 14px; line-height: 1.5; word-break: break-word;
        }
        .chat-bubble.left { align-self: flex-start; background: #f5f5f5; color: #333; border-bottom-left-radius: 4px; }
        .chat-bubble.right { align-self: flex-end; background: #6366f1; color: #fff; border-bottom-right-radius: 4px; }
        .chat-bubble .time { font-size: 10px; opacity: 0.5; margin-top: 3px; text-align: right; }
        .chat-input-area {
            display: flex; gap: 8px; padding: 12px 14px;
            border-top: 1px solid #eee; flex-shrink: 0;
        }
        .chat-input-area input {
            flex: 1; border: 1px solid #e8e8e8; border-radius: 10px;
            padding: 10px 14px; font-size: 14px; outline: none;
            font-family: inherit;
        }
        .chat-input-area input:focus { border-color: #6366f1; }
        .chat-input-area button {
            padding: 0 18px; border-radius: 10px; border: none;
            background: #6366f1; color: #fff; font-size: 14px; font-weight: 500;
            cursor: pointer; transition: all 0.15s; flex-shrink: 0;
        }
        .chat-input-area button:hover { background: #4f46e5; }
        .chat-input-area button:disabled { opacity: 0.5; cursor: default; }

        /* Business card overlay */
        .bizcard-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.3); z-index: 320;
            align-items: center; justify-content: center;
        }
        .bizcard-overlay.show { display: flex; }
        .bizcard {
            background: #fff; border-radius: 16px; padding: 28px;
            width: 380px; max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .bizcard-header {
            display: flex; align-items: center; gap: 14px; margin-bottom: 20px;
        }
        .bizcard-avatar {
            width: 48px; height: 48px; border-radius: 12px;
            background: #eef2ff; color: #6366f1;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 600; flex-shrink: 0;
        }
        .bizcard-name { font-size: 18px; font-weight: 600; color: #1a1a1a; }
        .bizcard-email { font-size: 13px; color: #999; }
        .bizcard-section { margin-bottom: 14px; }
        .bizcard-label { font-size: 11px; color: #aaa; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .bizcard-value { font-size: 14px; color: #333; }
        .bizcard-contact-item {
            display: inline-block; padding: 4px 10px; margin: 2px 4px 2px 0;
            background: #f5f5f5; border-radius: 6px; font-size: 13px; color: #555;
        }
        .bizcard-contact-item strong { color: #888; font-weight: 500; font-size: 11px; }
        .bizcard-bio { font-size: 13px; color: #666; line-height: 1.6; }
        .bizcard-close-row { margin-top: 16px; text-align: right; }
        .bizcard-close-row button {
            padding: 8px 20px; border-radius: 8px; border: 1px solid #e8e8e8;
            background: #fff; color: #666; font-size: 13px; cursor: pointer;
        }
        .bizcard-close-row button:hover { background: #f5f5f5; }

        .filter-bar {
            display: flex; gap: 12px; margin-bottom: 20px; align-items: center;
        }
        .filter-month {
            padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 13px; color: #1a1a1a; background: #fff; outline: none;
            cursor: pointer; min-width: 130px;
        }
        .filter-month:focus { border-color: #6366f1; }
        .filter-search {
            flex: 1; padding: 8px 14px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 13px; color: #1a1a1a; outline: none; background: #fff;
        }
        .filter-search:focus { border-color: #6366f1; }
        .filter-search::placeholder { color: #ccc; }
        .filter-result { font-size: 12px; color: #999; margin-bottom: 16px; }

        .main {
            position: relative; z-index: 1;
            max-width: 720px; margin: 0 auto; padding: 60px 32px;
        }

        .greeting { margin-bottom: 32px; }

        .greeting h2 {
            font-size: 24px; font-weight: 600; color: #1a1a1a;
            letter-spacing: -0.3px;
        }

        .greeting p { font-size: 14px; color: #999; margin-top: 4px; }

        .card-grid {
            display: grid; gap: 20px;
        }

        .card {
            background: #fff; border-radius: 14px; border: 1px solid #eee;
            padding: 36px 32px; cursor: pointer;
            transition: all 0.25s;
            text-decoration: none; display: flex; align-items: center; gap: 20px;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            border-color: #ddd;
        }

        .card-icon {
            width: 52px; height: 52px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            background: #f0f4ff; color: #4f6ef7;
        }

        .card-icon svg {
            width: 24px; height: 24px;
            fill: none; stroke: currentColor; stroke-width: 1.8;
        }

        .card-body h3 {
            font-size: 17px; font-weight: 600; color: #1a1a1a;
            margin-bottom: 4px;
        }

        .card-body p { font-size: 13px; color: #999; }

        .empty-state {
            text-align: center; padding: 80px 20px;
        }

        .empty-state .icon {
            width: 64px; height: 64px; border-radius: 50%;
            background: #f5f5f5;
            display: inline-flex; align-items: center; justify-content: center;
            margin-bottom: 20px;
        }

        .empty-state .icon svg {
            width: 28px; height: 28px;
            fill: none; stroke: #ccc; stroke-width: 1.5;
        }

        .empty-state h3 { font-size: 17px; color: #1a1a1a; margin-bottom: 6px; }
        .empty-state p { font-size: 14px; color: #999; }

        /* Order cards */
        .order-card {
            background: #fff; border-radius: 12px; border: 1px solid #eee;
            padding: 20px 24px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            transition: all 0.2s; margin-bottom: 12px;
        }
        .order-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border-color: #ddd;
        }
        .order-left .order-number {
            font-size: 15px; font-weight: 600; color: #1a1a1a;
        }
        .order-left .order-meta {
            font-size: 13px; color: #999; margin-top: 3px;
        }
        .order-sales {
            font-size: 12px; color: #888; margin-top: 4px;
        }
        .order-price {
            font-size: 18px; font-weight: 700; color: #1a1a1a;
        }

        /* Detail overlay */
        .detail-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 100; overflow-y: auto;
        }
        .detail-overlay.show { display: block; }

        .detail-container {
            background: #fff; border-radius: 16px;
            max-width: 680px; margin: 40px auto;
            padding: 40px;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .detail-close {
            position: absolute; top: 16px; right: 16px;
            width: 36px; height: 36px; border-radius: 10px;
            border: none; background: #f5f5f5;
            font-size: 20px; color: #666; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .detail-close:hover { background: #eee; color: #1a1a1a; }

        .detail-section {
            background: #fafafa; border-radius: 10px;
            padding: 16px 20px; margin-bottom: 12px;
        }
        .detail-section h4 {
            font-size: 14px; font-weight: 600; color: #1a1a1a;
            margin-bottom: 10px; padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }
        .detail-row {
            display: flex; justify-content: space-between;
            padding: 6px 0; font-size: 14px;
        }
        .detail-row .label { color: #888; }
        .detail-row .value { color: #1a1a1a; font-weight: 500; }

        .detail-total {
            text-align: right; margin-top: 16px; padding-top: 16px;
            border-top: 2px solid #eee;
            font-size: 24px; font-weight: 700; color: #1a1a1a;
        }
        .detail-total small {
            font-size: 13px; color: #999; font-weight: 400; margin-right: 8px;
        }

        .svg-preview-box {
            background: #fff; border: 1px solid #eee; border-radius: 8px;
            padding: 16px; text-align: center;
            max-height: 300px; overflow: auto;
        }
        .svg-preview-box svg { max-width: 100%; height: auto; }
        .status-badge {
            display: inline-block; font-size: 11px; font-weight: 500;
            padding: 2px 8px; border-radius: 4px; margin-left: 6px; vertical-align: middle;
        }
        .status-pending { background: #fefce8; color: #a16207; }
        .status-in_production { background: #eff6ff; color: #2563eb; }
        .status-completed { background: #f0fdf4; color: #16a34a; }
        .status-shipped { background: #faf5ff; color: #9333ea; }
        .status-signed { background: #f0fdf4; color: #15803d; }
        .status-confirmed { background: #fefce8; color: #ca8a04; }
        .progress-wrap { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
        .progress-bar { flex: 1; height: 5px; background: #eee; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 3px; background: #22c55e; transition: width 0.4s; }
        .progress-pct { font-size: 12px; font-weight: 600; color: #22c55e; min-width: 34px; text-align: right; }
        .status-help {
            display: inline-block; width: 16px; height: 16px; border-radius: 50%;
            background: #e5e5e5; color: #999; font-size: 11px; font-weight: 600;
            text-align: center; line-height: 16px; cursor: help;
            margin-left: 4px; vertical-align: middle; position: relative;
        }
        .status-help .help-tip {
            display: none; position: absolute; bottom: calc(100% + 8px); left: 50%;
            transform: translateX(-50%); white-space: nowrap;
            background: #1a1a1a; color: #fff; font-size: 12px; font-weight: 400;
            padding: 10px 14px; border-radius: 8px; line-height: 1.6;
            pointer-events: none; z-index: 300;
        }
        .status-help:hover .help-tip { display: block; }

        .lang-switch {
            font-size: 12px; color: #999; border: 1px solid #e8e8e8;
            border-radius: 6px; padding: 4px 8px; background: #fff;
            cursor: pointer; outline: none;
        }
    </style>
</head>
<body>
    <div class="bg-dot"></div>

    <header class="header">
        <div class="header-left">
            <a href="user.html" class="btn-back" data-i18n="back">← 返回</a>
            <span class="header-title" data-i18n="orders_title">我的订单</span>
        </div>
        <div class="header-right">
            <div class="header-mgr waiting" id="headerMgr" onclick="openChat()" title="客户经理">
                <div class="header-mgr-avatar" id="mgrAvatar">?</div>
                <div class="header-mgr-text">
                    <span class="header-mgr-label">客户经理</span>
                    <span class="header-mgr-name" id="mgrName">待分配</span>
                </div>
            </div>
            <select class="lang-switch" onchange="switchLang(this.value)">
                <option value="zh">中文</option>
                <option value="en">EN</option>
            </select>
            <div class="header-user-area" id="headerUserArea">
                <span class="header-pm-tag" id="headerPmTag" style="display:none"></span>
                <div class="header-user-text">
                    <span class="header-user-name" id="headerUserName"></span>
                    <span class="header-user-email" id="headerUserEmail"></span>
                </div>
            </div>
            <div style="position:relative">
                <button class="header-bell" id="headerBell" onclick="toggleNotif()" title="通知">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                    <span class="header-bell-badge" id="bellBadge">0</span>
                </button>
                <div class="notif-dropdown" id="notifDropdown">
                    <div class="notif-header">
                        <span data-i18n="orders_notifications">消息通知</span>
                        <button class="notif-mark-all" onclick="event.stopPropagation();markAllNotifRead()" data-i18n="orders_mark_all_read">全部已读</button>
                    </div>
                    <div class="notif-list" id="notifList"></div>
                </div>
            </div>
            <button class="btn-logout" onclick="logout()" data-i18n="user_logout">退出</button>
        </div>
    </header>

    <main class="main">
        <div class="greeting">
            <h2 data-i18n="orders_title">我的订单</h2>
            <p data-i18n="orders_greeting_subtitle">查看您的订单和报价</p>
        </div>

        <div class="filter-bar">
            <select class="filter-month" id="filterMonth" onchange="applyFilters()">
                <option value="" data-i18n="orders_all_months">全部月份</option>
            </select>
            <input class="filter-search" id="filterSearch" type="text" data-i18n-placeholder="orders_search_placeholder" placeholder="搜索报价号或产品名称..." oninput="applyFilters()">
        </div>
        <div class="filter-result" id="filterResult"></div>

        <div id="orderListContainer">
            <div class="empty-state" id="emptyState">
                <div class="icon">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                </div>
                <h3 data-i18n="orders_empty_title">暂无订单</h3>
                <p data-i18n="orders_empty_subtitle">您的订单将在这里显示</p>
            </div>
        </div>
    </main>

    <!-- Order detail overlay -->
    <div class="detail-overlay" id="detailOverlay">
        <div class="detail-container" id="detailContainer"></div>
    </div>

    <!-- Account overlay -->
    <div class="detail-overlay" id="accountOverlay">
        <div class="detail-container" id="accountContainer"></div>
    </div>

    <!-- Chat overlay -->
    <div class="chat-overlay" id="chatOverlay" onclick="if(event.target===this)closeChat()">
        <div class="chat-dialog">
            <div class="chat-header">
                <div class="chat-header-left">
                    <div class="chat-header-avatar" id="chatAvatar">S</div>
                    <div class="chat-header-info">
                        <h4 id="chatName">业务员</h4>
                        <span id="chatEmail">loading...</span>
                    </div>
                </div>
                <div class="chat-header-actions">
                    <button class="chat-btn-detail" onclick="showBizcard()" title="查看资料">i</button>
                    <button class="chat-close" onclick="closeChat()">×</button>
                </div>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="empty">暂无消息，发送第一条消息吧</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter'){event.preventDefault();sendMessage()}">
                <button id="chatSendBtn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <!-- Business card overlay -->
    <div class="bizcard-overlay" id="bizcardOverlay" onclick="if(event.target===this)closeBizcard()">
        <div class="bizcard" id="bizcardContent"></div>
    </div>

    <script src="../shared/pocketbase.umd.js"></script>
    <script src="../shared/i18n.js" type="module"></script>
    <script type="module">
        import { auth, getCurrentUser, logout as firebaseLogout, db } from "../shared/pocketbase-init.js?v=3";
        import { t, getLang } from "../shared/i18n.js";

        document.querySelector('.lang-switch').value = getLang();
        import { collection, getDocs, query, orderBy, updateDoc, doc, where, getDoc, subscribe, addDoc, pb, limit, serverTimestamp } from "../shared/pocketbase-init.js?v=3";

        const user = await getCurrentUser();
        if (!user) {
            window.location.href = '../auth/login.html';
        }
        // Guard: salesperson accounts should not use client pages
        if (user.email && /^sales\d{2}@test\.com$/.test(user.email)) {
            alert('当前登录的是业务员账号（' + user.email + '），请退出后用客户账号登录。即将跳转到业务员工作台。');
            window.location.href = '../admin/myorders.html';
        }

        // Set initial header with email
        const emailPrefix = user.email.split('@')[0];
        document.getElementById('headerUserName').textContent = emailPrefix;
        document.getElementById('headerUserEmail').textContent = user.email;

        let allOrders = [];
        let clientProfile = null;

        function updateHeaderFromProfile() {
            const p = clientProfile;
            const nameEl = document.getElementById('headerUserName');
            const pmTag = document.getElementById('headerPmTag');
            const displayName = (p && p.name) || emailPrefix;
            nameEl.textContent = displayName;

            const pm = p ? p.paymentMethod : null;
            if (pm) {
                const pmLabels = { monthly: t('pay_monthly'), credit: t('pay_credit'), pay_before_ship: t('pay_before_ship'), prepaid: t('pay_prepaid'), full: t('pay_full') };
                pmTag.style.display = '';

                // Build popup
                let popupHtml = '';
                let warnHtml = '';
                let labelText = pmLabels[pm] || pm;
                let tagClass = 'header-pm-tag ' + pm;

                if (pm === 'credit') {
                    const limit = p.creditLimit || 0;
                    const used = p.creditUsed || 0;
                    if (limit > 0 && used >= limit) {
                        warnHtml = '<span class="header-pm-warn danger" title="' + t('orders_exhausted_title') + '">!</span>';
                        labelText = t('orders_exhausted');
                        tagClass = 'header-pm-tag exhausted';
                    } else if (limit > 0 && used >= limit * 2 / 3) {
                        warnHtml = '<span class="header-pm-warn" title="' + t('orders_almost_exhausted_title') + '">!</span>';
                    }
                    popupHtml = '<div class="header-pm-popup"><div class="popup-row">';
                    popupHtml += '<div><div class="popup-label">' + t('orders_credit_limit') + '</div><div class="popup-val">$' + fmt(limit) + '</div></div>';
                    popupHtml += '<div class="popup-divider">/</div>';
                    popupHtml += '<div><div class="popup-label">' + t('orders_used') + '</div><div class="popup-val">$' + fmt(used) + '</div></div>';
                    popupHtml += '</div></div>';
                } else {
                    popupHtml = '<div class="header-pm-popup"><div style="font-size:13px">' + (pmLabels[pm] || pm) + '</div></div>';
                }
                pmTag.className = tagClass;
                pmTag.innerHTML = warnHtml + labelText + popupHtml;
            } else {
                pmTag.style.display = 'none';
            }
        }

        async function loadClientProfile() {
            try {
                const q = query(collection(db, 'clientProfiles'), where('name', '==', emailPrefix));
                const snap = await getDocs(q);
                snap.forEach(d => {
                    clientProfile = { ...d.data(), id: d.id, uid: d.data().uid || d.id };
                });
                if (!clientProfile) {
                    const allSnap = await getDocs(collection(db, 'clientProfiles'));
                    allSnap.forEach(d => {
                        if (d.data().contactEmail === user.email) {
                            clientProfile = { ...d.data(), id: d.id, uid: d.data().uid || d.id };
                        }
                    });
                }
                updateHeaderFromProfile();
                loadSalespersonInfo();
            } catch (e) { console.warn('加载账户信息失败:', e); }
        }
        loadClientProfile();

        window.addEventListener('langChanged', () => {
            updateHeaderFromProfile();
        });

        // ===== 客户经理 =====
        let salespersonInfo = null;
        let conversationId = null;
        let _chatPollInterval = null;
        let profileUnsub = null;

        async function loadSalespersonInfo() {
            try {
                let assignedTo = clientProfile ? clientProfile.assignedTo : null;
                if (!assignedTo) {
                    const cpSnap = await getDocs(query(collection(db, 'clientProfiles'), where('uid', '==', user.id)));
                    cpSnap.forEach(d => { assignedTo = d.data().assignedTo; });
                }
                const mgrArea = document.getElementById('headerMgr');
                if (!assignedTo) {
                    mgrArea.classList.add('waiting');
                    document.getElementById('mgrAvatar').textContent = '?';
                    document.getElementById('mgrName').textContent = '待分配';
                    return;
                }
                const spRecords = await pb.collection('salesperson_profiles').getFullList({ filter: `email = "${assignedTo}"` });
                let spData = null, spUid = null;
                if (spRecords.length > 0) { spData = spRecords[0]; spUid = spData.uid; }
                if (!spData) {
                    mgrArea.classList.add('waiting');
                    document.getElementById('mgrAvatar').textContent = '!';
                    document.getElementById('mgrName').textContent = '未找到';
                    return;
                }
                salespersonInfo = {
                    email: spData.email || assignedTo, uid: spUid,
                    displayName: spData.displayName || '',
                    phone: spData.phone || '',
                    contacts: spData.contacts || [],
                    bio: spData.bio || ''
                };
                mgrArea.classList.remove('waiting');
                const dn = salespersonInfo.displayName || assignedTo.split('@')[0];
                document.getElementById('mgrAvatar').textContent = dn.charAt(0).toUpperCase();
                document.getElementById('mgrName').textContent = dn;
                const convSnap = await getDocs(query(
                    collection(db, 'conversations'),
                    where('ownerUid', '==', user.id),
                    where('salesEmail', '==', assignedTo)
                ));
                convSnap.forEach(d => { conversationId = d.id; });
                // Fallback: any conversation for this client (regardless of salesEmail)
                if (!conversationId) {
                    const fallbackSnap = await getDocs(query(
                        collection(db, 'conversations'),
                        where('ownerUid', '==', user.id)
                    ));
                    fallbackSnap.forEach(d => { conversationId = d.id; });
                    if (conversationId) {
                        updateDoc(doc(db, 'conversations', conversationId), {
                            salesEmail: assignedTo, salesUid: salespersonInfo.uid
                        }).catch(() => {});
                    }
                }
                if (!conversationId) {
                    const newConv = await addDoc(collection(db, 'conversations'), {
                        ownerUid: user.id, salesEmail: assignedTo, salesUid: salespersonInfo.uid,
                        customerEmail: user.email,
                        customerName: (clientProfile && clientProfile.name) || user.email.split('@')[0],
                        lastMessage: '', lastTimestamp: new Date().toISOString(),
                        unreadForSales: 0, unreadForCustomer: 0
                    });
                    conversationId = newConv.id;
                }
                if (profileUnsub) profileUnsub();
                profileUnsub = subscribe('salesperson_profiles', (data) => {
                    if (data.action === 'update' && data.record.email === assignedTo) {
                        salespersonInfo.displayName = data.record.displayName || salespersonInfo.displayName;
                        salespersonInfo.phone = data.record.phone || '';
                        salespersonInfo.contacts = data.record.contacts || [];
                        salespersonInfo.bio = data.record.bio || '';
                        const dn2 = salespersonInfo.displayName || assignedTo.split('@')[0];
                        document.getElementById('mgrAvatar').textContent = dn2.charAt(0).toUpperCase();
                        document.getElementById('mgrName').textContent = dn2;
                    }
                }, `email = "${assignedTo}"`);
            } catch (e) { console.warn('加载客户经理失败:', e); }
        }

        window.openChat = function() {
            if (conversationId) {
                updateDoc(doc(db, 'conversations', conversationId), { unreadForCustomer: 0 }).catch(() => {});
                notifList = notifList.filter(n => n.id !== 'chat_' + conversationId);
                updateBellBadge();
                renderNotifList();
            }
            if (!salespersonInfo) return;
            const dn = salespersonInfo.displayName || salespersonInfo.email.split('@')[0];
            document.getElementById('chatAvatar').textContent = dn.charAt(0).toUpperCase();
            document.getElementById('chatName').textContent = dn;
            document.getElementById('chatEmail').textContent = salespersonInfo.email;
            document.getElementById('chatMessages').innerHTML = '<div class="empty">加载中...</div>';
            document.getElementById('chatOverlay').classList.add('show');
            loadMessages();
            if (_chatPollInterval) clearInterval(_chatPollInterval);
            _chatPollInterval = setInterval(loadMessages, 1000);
        };
        window.closeChat = function() {
            document.getElementById('chatOverlay').classList.remove('show');
            if (_chatPollInterval) { clearInterval(_chatPollInterval); _chatPollInterval = null; }
        };

        async function loadMessages() {
            if (!conversationId) return;
            try {
                const q = query(collection(db, 'messages'),
                    where('conversationId', '==', conversationId),
                    orderBy('timestamp', 'asc'), limit(200));
                const snap = await getDocs(q);
                const container = document.getElementById('chatMessages');
                const msgs = [];
                snap.forEach(d => { msgs.push(d.data()); });
                msgs.sort((a, b) => (new Date(a.timestamp || 0).getTime()) - (new Date(b.timestamp || 0).getTime()));
                if (msgs.length === 0) {
                    container.innerHTML = '<div class="empty">暂无消息，发送第一条消息吧</div>';
                } else {
                    container.innerHTML = msgs.map(m => renderBubble(m)).join('');
                    container.scrollTop = container.scrollHeight;
                }
            } catch (e) { console.warn('加载消息失败:', e); }
        }

        function renderBubble(m) {
            const isMine = m.from === user.email;
            const time = m.timestamp ? new Date(m.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : '';
            return `<div class="chat-bubble ${isMine ? 'right' : 'left'}">${escHTML(m.text)}<div class="time">${time}</div></div>`;
        }

        window.sendMessage = async function() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || !conversationId || !salespersonInfo) return;
            input.disabled = true;
            document.getElementById('chatSendBtn').disabled = true;
            try {
                const now = new Date().toISOString();
                await addDoc(collection(db, 'messages'), {
                    conversationId, from: user.email, text, timestamp: now
                });
                try {
                    await updateDoc(doc(db, 'conversations', conversationId), {
                        lastMessage: text, lastTimestamp: now, unreadForSales: 1
                    });
                } catch (e2) { /* ignore */ }
                input.value = ''; input.focus();
            } catch (e) {
                console.error('发送失败:', e);
                alert('发送失败，请重试');
            } finally {
                input.disabled = false;
                document.getElementById('chatSendBtn').disabled = false;
            }
        };

        window.showBizcard = function() {
            if (!salespersonInfo) return;
            const dn = salespersonInfo.displayName || salespersonInfo.email.split('@')[0];
            let html = `<div class="bizcard-header"><div class="bizcard-avatar">${dn.charAt(0).toUpperCase()}</div><div><div class="bizcard-name">${escHTML(dn)}</div><div class="bizcard-email">${escHTML(salespersonInfo.email)}</div></div></div>`;
            if (salespersonInfo.phone) html += `<div class="bizcard-section"><div class="bizcard-label">电话</div><div class="bizcard-value">${escHTML(salespersonInfo.phone)}</div></div>`;
            if (salespersonInfo.contacts && salespersonInfo.contacts.length > 0) {
                html += '<div class="bizcard-section"><div class="bizcard-label">联系方式</div>';
                salespersonInfo.contacts.forEach(c => { html += `<span class="bizcard-contact-item"><strong>${escHTML(c.type)}</strong> ${escHTML(c.value)}</span>`; });
                html += '</div>';
            }
            if (salespersonInfo.bio) html += `<div class="bizcard-section"><div class="bizcard-label">简介</div><div class="bizcard-bio">${escHTML(salespersonInfo.bio)}</div></div>`;
            html += '<div class="bizcard-close-row"><button onclick="closeBizcard()">关闭</button></div>';
            document.getElementById('bizcardContent').innerHTML = html;
            document.getElementById('bizcardOverlay').classList.add('show');
        };
        window.closeBizcard = function() {
            document.getElementById('bizcardOverlay').classList.remove('show');
        };

        // Notification bell with dropdown
        let notifList = [];
        const typeIcons = {
            bill: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#16a34a" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="2"/><line x1="6" y1="8" x2="18" y2="8"/><line x1="6" y1="12" x2="18" y2="12"/></svg>',
            order: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#6366f1" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
            system: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#f59e0b" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
        };

        async function loadNotifications() {
            try {
                const q = query(collection(db, 'notifications'),
                    where('clientUid', '==', user.id));
                const snap = await getDocs(q);
                notifList = [];
                snap.forEach(d => { notifList.push({ id: d.id, ...d.data() }); });
                notifList.sort((a, b) => (new Date(b.createdAt || 0).getTime()) - (new Date(a.createdAt || 0).getTime()));
                updateBellBadge();
                renderNotifList();
            } catch (e) { /* ignore */ }
        }

        const _origLoadNotif = loadNotifications;
        loadNotifications = async function() {
            await _origLoadNotif();
            try {
                const convSnap = await getDocs(query(
                    collection(db, 'conversations'),
                    where('ownerUid', '==', user.id)
                ));
                convSnap.forEach(d => {
                    const data = d.data();
                    if (data.unreadForCustomer > 0) {
                        const cid = 'chat_' + d.id;
                        if (!notifList.find(n => n.id === cid)) {
                            notifList.push({
                                id: cid, type: 'chat',
                                title: '客户经理发来消息',
                                body: data.lastMessage || '点击查看',
                                read: false,
                                createdAt: data.lastTimestamp || new Date().toISOString(),
                                link: null, _convId: d.id
                            });
                        }
                    }
                });
                notifList.sort((a, b) => (new Date(b.createdAt || 0).getTime()) - (new Date(a.createdAt || 0).getTime()));
                updateBellBadge();
                renderNotifList();
            } catch (e) { /* ignore */ }
        };

        function updateBellBadge() {
            const count = notifList.filter(n => !n.read).length;
            const badge = document.getElementById('bellBadge');
            if (badge) {
                if (count > 0) { badge.textContent = count > 99 ? '99+' : count; badge.classList.add('show'); }
                else { badge.classList.remove('show'); }
            }
        }

        function renderNotifList() {
            const container = document.getElementById('notifList');
            if (!container) return;
            if (notifList.length === 0) {
                container.innerHTML = '<div class="notif-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><p>' + t('no_data') + '</p></div>';
                return;
            }
            let html = '';
            notifList.forEach(n => {
                const time = n.createdAt ? new Date(n.createdAt).toLocaleString('zh-CN', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
                const icon = typeIcons[n.type] || typeIcons.system;
                html += '<div class="notif-item' + (n.read ? '' : ' unread') + '" data-nid="' + n.id + '" data-link="' + escHTML(n.link || '') + '" onclick="clickNotif(this)">';
                html += '<div class="notif-dot' + (n.read ? ' read' : '') + '"></div>';
                html += '<div style="flex-shrink:0;margin-top:2px">' + icon + '</div>';
                html += '<div class="notif-content"><div class="notif-title">' + escHTML(n.title || '') + '</div>';
                html += '<div class="notif-body">' + escHTML(n.body || '') + '</div></div>';
                html += '<div class="notif-time">' + time + '</div>';
                html += '</div>';
            });
            container.innerHTML = html;
        }

        window.toggleNotif = function() {
            const dd = document.getElementById('notifDropdown');
            dd.classList.toggle('show');
        };

        window.clickNotif = async function(el) {
            const nid = el.dataset.nid;
            if (nid && nid.startsWith('chat_')) {
                document.getElementById('notifDropdown').classList.remove('show');
                openChat();
                return;
            }
            const link = el.dataset.link;
            try {
                const { updateDoc, doc } = await import("../shared/pocketbase-init.js");
                await updateDoc(doc(db, 'notifications', nid), { read: true });
                const n = notifList.find(x => x.id === nid);
                if (n) n.read = true;
                updateBellBadge();
                renderNotifList();
            } catch (e) { /* ignore */ }
            if (link) window.location.href = link;
        };

        window.markAllNotifRead = async function() {
            try {
                const { updateDoc, doc } = await import("../shared/pocketbase-init.js");
                const unread = notifList.filter(n => !n.read);
                await Promise.all(unread.map(n => updateDoc(doc(db, 'notifications', n.id), { read: true })));
                unread.forEach(n => n.read = true);
                updateBellBadge();
                renderNotifList();
            } catch (e) { /* ignore */ }
        };

        document.addEventListener('click', function(e) {
            const dd = document.getElementById('notifDropdown');
            const bell = document.getElementById('headerBell');
            if (dd && dd.classList.contains('show') && !dd.contains(e.target) && e.target !== bell && !bell.contains(e.target)) {
                dd.classList.remove('show');
            }
        });

        await loadNotifications();
        setInterval(loadNotifications, 10000);
        subscribe('conversations', () => { loadNotifications(); }, `ownerUid = "${user.id}"`);

        // Real-time tracking: subscribe to quote changes so client sees tracking updates immediately
        subscribe('quotes', (data) => {
            if (data.action === 'update' || data.action === 'create') {
                const record = data.record;
                const idx = allOrders.findIndex(o => o.id === record.id);
                if (idx >= 0) {
                    allOrders[idx] = { id: record.id, ...record };
                } else if (data.action === 'create') {
                    allOrders.unshift({ id: record.id, ...record });
                }
                buildMonthOptions();
                renderOrders();
            }
        }, `ownerUid = "${user.id}"`);

        let loadError = null;
        try {
            const q = query(collection(db, 'users', user.id, 'quotes'), orderBy('createdAt', 'desc'));
            const snapshot = await getDocs(q);
            allOrders = [];
            snapshot.forEach(d => { allOrders.push({ id: d.id, ...d.data() }); });
        } catch (e) {
            console.error('加载订单失败:', e);
            loadError = e.message || t('orders_error_unknown');
        }

        // Build month dropdown from actual orders
        function formatMonthKey(d) {
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
        }
        function formatMonthDisplay(d) {
            const lang = getLang();
            if (lang === 'en') {
                return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
            }
            return d.getFullYear() + '年' + (d.getMonth() + 1) + '月';
        }
        function buildMonthOptions() {
            const monthMap = new Map();
            allOrders.forEach(o => {
                if (o.createdAt) {
                    const d = new Date(o.createdAt);
                    monthMap.set(formatMonthKey(d), d);
                }
            });
            const sel = document.getElementById('filterMonth');
            const currentVal = sel.value;
            sel.innerHTML = '<option value="">' + t('orders_all_months') + '</option>';
            Array.from(monthMap.entries()).sort((a, b) => b[0].localeCompare(a[0])).forEach(([key, d]) => {
                sel.innerHTML += '<option value="' + key + '">' + formatMonthDisplay(d) + '</option>';
            });
            sel.value = currentVal;
        }
        buildMonthOptions();

        // Filter and render orders
        function getFilteredOrders() {
            const monthVal = document.getElementById('filterMonth').value;
            const searchVal = document.getElementById('filterSearch').value.trim().toLowerCase();
            return allOrders.filter(o => {
                if (monthVal) {
                    if (!o.createdAt) return false;
                    const d = new Date(o.createdAt);
                    const m = formatMonthKey(d);
                    if (m !== monthVal) return false;
                }
                if (searchVal) {
                    const qn = (o.quoteNumber || '').toLowerCase();
                    const pn = (o.productName || '').toLowerCase();
                    if (!qn.includes(searchVal) && !pn.includes(searchVal)) return false;
                }
                return true;
            });
        }

        function renderOrders() {
            const filtered = getFilteredOrders();
            const container = document.getElementById('orderListContainer');
            const empty = document.getElementById('emptyState');
            const result = document.getElementById('filterResult');

            if (allOrders.length === 0) {
                empty.style.display = '';
                container.querySelectorAll('.order-card').forEach(c => c.remove());
                result.textContent = '';
                if (loadError) {
                    empty.querySelector('h3').textContent = t('orders_load_fail');
                    empty.querySelector('p').innerHTML = '<span style="color:#dc2626">' + loadError + '</span><br><span style="font-size:11px;color:#aaa">UID: ' + user.id + '</span>';
                } else {
                    empty.querySelector('h3').textContent = t('orders_no_orders');
                    empty.querySelector('p').innerHTML = t('orders_no_orders') + '<br><span style="font-size:11px;color:#aaa">UID: ' + user.id + '</span>';
                }
                return;
            }

            if (filtered.length === 0) {
                empty.style.display = '';
                empty.querySelector('h3').textContent = t('orders_no_match');
                empty.querySelector('p').textContent = t('no_results');
                container.querySelectorAll('.order-card').forEach(c => c.remove());
                result.textContent = t('total_results', { count: 0 });
                return;
            }

            empty.style.display = 'none';
            result.textContent = t('total_results', { count: filtered.length }) + (filtered.length !== allOrders.length ? ' (' + t('filter') + ' ' + allOrders.length + ')' : '');

            let html = '';
            filtered.forEach(o => {
                const date = o.createdAt ? new Date(o.createdAt).toLocaleDateString('zh-CN') : '-';
                const statusLabels = { pending: t('orders_status_pending'), confirmed: t('orders_status_confirmed'), in_production: t('orders_status_production'), completed: t('orders_status_completed'), shipped: t('orders_status_completed'), signed: t('orders_status_completed') };
                const s = o.status || 'pending';
                html += '<div class="order-card" data-oid="' + o.id + '">';
                html += '<div class="order-left">';
                html += '<div class="order-number">' + escHTML(o.quoteNumber || '-') + '<span class="status-badge status-' + s + '">' + (statusLabels[s] || t('orders_status_pending')) + '</span>' + (o.finalized ? ' <span class="payment-status-tag finalized">' + t('orders_status_completed') + '</span>' : '') + '</div>';
                html += '<div class="order-meta">' + escHTML(o.productName || '-') + ' · ' + date + '</div>';
                if (o.depositPercent || o.depositAmount) {
                    const dpPct = o.depositPercent || 0;
                    const dpPaid = o.depositPaid;
                    const total = o.totalPrice || 0;
                    const dpAmt = o.depositAmount || 0;
                    const rmAmt = o.remainderAmount || 0;
                    let prepaidHtml = '<div class="order-sales" style="display:flex;gap:12px;flex-wrap:wrap;margin-top:4px">';
                    if (dpPct === 100) {
                        if (dpPaid) {
                            prepaidHtml += '<span style="color:#16a34a">' + t('orders_payment_full_paid') + ' ✓</span>';
                        } else {
                            prepaidHtml += '<span style="color:#dc2626;font-weight:500">' + t('orders_payment_full_pending') + ' $' + fmt(total) + '</span>';
                        }
                    } else {
                        if (dpPaid) {
                            prepaidHtml += '<span style="color:#16a34a">' + t('orders_payment_deposit_paid') + ' ✓</span>';
                        } else {
                            prepaidHtml += '<span style="color:#dc2626;font-weight:500">' + t('orders_payment_deposit_pending') + ' $' + fmt(dpAmt) + '</span>';
                        }
                        const rmPaid = o.remainderPaid;
                        if (rmPaid) {
                            prepaidHtml += '<span style="color:#16a34a">' + t('orders_payment_balance_paid') + ' ✓</span>';
                        } else if (dpPaid) {
                            prepaidHtml += '<span style="color:#f59e0b;font-weight:500">' + t('orders_payment_balance_pending') + ' $' + fmt(rmAmt) + '</span>';
                        }
                    }
                    prepaidHtml += '</div>';
                    html += prepaidHtml;
                }
                if (s === 'in_production' && o.process) {
                    const pct = calcProgress(o.process, o.status);
                    html += '<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div><span class="progress-pct">' + pct + '%</span></div>';
                }
                if (o.shipments && o.shipments.length > 0) {
                    const latestShip = o.shipments[o.shipments.length - 1];
                    if (latestShip.publishedToClient) {
                        const ts = latestShip.trackingData ? (latestShip.trackingData.statusText || t('orders_status_shipping')) : t('orders_status_shipped');
                        html += '<div class="order-sales" style="color:#6366f1">' + t('orders_courier') + '：' + escHTML(ts) + '</div>';
                    }
                }
                html += '</div>';
                if (o.publishedBy) {
                    html += '<div class="order-sales">' + t('orders_sales_rep') + ': ' + escHTML(o.publishedBy.split('@')[0]) + '</div>';
                }
                html += '<div class="order-price">¥' + (o.totalPrice || 0).toFixed(2) + '</div>';
                html += '</div>';
            });

            // Clear old cards and insert new ones
            container.querySelectorAll('.order-card').forEach(c => c.remove());
            const temp = document.createElement('div');
            temp.innerHTML = html;
            while (temp.firstChild) {
                container.appendChild(temp.firstChild);
            }

            // Attach click handlers
            container.querySelectorAll('.order-card').forEach(card => {
                card.addEventListener('click', function() {
                    window.location.href = '../admin/order-detail.html?id=' + this.dataset.oid;
                });
            });
        }

        window.applyFilters = function() {
            renderOrders();
        };

        renderOrders();

        window.addEventListener('langChanged', () => {
            buildMonthOptions();
            renderOrders();
            updateHeaderFromProfile();
        });

        function showOrderDetail(o) {
            const container = document.getElementById('detailContainer');
            const date = o.createdAt ? new Date(o.createdAt).toLocaleDateString('zh-CN') : '-';
            let html = '<button class="detail-close" onclick="document.getElementById(\'detailOverlay\').classList.remove(\'show\')">×</button>';
            const statusLabels = { pending: t('orders_status_pending'), confirmed: t('orders_status_confirmed'), in_production: t('orders_status_production'), completed: t('orders_status_completed'), shipped: t('orders_status_completed'), signed: t('orders_status_completed') };
            const st = o.status || 'pending';
            html += '<div class="detail-header" style="text-align:center;margin-bottom:24px;padding:20px;background:#f8f9fa;border-radius:10px">';
            html += '<div style="font-size:13px;color:#999">' + t('orders_quote_number_label') + '</div>';
            html += '<div style="font-size:20px;font-weight:700;color:#1a1a1a;margin-top:4px">' + escHTML(o.quoteNumber || '-') + '</div>';
            html += '<div style="font-size:13px;margin-top:8px"><span class="status-badge status-' + st + '">' + (statusLabels[st] || t('orders_status_pending')) + '</span></div>';
            html += '<div style="font-size:14px;color:#666;margin-top:6px">' + date + '</div>';
            if (o.publishedBy) {
                html += '<div style="font-size:13px;color:#888;margin-top:4px">' + t('orders_sales_rep') + ': ' + escHTML(o.publishedBy.split('@')[0]) + '</div>';
            }
            html += '</div>';

            html += '<div class="detail-section"><h4>' + t('orders_product_name') + '</h4>';
            html += '<div class="detail-row"><span class="label">' + t('orders_product_name') + '</span><span class="value">' + escHTML(o.productId || '-') + '</span></div>';
            html += '<div class="detail-row"><span class="label">' + t('orders_product_name') + '</span><span class="value">' + escHTML(o.productName || '-') + '</span></div>';
            html += '<div class="detail-row"><span class="label">' + t('orders_area') + '</span><span class="value">' + escHTML(o.usageArea || '-') + '</span></div>';
            html += '</div>';

            if (o.fontPrices && o.fontPrices.length > 0) {
                html += '<div class="detail-section"><h4>' + t('orders_freight') + '</h4>';
                o.fontPrices.forEach(f => {
                    html += '<div class="detail-row"><span class="label">' + t('orders_length') + (f.length||0).toFixed(2) + '×' + t('orders_width') + (f.width||0).toFixed(2) + '×' + t('orders_thickness') + (f.thickness||0) + 'mm × ' + (f.quantity||0) + t('orders_pieces') + '</span><span class="value">¥' + (f.letterPrice||0).toFixed(2) + '</span></div>';
                });
                html += '</div>';
            }

            html += '<div class="detail-section"><h4>' + t('orders_fixing') + '</h4>';
            html += '<div class="detail-row"><span class="label">' + t('user_surface') + '</span><span class="value">' + escHTML(o.surfaceColor||'-') + '</span></div>';
            html += '<div class="detail-row"><span class="label">' + t('orders_paint_standard') + '</span><span class="value">' + escHTML(o.paint||'-') + '</span></div>';
            html += '<div class="detail-row"><span class="label">' + t('orders_power') + '</span><span class="value">' + escHTML(o.power||'-') + '</span></div>';
            html += '<div class="detail-row"><span class="label">' + t('orders_fixing') + '</span><span class="value">' + escHTML(o.fixing||'-') + '</span></div>';
            html += '</div>';

            html += '<div class="detail-section"><h4>' + t('user_total_price') + '</h4>';
            html += '<div class="detail-row"><span class="label">' + t('orders_total_price') + '</span><span class="value">¥' + (o.totalLetterPrice||0).toFixed(2) + '</span></div>';
            if (o.laborFee > 0) html += '<div class="detail-row"><span class="label">' + t('orders_freight') + '</span><span class="value">¥' + o.laborFee.toFixed(2) + '</span></div>';
            html += '</div>';

            if (o.freight) {
                html += '<div class="detail-section"><h4>' + t('orders_freight') + '</h4>';
                html += '<div class="detail-row"><span class="label">' + t('orders_payment_status') + '</span><span class="value">¥' + o.freight.price.toFixed(2) + '</span></div>';
                html += '</div>';
            }

            if (o.process && o.process.steps && o.process.steps.length > 0) {
                const pct = calcProgress(o.process, o.status);
                html += '<div class="detail-section"><h4>' + t('orders_status') + '</h4>';
                html += '<div class="progress-wrap" style="margin-bottom:12px"><div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div><span class="progress-pct">' + pct + '%</span></div>';
                html += '<div style="font-size:13px">';
                o.process.steps.forEach(s => {
                    html += '<div style="padding:4px 0;color:' + (s.done ? '#22c55e' : '#999') + '">' + (s.done ? '✓ ' : '○ ') + escHTML(s.name) + '</div>';
                });
                html += '</div></div>';
            }

            if (o.svgContent) {
                html += '<div class="detail-section"><h4>' + t('orders_vector') + '</h4>';
                html += '<div class="svg-preview-box">' + o.svgContent + '</div>';
                html += '</div>';
            }

            // Tracking info
            if (o.shipments && o.shipments.length > 0) {
                o.shipments.forEach(ship => {
                    if (!ship.publishedToClient) return;
                    html += '<div class="detail-section"><h4>' + t('orders_status') + '</h4>';
                    html += '<div class="detail-row"><span class="label">' + t('orders_quote_number') + '</span><span class="value">' + escHTML(ship.trackingNumber) + '</span></div>';
                    if (ship.shipmentType === 'merged' && ship.mergedOrderNumbers && ship.mergedOrderNumbers.length > 1) {
                        html += '<div class="detail-row"><span class="label">' + t('orders_merge_shipping') + '</span><span class="value" style="color:#6366f1">' + escHTML(ship.mergedOrderNumbers.join(', ')) + '</span></div>';
                    }
                    html += '<div class="detail-row"><span class="label">' + t('orders_save_changes') + '</span><span class="value">' + escHTML(ship.carrier || 'DHL') + '</span></div>';
                    html += '<div class="detail-row"><span class="label">' + t('orders_created_at') + '</span><span class="value">' + escHTML(ship.shipDate || '-') + '</span></div>';
                    if (ship.trackingData && ship.trackingData.events && ship.trackingData.events.length > 0) {
                        html += '<div style="margin-top:10px;font-size:13px">';
                        ship.trackingData.events.forEach(ev => {
                            html += '<div style="padding:4px 0;border-bottom:1px solid #f5f5f5">';
                            html += '<span style="color:#999;font-size:11px">' + escHTML(ev.time || '') + '</span> ';
                            html += escHTML(ev.location || '') + ' ';
                            html += '<span style="color:#1a1a1a">' + escHTML(ev.description || ev.status || '') + '</span>';
                            html += '</div>';
                        });
                        html += '</div>';
                    }
                    html += '</div>';
                });
            }

            html += '<div class="detail-total"><small>' + t('orders_total_label') + '</small>¥' + (o.totalPrice||0).toFixed(2) + '</div>';

            container.innerHTML = html;
            document.getElementById('detailOverlay').classList.add('show');
        }

        document.getElementById('detailOverlay').addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('show');
        });
        document.getElementById('accountOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeAccount();
        });

        function calcProgress(proc, status) {
            if (status === 'completed') return 100;
            if (!proc || !proc.steps || proc.steps.length === 0) return 0;
            const total = proc.steps.length;
            const done = proc.steps.filter(s => s.done).length;
            return total > 0 ? Math.round(done / total * 100) : 0;
        }

        function escHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        function fmt(n) { return Number(n || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

        window.openAccount = function() {
            const overlay = document.getElementById('accountOverlay');
            const container = document.getElementById('accountContainer');
            const p = clientProfile || {};
            const pm = p.paymentMethod || '';
            const pmLabels = { monthly: t('pay_monthly'), credit: t('pay_credit'), pay_before_ship: t('pay_before_ship'), prepaid: t('pay_prepaid'), full: t('pay_full') };

            let html = '<button class="detail-close" onclick="closeAccount()">×</button>';
            html += '<div class="detail-header">';
            html += '<div class="name">' + escHTML(p.name || user.email) + '</div>';
            html += '<div class="meta">' + escHTML(user.email) + '</div>';
            html += '</div>';

            html += '<div class="detail-section"><h4>' + t('orders_account_info') + '</h4>';
            html += '<div class="detail-row"><span class="label">' + t('orders_customer_name_label') + '</span><span class="value">' + escHTML(p.name || '-') + '</span></div>';
            html += '<div class="detail-row"><span class="label">' + t('orders_company_label') + '</span>';
            html += '<input class="account-input" id="acctCompany" value="' + escHTML(p.company || '') + '" placeholder="' + t('orders_company_label') + '">';
            html += '</div>';
            html += '<div class="detail-row"><span class="label">' + t('orders_contact_email_label') + '</span>';
            html += '<input class="account-input" id="acctEmail" value="' + escHTML(p.contactEmail || '') + '" placeholder="' + t('orders_contact_email_label') + '">';
            html += '</div>';
            html += '<div class="detail-row"><span class="label">' + t('orders_country_label') + '</span>';
            html += '<input class="account-input" id="acctCountry" value="' + escHTML(p.country || '') + '" placeholder="' + t('orders_country_label') + '">';
            html += '</div>';
            html += '</div>';

            html += '<div class="detail-section"><h4>' + t('orders_payment_info') + '</h4>';
            html += '<div class="detail-row"><span class="label">' + t('orders_payment_method_label') + '</span><span class="value">';
            html += pm ? '<span class="payment-tag ' + pm + '">' + (pmLabels[pm] || pm) + '</span>' : t('orders_not_set');
            html += '</span></div>';
            if (pm === 'credit') {
                const limit = p.creditLimit || 0;
                const used = p.creditUsed || 0;
                const remain = Math.max(0, limit - used);
                html += '<div class="detail-row"><span class="label">' + t('orders_credit_limit') + '</span><span class="value">' + t('orders_credit_total') + ' $' + fmt(limit) + '</span></div>';
                html += '<div class="detail-row"><span class="label">' + t('orders_used') + '</span><span class="value">$' + fmt(used) + '</span></div>';
                html += '<div class="detail-row"><span class="label">' + t('orders_remaining') + '</span><span class="value" style="color:' + (remain > 0 ? '#16a34a' : '#dc2626') + ';font-weight:600">$' + fmt(remain) + '</span></div>';
            }
            html += '</div>';

            html += '<div style="text-align:right;margin-top:16px">';
            html += '<button class="btn-save-account" id="btnSaveAccount" onclick="saveAccount()">' + t('orders_save_account') + '</button>';
            html += '</div>';

            container.innerHTML = html;
            overlay.classList.add('show');
        };

        window.closeAccount = function() {
            document.getElementById('accountOverlay').classList.remove('show');
        };

        document.getElementById('headerUserArea').addEventListener('click', function() { openAccount(); });

        window.saveAccount = async function() {
            const btn = document.getElementById('btnSaveAccount');
            btn.textContent = t('orders_saving');
            btn.disabled = true;
            try {
                const company = document.getElementById('acctCompany').value.trim();
                const contactEmail = document.getElementById('acctEmail').value.trim();
                const country = document.getElementById('acctCountry').value.trim();

                if (clientProfile && clientProfile.id) {
                    await updateDoc(doc(db, 'clientProfiles', clientProfile.id), {
                        company, contactEmail, country
                    });
                } else {
                    // No profile yet - create one
                    const { setDoc } = await import("../shared/pocketbase-init.js");
                    await setDoc(doc(db, 'clientProfiles', user.id), {
                        name: user.email.split('@')[0],
                        company, contactEmail, country,
                        registeredAt: new Date()
                    });
                    clientProfile = { id: user.id, name: user.email.split('@')[0], company, contactEmail, country };
                }
                clientProfile.company = company;
                clientProfile.contactEmail = contactEmail;
                clientProfile.country = country;
                btn.textContent = t('orders_saved');
                setTimeout(() => { btn.textContent = t('orders_save_account'); btn.disabled = false; }, 1500);
            } catch (e) {
                console.error('保存失败:', e);
                alert(t('orders_save_fail') + ': ' + (e.message || ''));
                btn.textContent = t('orders_save_account');
                btn.disabled = false;
            }
        };

        window.logout = async function() {
            await firebaseLogout();
            window.location.href = '../auth/login.html';
        };
    </script>
</body>
</html>
