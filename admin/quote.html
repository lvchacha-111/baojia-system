<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>报价 - 报价系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex; flex-direction: column;
        }

        .bg-gradient {
            position: fixed; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(99,102,241,0.05) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(139,92,246,0.03) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        /* ---- Header ---- */
        .header {
            position: relative; z-index: 1; flex-shrink: 0;
            background: #fff; border-bottom: 1px solid #eee;
            padding: 0 32px; height: 56px;
            display: flex; align-items: center; gap: 16px;
        }
        .btn-back {
            font-size: 13px; color: #666;
            background: none; border: none; cursor: pointer;
            padding: 6px 0; text-decoration: none;
        }
        .btn-back:hover { color: #1a1a1a; }
        .header-title { font-size: 16px; font-weight: 600; color: #1a1a1a; }

        /* ---- Step indicator ---- */
        .step-bar {
            position: relative; z-index: 1;
            display: flex; justify-content: center; gap: 8px;
            padding: 32px 0 0;
        }
        .step-dot {
            width: 36px; height: 36px; border-radius: 50%;
            background: #fff; border: 2px solid #e0e0e0;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 600; color: #bbb;
            transition: all 0.3s;
        }
        .step-dot.active { border-color: #6366f1; color: #6366f1; background: #eef2ff; }
        .step-dot.done { border-color: #22c55e; color: #22c55e; background: #f0fdf4; }
        .step-line {
            width: 40px; height: 2px; background: #e0e0e0;
            align-self: center; transition: background 0.3s;
        }
        .step-line.done { background: #22c55e; }

        /* ---- Main ---- */
        .main {
            position: relative; z-index: 1;
            flex: 1; padding: 32px;
            max-width: 780px; margin: 0 auto; width: 100%;
        }
        .page { display: none; }
        .page.active { display: block; }

        /* ---- Card ---- */
        .card {
            background: #fff; border-radius: 14px; border: 1px solid #eee;
            padding: 36px 32px; margin-bottom: 20px;
        }
        .card-title {
            font-size: 17px; font-weight: 600; color: #1a1a1a;
            margin-bottom: 24px; padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }

        /* ---- Form ---- */
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block; font-size: 13px; font-weight: 500;
            color: #555; margin-bottom: 6px;
        }
        .form-group input, .form-group select {
            width: 100%; height: 42px; padding: 0 14px;
            border: 1.5px solid #e8e8e8; border-radius: 10px;
            font-size: 14px; color: #1a1a1a; background: #fafafa;
            transition: all 0.2s; outline: none;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #6366f1; background: #fff;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.08);
        }
        .form-hint {
            font-size: 12px; color: #bbb; margin-top: 4px;
        }
        .form-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
        }

        /* ---- Buttons ---- */
        .btn {
            height: 42px; padding: 0 24px;
            border-radius: 10px; border: none;
            font-size: 14px; font-weight: 500; cursor: pointer;
            transition: all 0.2s;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-primary {
            background: #1a1a1a; color: #fff;
        }
        .btn-primary:hover { background: #333; }
        .btn-secondary {
            background: #f5f5f5; color: #666;
            border: 1px solid #e8e8e8;
        }
        .btn-secondary:hover { background: #eee; }
        .btn-success {
            background: #16a34a; color: #fff;
        }
        .btn-success:hover { background: #15803d; }
        .btn-ghost {
            background: none; color: #6366f1; padding: 0 12px;
        }
        .btn-ghost:hover { background: #eef2ff; }
        .btn-danger {
            background: none; color: #dc2626; padding: 6px 12px;
            font-size: 13px; height: auto;
        }
        .btn-danger:hover { background: #fef2f2; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-row { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
        .btn-row-between { justify-content: space-between; }

        /* ---- Font frame ---- */
        .font-frame {
            background: #fff; border: 1px solid #eee; border-radius: 12px;
            padding: 20px; margin-bottom: 16px;
            border-left: 3px solid #6366f1;
        }
        .font-frame-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px;
        }
        .font-frame-title {
            font-size: 15px; font-weight: 600; color: #6366f1;
        }

        /* ---- Preview ---- */
        .preview-container {
            display: flex; align-items: center; gap: 20px;
            margin-bottom: 16px; padding: 14px;
            background: #fafafa; border-radius: 8px; border: 1px solid #eee;
        }
        .preview-icon {
            flex-shrink: 0; width: 120px; height: 120px;
            background: #fff; border: 1px solid #eee; border-radius: 8px;
            padding: 10px; display: flex; align-items: center; justify-content: center;
        }
        .preview-icon svg { max-width: 100%; max-height: 100%; }
        .preview-info h4 { font-size: 14px; color: #1a1a1a; margin-bottom: 6px; }
        .preview-info .size-item { font-size: 13px; color: #666; margin-bottom: 4px; }
        .preview-info .size-value { color: #6366f1; font-weight: 600; }

        /* ---- File upload ---- */
        .file-upload-row {
            display: flex; align-items: center; gap: 12px;
        }
        .file-upload-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 18px; border-radius: 10px;
            border: 1px solid #e8e8e8; background: #fff;
            cursor: pointer; transition: all 0.2s;
            font-size: 13px; color: #666;
        }
        .file-upload-btn:hover { border-color: #6366f1; background: #eef2ff; color: #6366f1; }
        .file-upload-btn .upload-icon {
            width: 28px; height: 28px; border-radius: 7px;
            background: #eef2ff; color: #6366f1;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 600;
        }
        .file-upload-btn input { display: none; }
        .file-upload-hint { font-size: 12px; color: #bbb; }

        #uploadStatus {
            margin-top: 12px; padding: 10px 14px; border-radius: 8px;
            font-size: 13px; display: none;
        }

        /* ---- Country selector ---- */
        .country-selector { position: relative; }
        .country-dropdown {
            display: none; position: absolute; top: 100%; left: 0; right: 0;
            max-height: 200px; overflow-y: auto;
            background: #fff; border: 1px solid #e8e8e8; border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1); z-index: 100;
            margin-top: 4px;
        }
        .country-dropdown.show { display: block; }
        .country-option {
            padding: 10px 14px; font-size: 14px; color: #1a1a1a; cursor: pointer;
            transition: background 0.1s;
        }
        .country-option:hover { background: #f5f5f5; }
        .country-option.selected { background: #eef2ff; color: #6366f1; }

        /* ---- Freight ---- */
        .freight-card {
            background: #fff; border: 1px solid #eee; border-radius: 12px;
            padding: 20px; margin-bottom: 12px;
        }
        .freight-card.best-price { border-color: #22c55e; background: #f0fdf4; }
        .freight-card .carrier-name {
            font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px;
        }
        .freight-card .freight-price {
            font-size: 28px; font-weight: 700; color: #6366f1; margin: 8px 0;
        }
        .freight-card.best-price .freight-price { color: #22c55e; }
        .freight-card .freight-details {
            margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee;
        }
        .freight-detail-row {
            display: flex; justify-content: space-between;
            padding: 4px 0; font-size: 13px;
        }
        .freight-detail-label { color: #999; }
        .freight-detail-value { color: #1a1a1a; font-weight: 500; }
        .loading { text-align: center; padding: 20px; color: #999; }

        /* ---- Quote summary (page 4) ---- */
        .quote-header-card {
            text-align: center; padding: 24px;
            background: #f8f9fa; border-radius: 12px; margin-bottom: 20px;
        }
        .quote-header-card .qh-number {
            font-size: 20px; font-weight: 700; color: #1a1a1a;
            letter-spacing: 1px; margin-bottom: 4px;
        }
        .quote-header-card .qh-meta {
            font-size: 13px; color: #999;
        }
        .detail-section {
            background: #fafafa; border-radius: 10px;
            padding: 16px 20px; margin-bottom: 12px;
        }
        .detail-section h4 {
            font-size: 14px; font-weight: 600; color: #1a1a1a;
            margin-bottom: 10px; padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }
        .detail-row {
            display: flex; justify-content: space-between;
            padding: 6px 0; font-size: 14px;
        }
        .detail-row .label { color: #888; }
        .detail-row .value { color: #1a1a1a; font-weight: 500; }
        .total-price-banner {
            background: #1a1a1a; color: #fff; border-radius: 12px;
            padding: 20px 24px; text-align: center;
            font-size: 26px; font-weight: 700; margin-top: 20px;
        }
        .total-price-banner span { font-size: 14px; font-weight: 400; opacity: 0.7; }

        .error {
            background: #fef2f2; border: 1px solid #fecaca;
            color: #dc2626; padding: 10px 14px; border-radius: 10px;
            font-size: 13px; margin-top: 12px; display: none;
        }

        @media (max-width: 600px) {
            .header { padding: 0 16px; }
            .main { padding: 20px 16px; }
            .card { padding: 24px 20px; }
            .form-row { grid-template-columns: 1fr; }
            .step-bar { padding: 20px 0 0; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <header class="header">
        <a href="myorders.html" class="btn-back">← 返回</a>
        <span class="header-title">报价</span>
    </header>

    <!-- Step indicator -->
    <div class="step-bar">
        <div class="step-dot active" id="stepDot1">1</div>
        <div class="step-line" id="stepLine1"></div>
        <div class="step-dot" id="stepDot2">2</div>
        <div class="step-line" id="stepLine2"></div>
        <div class="step-dot" id="stepDot3">3</div>
        <div class="step-line" id="stepLine3"></div>
        <div class="step-dot" id="stepDot4">4</div>
    </div>

    <main class="main">
        <!-- Page 1: Product info -->
        <div id="page1" class="page active">
            <div class="card">
                <div class="card-title">产品信息</div>

                <div class="form-group">
                    <label>客户名称</label>
                    <select id="customerName">
                        <option value="">请选择客户</option>
                        <option value="__manual__">其他（手动输入）</option>
                    </select>
                    <input type="text" id="customerNameManual" placeholder="请输入客户名称" style="display:none;margin-top:8px">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>分类</label>
                        <select id="category"><option value="">请选择分类</option></select>
                    </div>
                    <div class="form-group">
                        <label>产品ID</label>
                        <select id="productId"><option value="">请选择产品</option></select>
                    </div>
                </div>

                <div class="form-group">
                    <label>使用区域</label>
                    <select id="usageArea">
                        <option value="">请选择使用区域</option>
                        <option value="室内">室内</option>
                        <option value="室外">室外</option>
                    </select>
                </div>
            </div>

            <!-- File upload -->
            <div class="card">
                <div class="file-upload-row">
                    <label class="file-upload-btn">
                        <span class="upload-icon">+</span> 上传矢量图
                        <input type="file" id="vectorFile" accept=".svg,.pdf" onchange="handleFileUpload(event)">
                    </label>
                    <span class="file-upload-hint">支持 SVG，自动识别字体尺寸</span>
                </div>
                <div id="uploadStatus"></div>
            </div>

            <!-- Font frames -->
            <div id="fontFramesContainer"></div>

            <div style="margin-bottom:20px;">
                <button type="button" class="btn btn-ghost" onclick="addFontFrame()">+ 添加字体</button>
            </div>

            <div class="error" id="error1"></div>

            <div class="btn-row">
                <button class="btn btn-primary" onclick="goToPage2()">下一步 →</button>
            </div>
        </div>

        <!-- Page 2: Configuration -->
        <div id="page2" class="page">
            <div class="card">
                <div class="card-title">配置选项</div>

                <div class="form-group">
                    <label>表面颜色标准</label>
                    <select id="surfaceColor" onchange="toggleSurfaceQuantity()">
                        <option value="亚克力颜色" data-price="0">亚克力颜色（默认）</option>
                        <option value="需要贴膜" data-price="200">需要贴膜（¥200/个）</option>
                        <option value="需要打印" data-price="200">需要打印（¥200）</option>
                    </select>
                </div>

                <div class="form-group" id="surfaceQuantityGroup" style="display:none;">
                    <label>贴膜数量</label>
                    <input type="number" id="surfaceQuantity" min="1" value="1">
                </div>

                <div class="form-group">
                    <label>喷漆标准</label>
                    <select id="paintStandard">
                        <option value="亮光" data-price="200">亮光（+¥200）</option>
                        <option value="三分哑" data-price="0" selected>三分哑（默认）</option>
                        <option value="半哑" data-price="0">半哑</option>
                        <option value="七分哑" data-price="0">七分哑</option>
                        <option value="全哑" data-price="0">全哑</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>开关电源标准</label>
                    <select id="powerSupply">
                        <option value="MW LRS 室内" data-price="200" selected>MW LRS 室内（¥200）</option>
                        <option value="MW LPV 室内" data-price="300">MW LPV 室内（¥300）</option>
                        <option value="MW HLG 室外" data-price="400">MW HLG 室外（¥400）</option>
                        <option value="适配器 室外" data-price="300">适配器 室外（¥300）</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>固定方式 <span style="color:#999;font-weight:400;font-size:12px;">（规格不同，安装价格另算）</span></label>
                    <select id="fixingMethod">
                        <option value="丝杆" selected>丝杆（默认）</option>
                        <option value="双面胶+硅胶">双面胶+硅胶</option>
                        <option value="架子">架子</option>
                        <option value="背板">背板</option>
                    </select>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn btn-secondary" onclick="backToPage1FromPage2()">← 上一步</button>
                <button class="btn btn-primary" onclick="goToPage3()">下一步 →</button>
            </div>
        </div>

        <!-- Page 3: Freight -->
        <div id="page3" class="page">
            <div class="card">
                <div class="card-title">运费计算</div>

                <div class="form-group">
                    <label>目的地国家</label>
                    <div class="country-selector">
                        <input type="text" id="country-search" placeholder="搜索或选择国家..." autocomplete="off">
                        <input type="hidden" id="destination">
                        <div id="country-dropdown" class="country-dropdown"></div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>长度 (cm)</label>
                        <input type="number" id="length" step="0.1" min="0">
                    </div>
                    <div class="form-group">
                        <label>宽度 (cm)</label>
                        <input type="number" id="width" step="0.1" min="0">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>高度 (cm)</label>
                        <input type="number" id="height" step="0.1" min="0">
                    </div>
                    <div class="form-group">
                        <label>实重 (kg) — 可选</label>
                        <input type="number" id="weight" step="0.1" min="0">
                    </div>
                </div>

                <div id="freight-results" style="display:none; margin-top:20px;">
                    <div id="results-content"></div>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn btn-secondary" onclick="backToPage2FromPage3()">← 上一步</button>
                <button class="btn btn-primary" onclick="goToPage4()">下一步 →</button>
            </div>
        </div>

        <!-- Page 4: Quote summary -->
        <div id="page4" class="page">
            <div class="card">
                <div class="quote-header-card">
                    <div style="font-size:13px;color:#999;margin-bottom:4px;">报价编号</div>
                    <div class="qh-number" id="finalQuoteNumber"></div>
                    <div class="qh-meta" style="margin-top:6px;">
                        客户：<span id="finalCustomerName" style="font-weight:600;color:#1a1a1a;"></span>
                    </div>
                </div>

                <div class="detail-section">
                    <h4>产品信息</h4>
                    <div class="detail-row"><span class="label">产品ID</span><span class="value" id="finalProductId"></span></div>
                    <div class="detail-row"><span class="label">产品名称</span><span class="value" id="finalProductName"></span></div>
                    <div class="detail-row"><span class="label">使用区域</span><span class="value" id="finalUsageArea"></span></div>
                </div>

                <div id="fontDetailsSection"></div>

                <div class="detail-section">
                    <h4>配置选项</h4>
                    <div class="detail-row"><span class="label">表面颜色</span><span class="value" id="finalSurfaceColor"></span></div>
                    <div class="detail-row"><span class="label">喷漆标准</span><span class="value" id="finalPaint"></span></div>
                    <div class="detail-row"><span class="label">开关电源</span><span class="value" id="finalPower"></span></div>
                    <div class="detail-row"><span class="label">固定方式</span><span class="value" id="finalFixing"></span></div>
                </div>

                <div class="detail-section">
                    <h4>价格明细</h4>
                    <div id="priceDetailsSection"></div>
                    <div class="detail-row"><span class="label">表面处理</span><span class="value" id="finalSurfacePrice"></span></div>
                    <div class="detail-row"><span class="label">喷漆费用</span><span class="value" id="finalPaintPrice"></span></div>
                    <div class="detail-row"><span class="label">开关电源</span><span class="value" id="finalPowerPrice"></span></div>
                    <div class="detail-row" id="laborFeeRow" style="display:none;"><span class="label">人工费</span><span class="value" id="finalLaborFee"></span></div>
                </div>

                <div class="detail-section" id="freightSection" style="display:none;">
                    <h4>运费信息</h4>
                    <div class="detail-row"><span class="label">目的地</span><span class="value" id="finalDestination"></span></div>
                    <div class="detail-row"><span class="label">运输方式</span><span class="value">DHL</span></div>
                    <div class="detail-row"><span class="label">运费</span><span class="value" id="finalFreightCost"></span></div>
                </div>
            </div>

            <div class="total-price-banner">
                <span>总价</span> ¥<span id="finalTotalPrice"></span>
            </div>

            <div class="btn-row">
                <a href="myorders.html" class="btn btn-secondary" style="text-decoration:none;">返回工作台</a>
                <button class="btn btn-secondary" onclick="backToPage3FromPage4()">← 上一步</button>
                <button class="btn btn-success" onclick="saveToMyClient()" id="saveClientBtn">保存至我的客户</button>
                <button class="btn btn-secondary" onclick="backToPage1()">重新报价</button>
            </div>
            <div class="error" id="saveError"></div>
        </div>
    </main>

    <script src="../shared/pocketbase.umd.js"></script>
    <script type="module">
        import { getCurrentUser, db, collection, getDocs } from "../shared/pocketbase-init.js";

        const user = await getCurrentUser();
        if (!user) window.location.href = '../auth/login.html';

        // Load customer list - merge registered clients + saved customers, de-duplicate
        const cachedV4 = sessionStorage.getItem('_customerListV4');
        const cached = sessionStorage.getItem('_customerList');
        if (cachedV4 && cached) {
            window._customerList = JSON.parse(cached);
        } else {
            try {
                const nameSet = new Set();
                const profileSnap = await getDocs(collection(db, 'clientProfiles'));
                const isAdminQuote = user.email === 'sales01@test.com';
                profileSnap.forEach(d => {
                    const data = d.data();
                    if (!data.name) return;
                    if (isAdminQuote || data.assignedTo === user.email) nameSet.add(data.name);
                });
                window._customerList = Array.from(nameSet).sort((a, b) => a.localeCompare(b, 'zh'));
                sessionStorage.setItem('_customerList', JSON.stringify(window._customerList));
                sessionStorage.setItem('_customerListV4', '1');
            } catch (e) {
                console.error('加载客户列表失败:', e);
                window._customerList = [];
            }
        }
        if (window._populateCustomerDropdown) window._populateCustomerDropdown();
    </script>

    <script>
        // 从外部 JSON 加载数据
        (async function() {
            let PRODUCT_DATA;
            try {
                const resp = await fetch('../data/products.json');
                PRODUCT_DATA = await resp.json();
            } catch (e) {
                alert('数据加载失败，请检查 data/products.json 是否存在');
                return;
            }

            const categoryEl = document.getElementById('category');
            const productEl = document.getElementById('productId');
            const usageAreaEl = document.getElementById('usageArea');
            const errorDiv = document.getElementById('error1');

            // 全局变量
            let fontFrameCounter = 0;
            let quoteData = {};

            // Populate customer dropdown from Firestore
            window._populateCustomerDropdown = function() {

            // 路径分割引擎（支持 CorelDRAW 合并路径）
            function splitCorelDrawPath(d) {
                const regex = /([a-zA-Z])|([-+]?(?:\d*\.\d+|\d+)(?:[eE][-+]?\d+)?)/g;
                let tokens = [];
                let match;
                while ((match = regex.exec(d)) !== null) tokens.push(match[0]);

                let subpaths = [];
                let currentSubpath = [];
                let startX = 0, startY = 0;
                let i = 0;

                while (i < tokens.length) {
                    let token = tokens[i];
                    if (/[a-zA-Z]/.test(token)) {
                        let cmd = token;
                        i++;
                        let args = [];
                        while (i < tokens.length && !/[a-zA-Z]/.test(tokens[i])) {
                            args.push(parseFloat(tokens[i]));
                            i++;
                        }

                        if (cmd === 'M' || cmd === 'm') {
                            if (currentSubpath.length > 0) {
                                subpaths.push(currentSubpath.join(' '));
                                currentSubpath = [];
                            }
                            if (cmd === 'M') {
                                startX = args[0];
                                startY = args[1];
                                currentSubpath.push('M', args[0], args[1]);
                            } else if (cmd === 'm') {
                                startX += args[0];
                                startY += args[1];
                                currentSubpath.push('M', startX, startY);
                            }
                            if (args.length > 2) {
                                currentSubpath.push((cmd === 'M') ? 'L' : 'l');
                                for (let j = 2; j < args.length; j++) currentSubpath.push(args[j]);
                            }
                        } else {
                            currentSubpath.push(cmd, ...args);
                        }
                    } else {
                        i++;
                    }
                }
                if (currentSubpath.length > 0) subpaths.push(currentSubpath.join(' '));
                return subpaths;
            }

            // 高级 SVG 解析引擎（精确识别每个字符）
            async function parseAdvancedSVG(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        try {
                            const parser = new DOMParser();
                            const doc = parser.parseFromString(e.target.result, 'image/svg+xml');
                            const svgEl = doc.querySelector('svg');

                            if (!svgEl) {
                                reject(new Error('无效的 SVG 文件'));
                                return;
                            }

                            const physW = parseFloat(svgEl.getAttribute('width') || '1000');
                            const physH = parseFloat(svgEl.getAttribute('height') || '1000');
                            const unit = (svgEl.getAttribute('width') || 'px').replace(/[0-9.]/g, '').trim() || 'px';

                            const viewBox = svgEl.getAttribute('viewBox');
                            let scaleX = 1, scaleY = 1;
                            let vbW = 1000, vbH = 1000;

                            if (viewBox) {
                                const vb = viewBox.trim().split(/\s+|,/);
                                vbW = parseFloat(vb[2]);
                                vbH = parseFloat(vb[3]);
                                scaleX = physW / vbW;
                                scaleY = physH / vbH;
                            }

                            const calcSvg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                            calcSvg.style.position = 'absolute';
                            calcSvg.style.visibility = 'hidden';
                            calcSvg.style.width = '0';
                            calcSvg.style.height = '0';
                            document.body.appendChild(calcSvg);

                            const paths = svgEl.querySelectorAll('path');
                            let rawPieces = [];

                            paths.forEach(path => {
                                const d = path.getAttribute('d');
                                if (d) {
                                    const subpaths = splitCorelDrawPath(d);
                                    subpaths.forEach(sd => {
                                        const tempPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
                                        tempPath.setAttribute('d', sd);
                                        calcSvg.appendChild(tempPath);

                                        try {
                                            const bbox = tempPath.getBBox();
                                            if (bbox.width > 0.1 && bbox.height > 0.1) {
                                                rawPieces.push({ box: bbox, pathData: sd });
                                            }
                                        } catch (e) {
                                            // 忽略无效的路径
                                        }
                                    });
                                }
                            });

                            rawPieces.sort((a, b) => a.box.x - b.box.x);

                            let letters = [];
                            if (rawPieces.length > 0) {
                                let currentLetter = {
                                    xMin: rawPieces[0].box.x,
                                    xMax: rawPieces[0].box.x + rawPieces[0].box.width,
                                    pieces: [rawPieces[0]]
                                };

                                for (let i = 1; i < rawPieces.length; i++) {
                                    let p = rawPieces[i];
                                    let pRight = p.box.x + p.box.width;

                                    if (p.box.x <= currentLetter.xMax + 50) {
                                        currentLetter.xMax = Math.max(currentLetter.xMax, pRight);
                                        currentLetter.pieces.push(p);
                                    } else {
                                        letters.push(currentLetter);
                                        currentLetter = {
                                            xMin: p.box.x,
                                            xMax: pRight,
                                            pieces: [p]
                                        };
                                    }
                                }
                                letters.push(currentLetter);
                            }

                            const shapes = letters.map(letter => {
                                let minX = Math.min(...letter.pieces.map(p => p.box.x));
                                let minY = Math.min(...letter.pieces.map(p => p.box.y));
                                let maxX = Math.max(...letter.pieces.map(p => p.box.x + p.box.width));
                                let maxY = Math.max(...letter.pieces.map(p => p.box.y + p.box.height));

                                let letterWidth = maxX - minX;
                                let letterHeight = maxY - minY;

                                let realW = letterWidth * scaleX;
                                let realH = letterHeight * scaleY;

                                let lengthInCm, widthInCm;
                                if (unit === 'mm') {
                                    lengthInCm = realW / 10;
                                    widthInCm = realH / 10;
                                } else if (unit === 'cm') {
                                    lengthInCm = realW;
                                    widthInCm = realH;
                                } else {
                                    lengthInCm = realW / 10;
                                    widthInCm = realH / 10;
                                }

                                let svgPaths = letter.pieces.map(p =>
                                    `<path d="${p.pathData}" fill="none" stroke="#000000" stroke-width="50" stroke-linejoin="round" stroke-linecap="round"></path>`
                                ).join('');
                                let svgPreview = `<svg viewBox="${minX} ${minY} ${letterWidth} ${letterHeight}" width="100%" height="100%" fill-rule="evenodd">${svgPaths}</svg>`;

                                return {
                                    length: lengthInCm,
                                    width: widthInCm,
                                    svgPreview: svgPreview
                                };
                            });

                            document.body.removeChild(calcSvg);
                            resolve(shapes);
                        } catch (error) {
                            reject(error);
                        }
                    };
                    reader.onerror = reject;
                    reader.readAsText(file);
                });
            }

            // 按相似尺寸分组（容差 0.1cm）
            function groupShapesBySize(shapes) {
                const groups = [];
                const tolerance = 0.1;

                shapes.forEach(shape => {
                    const length = Math.round(shape.length * 100) / 100;
                    const width = Math.round(shape.width * 100) / 100;

                    let found = false;
                    for (let group of groups) {
                        if (Math.abs(group.length - length) <= tolerance &&
                            Math.abs(group.width - width) <= tolerance) {
                            group.count++;
                            found = true;
                            break;
                        }
                    }

                    if (!found) {
                        groups.push({
                            length: length,
                            width: width,
                            count: 1,
                            svgPreview: shape.svgPreview
                        });
                    }
                });

                return groups;
            }

                for (let i = 0; i < fontData.length; i++) {
                    const font = fontData[i];
                    const maxDimensionInCm = Math.max(font.length, font.width);
                    const basePrice = findPrice(product, usageArea, font.thickness, maxDimensionInCm);

                    if (basePrice === null) {
                        errorDiv.textContent = `字体${i + 1} 未找到匹配的价格规则，请联系客服`;
                        errorDiv.style.display = 'block';
                        return;
                    }

                    const letterPrice = basePrice * 0.01 * maxDimensionInCm * font.quantity;

                    fontPrices.push({
                        name: `字体${i + 1}`,
                        length: font.length,
                        width: font.width,
                        thickness: font.thickness,
                        quantity: font.quantity,
                        basePrice,
                        letterPrice
                    });
                }

                errorDiv.style.display = 'none';

                quoteData = {
                    customerName,
                    productId,
                    productName: product.name + (product.nameEn ? ' ' + product.nameEn : ''),
                    usageArea,
                    fontPrices
                };

                document.getElementById('page1').classList.remove('active');
                document.getElementById('page2').classList.add('active');
                updateSteps(2);
            };

            window.goToPage3 = function() {
                const surfaceColorEl = document.getElementById('surfaceColor');
                const surfaceColor = surfaceColorEl.value;
                const surfaceUnitPrice = parseInt(surfaceColorEl.options[surfaceColorEl.selectedIndex].dataset.price) || 0;

                let surfaceQuantity = 0;
                if (surfaceColor === '需要贴膜') {
                    surfaceQuantity = parseInt(document.getElementById('surfaceQuantity').value) || 1;
                } else if (surfaceColor === '需要打印') {
                    surfaceQuantity = 1;
                }
                const surfacePrice = surfaceUnitPrice * surfaceQuantity;

                const paintEl = document.getElementById('paintStandard');
                const paint = paintEl.value;
                const paintPrice = parseInt(paintEl.options[paintEl.selectedIndex].dataset.price) || 0;

                const powerEl = document.getElementById('powerSupply');
                const power = powerEl.value;
                const powerPrice = parseInt(powerEl.options[powerEl.selectedIndex].dataset.price) || 0;

                const fixing = document.getElementById('fixingMethod').value;

                const totalLetterPrice = quoteData.fontPrices.reduce((sum, font) => sum + font.letterPrice, 0);

                let totalPrice = totalLetterPrice + surfacePrice + paintPrice + powerPrice;

                let laborFee = 0;
                if (totalPrice < 1000) {
                    laborFee = 200;
                    totalPrice += laborFee;
                }

                quoteData.surfaceColor = surfaceColor;
                quoteData.surfaceQuantity = surfaceQuantity;
                quoteData.surfacePrice = surfacePrice;
                quoteData.paint = paint;
                quoteData.paintPrice = paintPrice;
                quoteData.power = power;
                quoteData.powerPrice = powerPrice;
                quoteData.fixing = fixing;
                quoteData.laborFee = laborFee;
                quoteData.totalLetterPrice = totalLetterPrice;
                quoteData.totalPrice = totalPrice;

                document.getElementById('page2').classList.remove('active');
                document.getElementById('page3').classList.add('active');
                updateSteps(3);
            };

            window.goToPage4 = function() {
                const now = new Date();
                const dateStr = now.getFullYear() +
                    String(now.getMonth() + 1).padStart(2, '0') +
                    String(now.getDate()).padStart(2, '0');
                const random = String(Math.floor(Math.random() * 10000)).padStart(4, '0');
                const ms = String(now.getMilliseconds()).padStart(3, '0');
                const quoteNumber = 'YJ-' + dateStr + '-' + random + ms;
                window._quoteNumber = quoteNumber;

                document.getElementById('finalQuoteNumber').textContent = quoteNumber;
                document.getElementById('finalCustomerName').textContent = quoteData.customerName || '-';

                document.getElementById('finalProductId').textContent = quoteData.productId;
                document.getElementById('finalProductName').textContent = quoteData.productName;
                document.getElementById('finalUsageArea').textContent = quoteData.usageArea;

                const fontDetailsSection = document.getElementById('fontDetailsSection');
                fontDetailsSection.innerHTML = '';
                quoteData.fontPrices.forEach(font => {
                    const section = document.createElement('div');
                    section.className = 'detail-section';
                    section.innerHTML = `
                        <h4>${font.name}</h4>
                        <div class="detail-row"><span class="label">尺寸</span><span class="value">${font.length} × ${font.width} cm</span></div>
                        <div class="detail-row"><span class="label">厚度</span><span class="value">${font.thickness} mm</span></div>
                        <div class="detail-row"><span class="label">字的数量</span><span class="value">${font.quantity}</span></div>
                        <div class="detail-row"><span class="label">基准单价</span><span class="value">¥${font.basePrice}</span></div>
                        <div class="detail-row"><span class="label">字价格</span><span class="value">¥${font.letterPrice.toFixed(2)}</span></div>
                    `;
                    fontDetailsSection.appendChild(section);
                });

                const priceDetailsSection = document.getElementById('priceDetailsSection');
                priceDetailsSection.innerHTML = `
                    <div class="detail-row"><span class="label">所有字体总价</span><span class="value">¥${quoteData.totalLetterPrice.toFixed(2)}</span></div>
                `;

                let surfaceText = quoteData.surfaceColor;
                if (quoteData.surfaceQuantity > 0) {
                    surfaceText += ` (数量: ${quoteData.surfaceQuantity}, +¥${quoteData.surfacePrice})`;
                }
                document.getElementById('finalSurfaceColor').textContent = surfaceText;
                document.getElementById('finalPaint').textContent = quoteData.paint + (quoteData.paintPrice > 0 ? ` (+¥${quoteData.paintPrice})` : '');
                document.getElementById('finalPower').textContent = quoteData.power + ` (¥${quoteData.powerPrice})`;
                document.getElementById('finalFixing').textContent = quoteData.fixing;

                document.getElementById('finalSurfacePrice').textContent = `¥${quoteData.surfacePrice}`;
                document.getElementById('finalPaintPrice').textContent = `¥${quoteData.paintPrice}`;
                document.getElementById('finalPowerPrice').textContent = `¥${quoteData.powerPrice}`;

                const laborFeeRow = document.getElementById('laborFeeRow');
                if (quoteData.laborFee > 0) {
                    laborFeeRow.style.display = 'flex';
                    document.getElementById('finalLaborFee').textContent = `¥${quoteData.laborFee}`;
                } else {
                    laborFeeRow.style.display = 'none';
                }

                const freightSection = document.getElementById('freightSection');
                let finalTotalPrice = quoteData.totalPrice;

                if (freightData && freightData.totalPrice) {
                    freightSection.style.display = 'block';
                    document.getElementById('finalDestination').textContent = freightData.destination;
                    document.getElementById('finalFreightCost').textContent = `¥${freightData.totalPrice.toFixed(2)}`;
                    finalTotalPrice += freightData.totalPrice;
                } else {
                    freightSection.style.display = 'none';
                }

                document.getElementById('finalTotalPrice').textContent = finalTotalPrice.toFixed(2);

                document.getElementById('page3').classList.remove('active');
                document.getElementById('page4').classList.add('active');
                updateSteps(4);
            };

            window.saveToMyClient = async function() {
                const btn = document.getElementById('saveClientBtn');
                if (btn.disabled && btn.textContent === '已保存') return;
                btn.disabled = true;
                btn.textContent = '保存中...';
                try {
                    await window.saveQuoteToFirestore(quoteData, freightData, window._quoteNumber);
                    btn.textContent = '已保存';
                    btn.style.background = '#15803d';
                    btn.style.cursor = 'default';
                    const errEl = document.getElementById('saveError');
                    if (errEl) errEl.style.display = 'none';
                } catch (err) {
                    btn.textContent = '保存失败，重试';
                    btn.style.background = '#dc2626';
                    const errEl = document.getElementById('saveError');
                    if (errEl) {
                        errEl.textContent = '错误: ' + (err.message || err);
                        errEl.style.display = 'block';
                    }
                    setTimeout(() => {
                        btn.textContent = '保存至我的客户';
                        btn.style.background = '#16a34a';
                        btn.disabled = false;
                        btn.style.cursor = '';
                    }, 3000);
                }
            };

            window.backToPage1 = function() {
                document.getElementById('page4').classList.remove('active');
                document.getElementById('page1').classList.add('active');
                updateSteps(1);
            };

            window.backToPage1FromPage2 = function() {
                document.getElementById('page2').classList.remove('active');
                document.getElementById('page1').classList.add('active');
                updateSteps(1);
            };

            window.backToPage2FromPage3 = function() {
                document.getElementById('page3').classList.remove('active');
                document.getElementById('page2').classList.add('active');
                updateSteps(2);
            };

            window.backToPage3FromPage4 = function() {
                document.getElementById('page4').classList.remove('active');
                document.getElementById('page3').classList.add('active');
                updateSteps(3);
            };
        })();
    </script>

</body>
</html>
