<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单详情 - 报价系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5; min-height: 100vh;
        }

        .bg-gradient {
            position: fixed; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(99,102,241,0.04) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(34,197,94,0.03) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        .header {
            position: relative; z-index: 1;
            background: #fff; border-bottom: 1px solid #eee;
            padding: 0 32px; height: 56px;
            display: flex; align-items: center; gap: 16px;
        }
        .btn-back {
            font-size: 13px; color: #666;
            background: none; border: none; cursor: pointer;
            padding: 6px 0; text-decoration: none;
        }
        .btn-back:hover { color: #1a1a1a; }
        .header-title { font-size: 16px; font-weight: 600; color: #1a1a1a; }
        .user-email { font-size: 13px; color: #999; margin-left: auto; }

        .header-user-area {
            display: flex; align-items: center; gap: 10px; margin-left: auto;
            cursor: pointer; padding: 4px 8px; border-radius: 8px;
            transition: background 0.15s;
        }
        .header-user-area:hover { background: #f5f5f5; }

        .header-pm-tag {
            display: inline-block; font-size: 11px; font-weight: 600;
            padding: 4px 10px; border-radius: 6px; white-space: nowrap;
            position: relative; cursor: default;
        }
        .header-pm-tag.monthly { background: #eff6ff; color: #2563eb; }
        .header-pm-tag.credit { background: #f3e8ff; color: #7c3aed; }
        .header-pm-tag.pay_before_ship { background: #fff7ed; color: #c2410c; }
        .header-pm-tag.prepaid { background: #f0fdf4; color: #16a34a; }
        .header-pm-tag.full { background: #fef2f2; color: #dc2626; }

        .header-pm-popup {
            display: none; position: absolute; top: calc(100% + 8px); left: 50%;
            transform: translateX(-50%); white-space: nowrap;
            background: #1a1a1a; color: #fff; font-size: 13px; font-weight: 500;
            padding: 12px 16px; border-radius: 10px; line-height: 1.6;
            pointer-events: none; z-index: 300;
        }
        .header-pm-popup .popup-row {
            display: flex; gap: 16px; align-items: center;
        }
        .header-pm-popup .popup-label { color: #aaa; font-size: 11px; font-weight: 400; }
        .header-pm-popup .popup-val { font-size: 15px; font-weight: 700; }
        .header-pm-popup .popup-divider { color: #555; font-size: 15px; }
        .header-pm-tag:hover .header-pm-popup { display: block; }
        .header-pm-warn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 16px; height: 16px; border-radius: 50%;
            background: #f59e0b; color: #fff; font-size: 10px; font-weight: 700;
            margin-right: 3px; vertical-align: middle; cursor: help;
        }
        .header-pm-warn.danger {
            background: #dc2626;
        }
        .header-pm-tag.exhausted {
            background: #fef2f2; color: #dc2626;
        }

        .header-user-text { line-height: 1.3; }
        .header-user-name { font-size: 13px; font-weight: 500; color: #1a1a1a; display: block; }
        .header-user-email { font-size: 11px; color: #999; display: block; }

        .header-bell { position: relative; cursor: pointer; padding: 6px; border-radius: 8px; border: none; background: none; }
        .header-bell:hover { background: #f5f5f5; }
        .header-bell svg { width: 20px; height: 20px; color: #666; display: block; }
        .header-bell-badge { position: absolute; top: 1px; right: 1px; min-width: 16px; height: 16px; background: #dc2626; color: #fff; font-size: 10px; font-weight: 700; border-radius: 8px; display: none; align-items: center; justify-content: center; padding: 0 4px; }
        .header-bell-badge.show { display: flex; }

        .notif-dropdown {
            display: none; position: absolute; top: calc(100% + 8px); right: 0;
            width: 380px; max-height: 480px; background: #fff; border-radius: 14px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.12); border: 1px solid #eee;
            z-index: 200; flex-direction: column; overflow: hidden;
        }
        .notif-dropdown.show { display: flex; }
        .notif-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px; border-bottom: 1px solid #f0f0f0;
            font-size: 14px; font-weight: 600; color: #1a1a1a;
        }
        .notif-mark-all {
            font-size: 12px; color: #6366f1; cursor: pointer; border: none; background: none; font-weight: 500;
        }
        .notif-mark-all:hover { color: #4f46e5; }
        .notif-list { overflow-y: auto; max-height: 400px; }
        .notif-item {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 14px 18px; cursor: pointer; border-bottom: 1px solid #f9f9f9;
            transition: background 0.1s; position: relative;
        }
        .notif-item:hover { background: #f8f9fa; }
        .notif-item.unread { background: #fafaff; }
        .notif-item.unread:hover { background: #f0f0ff; }
        .notif-dot { width: 8px; height: 8px; border-radius: 50%; background: #6366f1; flex-shrink: 0; margin-top: 6px; }
        .notif-dot.read { visibility: hidden; }
        .notif-content { flex: 1; min-width: 0; }
        .notif-title { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; }
        .notif-body { font-size: 12px; color: #888; line-height: 1.5; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .notif-time { font-size: 11px; color: #bbb; flex-shrink: 0; margin-top: 2px; }
        .notif-empty { text-align: center; padding: 40px 20px; color: #ccc; font-size: 13px; }
        .notif-empty svg { width: 36px; height: 36px; margin-bottom: 8px; color: #ddd; }
        @media (max-width: 600px) {
            .notif-dropdown { width: calc(100vw - 32px); right: -60px; }
        }

        .layout {
            position: relative; z-index: 1;
            display: flex; min-height: calc(100vh - 56px);
            max-width: 1000px; margin: 0 auto;
        }

        /* ---- Sidebar ---- */
        .sidebar {
            width: 180px; flex-shrink: 0;
            background: #fff; border-right: 1px solid #eee;
            padding: 20px 0;
        }
        .sidebar-nav { list-style: none; }
        .sidebar-nav li {
            padding: 12px 24px; font-size: 14px; color: #666;
            cursor: pointer; transition: all 0.15s;
            border-right: 2px solid transparent;
        }
        .sidebar-nav li:hover { color: #1a1a1a; background: #fafafa; }
        .sidebar-nav li.active {
            color: #6366f1; font-weight: 600;
            background: #eef2ff; border-right-color: #6366f1;
        }

        /* ---- Main content ---- */
        .main {
            flex: 1; padding: 32px 40px; overflow-y: auto;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ---- Status badge ---- */
        .status-badge {
            display: inline-block; font-size: 12px; font-weight: 500;
            padding: 3px 10px; border-radius: 4px;
        }
        .status-pending { background: #fefce8; color: #a16207; }
        .status-confirmed { background: #fef3c7; color: #b45309; }
        .status-in_production { background: #eff6ff; color: #2563eb; }
        .status-completed { background: #f0fdf4; color: #16a34a; }
        .status-shipped { background: #faf5ff; color: #9333ea; }
        .status-signed { background: #f0fdf4; color: #15803d; }

        /* ---- Detail sections ---- */
        .detail-header-block {
            margin-bottom: 28px; padding: 20px;
            background: #fff; border-radius: 12px;
            border: 1px solid #eee;
        }
        .detail-header-block .quote-num {
            font-size: 13px; color: #999; margin-bottom: 4px;
        }
        .detail-header-block .quote-num span {
            font-size: 22px; font-weight: 700; color: #1a1a1a; letter-spacing: 1px;
        }
        .detail-header-block .meta {
            font-size: 13px; color: #888; margin-top: 10px;
            display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
        }

        .section {
            background: #fff; border-radius: 12px;
            border: 1px solid #eee; padding: 20px 24px;
            margin-bottom: 12px;
        }
        .section h4 {
            font-size: 14px; font-weight: 600; color: #1a1a1a;
            margin-bottom: 12px; padding-bottom: 8px;
            border-bottom: 1px solid #f0f0f0;
        }
        .row {
            display: flex; justify-content: space-between;
            padding: 5px 0; font-size: 14px;
        }
        .row .label { color: #888; }
        .row .value { color: #1a1a1a; font-weight: 500; }

        .price-total {
            text-align: right; padding: 16px 0 0;
            font-size: 26px; font-weight: 700; color: #1a1a1a;
        }
        .price-total small { font-size: 13px; color: #999; font-weight: 400; display: block; }

        .svg-preview {
            position: relative;
            text-align: center; padding: 20px 20px 28px 60px;
        }
        .svg-preview svg { max-width: 100%; max-height: 250px; }
        .dim-annotation { pointer-events: none; }
        .dim-info { display: flex; justify-content: center; gap: 16px; margin-top: 8px; }
        .dim-badge { display: inline-block; padding: 4px 12px; background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px; color: #dc2626; font-size: 13px; font-weight: 600; }

        /* ---- Progress ---- */
        .progress-wrap {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 20px;
        }
        .progress-bar {
            flex: 1; height: 8px;
            background: #eee; border-radius: 4px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; border-radius: 4px;
            background: #22c55e; transition: width 0.4s;
        }
        .progress-pct { font-size: 14px; font-weight: 600; color: #22c55e; min-width: 40px; }

        .step-list { list-style: none; }
        .step-list li {
            display: flex; align-items: center; padding: 10px 12px;
            border-radius: 8px; margin-bottom: 4px;
            font-size: 14px; color: #1a1a1a;
            background: #fafafa;
        }
        .step-list li.done { background: #f0fdf4; color: #16a34a; }
        .step-check {
            width: 24px; height: 24px; border-radius: 50%;
            border: 2px solid #ddd; margin-right: 12px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: transparent;
        }
        .step-list li.done .step-check {
            background: #22c55e; border-color: #22c55e; color: #fff;
        }
        .step-name { flex: 1; }

        .no-process {
            text-align: center; padding: 40px 0; color: #999; font-size: 14px;
        }
        .no-process p { margin-top: 4px; font-size: 13px; }

        .state-loading {
            text-align: center; padding: 80px 0; color: #999;
        }

        /* Confirm button in detail */
        .btn-confirm-inline {
            display: inline-block; padding: 10px 28px;
            background: #16a34a; color: #fff;
            border: none; border-radius: 8px;
            font-size: 14px; font-weight: 500; cursor: pointer;
            transition: all 0.2s; margin-top: 12px;
        }
        .btn-confirm-inline:hover { background: #15803d; }
        .btn-confirm-inline:disabled { opacity: 0.6; cursor: default; }
        .btn-confirm-inline.confirmed { background: #999; cursor: default; }

        .confused-link {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 12px; color: #888;
            cursor: pointer; transition: all 0.2s;
            padding: 8px 14px; border-radius: 20px;
            border: 1px solid #eee; background: #fafafa;
            white-space: nowrap;
        }
        .confused-link:hover { color: #6366f1; border-color: #6366f1; background: #eef2ff; }
        .confused-link .dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: #6366f1; flex-shrink: 0; transition: all 0.3s;
        }
        .confused-link.has-unread { color: #e03131; border-color: #fecaca; background: #fff5f5; }
        .confused-link.has-unread .dot {
            background: #e03131; animation: pulse-dot 1.2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.8); opacity: 0.4; }
        }

        .detail-header-top {
            display: flex; align-items: flex-start; justify-content: space-between;
            gap: 20px;
        }
        .detail-header-top .left { flex: 1; min-width: 0; }

        /* Chat overlay */
        .chat-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 200; align-items: center; justify-content: center;
        }
        .chat-overlay.show { display: flex; }

        .chat-dialog {
            background: #fff; border-radius: 16px;
            width: 420px; max-height: 560px;
            display: flex; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .chat-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; border-bottom: 1px solid #eee;
            flex-shrink: 0;
        }
        .chat-header h3 { font-size: 16px; font-weight: 600; color: #1a1a1a; }
        .chat-close {
            width: 30px; height: 30px; border-radius: 8px;
            border: none; background: #f5f5f5;
            font-size: 18px; color: #666; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .chat-close:hover { background: #eee; color: #1a1a1a; }

        .chat-messages {
            flex: 1; overflow-y: auto; padding: 16px 20px;
            display: flex; flex-direction: column; gap: 12px;
            min-height: 200px; max-height: 340px;
        }
        .chat-messages .empty { text-align: center; color: #ccc; font-size: 13px; padding: 40px 0; }

        .chat-bubble {
            max-width: 75%; padding: 10px 14px;
            border-radius: 18px; font-size: 14px; line-height: 1.5;
            word-break: break-word; position: relative;
        }
        .chat-bubble.left {
            align-self: flex-start;
            background: #f0f0f0; color: #1a1a1a;
            border-top-left-radius: 4px;
        }
        .chat-bubble.right {
            align-self: flex-end;
            background: #95ec69; color: #1a1a1a;
            border-top-right-radius: 4px;
        }
        .chat-bubble .time {
            display: block; font-size: 11px; color: #999;
            margin-top: 4px; text-align: right;
        }

        .chat-input-area {
            display: flex; gap: 8px; padding: 12px 16px;
            border-top: 1px solid #eee; flex-shrink: 0;
        }
        .chat-input-area textarea {
            flex: 1; height: 38px; max-height: 80px;
            padding: 9px 12px; border: 1px solid #e8e8e8;
            border-radius: 10px; font-size: 14px; color: #1a1a1a;
            background: #fafafa; outline: none; resize: none;
            font-family: inherit;
            transition: border-color 0.15s;
        }
        .chat-input-area textarea:focus { border-color: #6366f1; background: #fff; }
        .chat-send {
            width: 56px; flex-shrink: 0;
            background: #6366f1; color: #fff;
            border: none; border-radius: 10px;
            font-size: 13px; font-weight: 500; cursor: pointer;
            transition: all 0.15s;
        }
        .chat-send:hover { background: #4f46e5; }
        .chat-send:disabled { opacity: 0.5; cursor: default; }

        .shipment-card {
            background: #fafafa; border-radius: 10px;
            padding: 16px; margin-bottom: 10px;
            border: 1px solid #eee;
        }
        .shipment-card .carrier-tag {
            font-size: 12px; padding: 2px 8px; border-radius: 4px;
            font-weight: 500;
        }
        .carrier-dhl { background: #fef3c7; color: #b45309; }
        .carrier-fedex { background: #eff6ff; color: #2563eb; }
        .shipment-card .tracking-num {
            font-size: 16px; font-weight: 700; color: #1a1a1a; letter-spacing: 0.5px; margin-bottom: 4px;
        }
        .shipment-card .ship-meta { font-size: 12px; color: #999; margin-bottom: 8px; }
        .btn-refresh-tracking {
            height: 32px; padding: 0 14px;
            border-radius: 6px; border: 1px solid #ddd;
            background: #fff; color: #666;
            font-size: 12px; cursor: pointer;
        }
        .btn-refresh-tracking:hover { border-color: #6366f1; color: #6366f1; }

        .account-input {
            width: 200px; padding: 6px 10px;
            border: 1px solid #ddd; border-radius: 6px;
            font-size: 13px; color: #1a1a1a; outline: none;
            transition: border-color 0.15s;
        }
        .account-input:focus { border-color: #6366f1; }
        .btn-save-account {
            padding: 10px 28px; background: #1a1a1a; color: #fff;
            border: none; border-radius: 10px; font-size: 14px; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-save-account:hover { background: #333; }
        .btn-save-account:disabled { opacity: 0.6; cursor: default; }

        .payment-tag {
            display: inline-block; font-size: 10px; font-weight: 500;
            padding: 2px 6px; border-radius: 3px; vertical-align: middle;
        }
        .payment-tag.monthly { background: #eff6ff; color: #2563eb; }
        .payment-tag.credit { background: #f3e8ff; color: #7c3aed; }
        .payment-tag.pay_before_ship { background: #fff7ed; color: #c2410c; }
        .payment-tag.prepaid { background: #f0fdf4; color: #16a34a; }
        .payment-tag.full { background: #fef2f2; color: #dc2626; }
        .payment-status-tag {
            font-size: 10px; font-weight: 500; padding: 2px 6px; border-radius: 3px;
            vertical-align: middle; margin-left: 4px;
        }
        .payment-status-tag.paid { background: #f0fdf4; color: #16a34a; }
        .payment-status-tag.unpaid { background: #fef2f2; color: #dc2626; }

        .timeline { position: relative; padding-left: 20px; }
        .timeline::before {
            content: ''; position: absolute; left: 7px; top: 4px; bottom: 4px;
            width: 2px; background: #e5e5e5;
        }
        .tl-item {
            position: relative; padding: 4px 0 10px 16px; font-size: 13px; color: #888;
        }
        .tl-item:last-child { color: #22c55e; font-weight: 500; }
        .tl-item::before {
            content: ''; position: absolute; left: -17px; top: 8px;
            width: 8px; height: 8px; border-radius: 50%; background: #ddd;
        }
        .tl-item:last-child::before { background: #22c55e; }
        .tl-item .tl-time { font-size: 11px; color: #bbb; display: block; }

        @media (max-width: 640px) {
            .layout { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #eee; padding: 0; }
            .sidebar-nav { display: flex; }
            .sidebar-nav li { border-right: none; border-bottom: 2px solid transparent; padding: 10px 16px; font-size: 13px; }
            .sidebar-nav li.active { border-right: none; border-bottom-color: #6366f1; }
            .main { padding: 24px 16px; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <header class="header">
        <a href="../client/user.html" class="btn-back">← 返回</a>
        <span class="header-title">订单详情</span>
        <button id="btnLangToggle" onclick="toggleLang()" style="font-size:12px;font-weight:600;padding:4px 10px;border:1px solid #d4d4d8;border-radius:6px;background:#fff;color:#6366f1;cursor:pointer;transition:all 0.15s" onmouseover="this.style.borderColor='#6366f1';this.style.background='#eef2ff'" onmouseout="this.style.borderColor='#d4d4d8';this.style.background='#fff'">EN</button>
        <div class="header-user-area" id="headerUserArea2">
            <span class="header-pm-tag" id="headerPmTag2" style="display:none"></span>
            <div class="header-user-text">
                <span class="header-user-name" id="headerUserName2"></span>
                <span class="header-user-email" id="headerUserEmail2"></span>
            </div>
        </div>
        <div style="position:relative">
            <button class="header-bell" id="headerBell2" onclick="toggleNotif()" title="通知">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                <span class="header-bell-badge" id="bellBadge2">0</span>
            </button>
            <div class="notif-dropdown" id="notifDropdown2">
                <div class="notif-header">
                    <span id="notifTitle2">消息通知</span>
                    <button class="notif-mark-all" id="notifMarkAll2" onclick="event.stopPropagation();markAllNotifRead()">全部已读</button>
                </div>
                <div class="notif-list" id="notifList2"></div>
            </div>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <ul class="sidebar-nav">
                <li class="active" data-tab="detail">订单详情</li>
                <li data-tab="process">作业流程</li>
                <li data-tab="tracking">快递进度</li>
            </ul>
        </aside>

        <main class="main">
            <div class="tab-content active" id="tab-detail">
                <div class="state-loading">加载中...</div>
            </div>
            <div class="tab-content" id="tab-process">
                <div class="state-loading">加载中...</div>
            </div>
            <div class="tab-content" id="tab-tracking">
                <div class="state-loading">加载中...</div>
            </div>
        </main>
    </div>

    <!-- Chat overlay -->
    <div class="chat-overlay" id="chatOverlay">
        <div class="chat-dialog">
            <div class="chat-header">
                <h3>Messages</h3>
                <button class="chat-close" onclick="closeChat()">×</button>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="empty">Send a message and we'll get back to you</div>
            </div>
            <div class="chat-input-area">

        function updateHeaderFromProfile2() {

            const pmTag = document.getElementById('headerPmTag2');
            nameEl.textContent = (p && p.name) || emailPrefix2;

            const pm = p ? p.paymentMethod : null;
            if (pm) {
                pmTag.style.display = '';
                let popupHtml = '';
                let warnHtml = '';
                let labelText = __('payment_' + pm);
                let tagClass = 'header-pm-tag ' + pm;

                if (pm === 'credit') {
                    const limit = p.creditLimit || 0;
                    const used = p.creditUsed || 0;
                    if (limit > 0 && used >= limit) {
                        warnHtml = '<span class="header-pm-warn danger" title="' + __('creditExhausted') + '">!</span>';
                        labelText = __('creditExhausted');
                        tagClass = 'header-pm-tag exhausted';
                    } else if (limit > 0 && used >= limit * 2 / 3) {
                        warnHtml = '<span class="header-pm-warn" title="' + __('creditExhausted') + '">!</span>';
                    }
                    popupHtml = '<div class="header-pm-popup"><div class="popup-row">';
                    popupHtml += '<div><div class="popup-label">' + __('totalCredit') + '</div><div class="popup-val">$' + fmt(limit) + '</div></div>';

                    popupHtml = '<div class="header-pm-popup"><div style="font-size:13px">' + __('payment_' + pm) + '</div></div>';

                pmTag.className = tagClass;
                pmTag.innerHTML = warnHtml + labelText + popupHtml;
            } else {
                pmTag.style.display = 'none';
            }

        async function loadClientProfile2() {

                if (!clientProfile2) {
                    const allSnap = await getDocs(collection(db, 'clientProfiles'));
                    allSnap.forEach(d => {
                        if (d.data().contactEmail === user.email) clientProfile2 = { ...d.data(), id: d.id, uid: d.data().uid || d.id };
                    });
                }
                updateHeaderFromProfile2();
            } catch (e) { console.warn('加载账户信息失败:', e); }
        }

        };

        async function loadNotifications() {
            try {
                const q = query(collection(db, 'notifications'),
                    where('clientUid', '==', user.id));
                const snap = await getDocs(q);
                notifList = [];
                snap.forEach(d => { notifList.push({ id: d.id, ...d.data() }); });
                notifList.sort((a, b) => new Date(b.createdAt || 0).getTime() - new Date(a.createdAt || 0).getTime());
                updateBellBadge();
                renderNotifList();
            } catch (e) { /* ignore */ }
        }

        function updateBellBadge() {
            const count = notifList.filter(n => !n.read).length;
            const badge = document.getElementById('bellBadge2');
            if (badge) {
                if (count > 0) { badge.textContent = count > 99 ? '99+' : count; badge.classList.add('show'); }
                else { badge.classList.remove('show'); }
            }
        }

        function renderNotifList() {
            const container = document.getElementById('notifList2');
            if (!container) return;
            if (notifList.length === 0) {
                container.innerHTML = '<div class="notif-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><p>' + __('noNotifs') + '</p></div>';
                return;
            }
            let html = '';
            notifList.forEach(n => {
                const time = n.createdAt ? new Date(n.createdAt).toLocaleString('zh-CN', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
                const icon = typeIcons[n.type] || typeIcons.system;
                html += '<div class="notif-item' + (n.read ? '' : ' unread') + '" data-nid="' + n.id + '" data-link="' + escHTML2(n.link || '') + '" onclick="clickNotif(this)">';
                html += '<div class="notif-dot' + (n.read ? ' read' : '') + '"></div>';
                html += '<div style="flex-shrink:0;margin-top:2px">' + icon + '</div>';
                html += '<div class="notif-content"><div class="notif-title">' + escHTML2(n.title || '') + '</div>';
                html += '<div class="notif-body">' + escHTML2(n.body || '') + '</div></div>';
                html += '<div class="notif-time">' + time + '</div>';
                html += '</div>';
            });
            container.innerHTML = html;
        }

        window.toggleNotif = function() {
            const dd = document.getElementById('notifDropdown2');
            dd.classList.toggle('show');
        };

        window.clickNotif = async function(el) {
            const nid = el.dataset.nid;
            const link = el.dataset.link;
            try {
                const { updateDoc, doc } = await import("../shared/pocketbase-init.js");
                await updateDoc(doc(db, 'notifications', nid), { read: true });
                const n = notifList.find(x => x.id === nid);
                if (n) n.read = true;
                updateBellBadge();
                renderNotifList();
            } catch (e) { /* ignore */ }
            if (link) window.location.href = link;
        };

        window.markAllNotifRead = async function() {
            try {
                const { updateDoc, doc } = await import("../shared/pocketbase-init.js");
                const unread = notifList.filter(n => !n.read);
                await Promise.all(unread.map(n => updateDoc(doc(db, 'notifications', n.id), { read: true })));
                unread.forEach(n => n.read = true);
                updateBellBadge();
                renderNotifList();
            } catch (e) { /* ignore */ }
        };

        document.addEventListener('click', function(e) {
            const dd = document.getElementById('notifDropdown2');

                dd.classList.remove('show');

        await loadNotifications();
        setInterval(loadNotifications, 10000);

        window.openAccount2 = function() {
            const overlay = document.getElementById('accountOverlay2');

            const p = clientProfile2 || {};
            const pm = p.paymentMethod || '';
            let html = '<div class="chat-header"><h3>' + __('accountInfo') + '</h3><button class="chat-close" onclick="closeAccount2()">×</button></div>';
            html += '<div style="padding:16px 20px;max-height:500px;overflow-y:auto">';

            html += '<div class="section"><h4>' + __('basicInfo') + '</h4>';
            html += '<div class="row"><span class="label">' + __('customerName') + '</span><span class="value">' + esc(p.name || user.email) + '</span></div>';
            html += '<div class="row"><span class="label">' + __('email') + '</span><span class="value">' + esc(user.email) + '</span></div>';
            html += '<div class="row"><span class="label">' + __('companyName') + '</span>';

            html += '<div class="row"><span class="label">' + __('contactEmail') + '</span>';
            html += '<input class="account-input" id="acctEmail2" value="' + esc(p.contactEmail || '') + '" placeholder="' + __('contactEmail') + '">';

            html += '<div class="row"><span class="label">' + __('country') + '</span>';
            html += '<input class="account-input" id="acctCountry2" value="' + esc(p.country || '') + '" placeholder="' + __('country') + '">';
            html += '</div>';

            html += '<div class="row"><span class="label">' + __('paymentMethod') + '</span><span class="value">';
            html += pm ? '<span class="payment-tag ' + pm + '">' + __('payment_' + pm) + '</span>' : __('notSet');
            html += '</span></div>';
            if (pm === 'credit') {
                const limit = p.creditLimit || 0;
                const used = p.creditUsed || 0;
                const remain = Math.max(0, limit - used);
                html += '<div class="row"><span class="label">' + __('creditLimit') + '</span><span class="value">$' + fmt(limit) + '</span></div>';
                html += '<div class="row"><span class="label">' + __('creditUsed') + '</span><span class="value">$' + fmt(used) + '</span></div>';
                html += '<div class="row"><span class="label">' + __('creditRemain') + '</span><span class="value" style="color:' + (remain > 0 ? '#16a34a' : '#dc2626') + ';font-weight:600">$' + fmt(remain) + '</span></div>';
            }
            html += '</div>';

            html += '<div style="text-align:right;margin-top:12px">';
            html += '<button class="btn-save-account" id="btnSaveAccount2" onclick="saveAccount2()">' + __('saveChanges') + '</button>';

            html += '</div>';

            container.innerHTML = html;
            overlay.classList.add('show');

            document.getElementById('accountOverlay2').classList.remove('show');

        window.saveAccount2 = async function() {
            const btn = document.getElementById('btnSaveAccount2');
            btn.textContent = __('saving');
            btn.disabled = true;
            try {
                const company = document.getElementById('acctCompany2').value.trim();
                const contactEmail = document.getElementById('acctEmail2').value.trim();
                const country = document.getElementById('acctCountry2').value.trim();
                if (clientProfile2 && clientProfile2.uid) {
                    await updateDoc(doc(db, 'clientProfiles', clientProfile2.id), { company, contactEmail, country });
                } else {
                    const { setDoc } = await import("../shared/pocketbase-init.js");
                    await setDoc(doc(db, 'clientProfiles', user.id), {
                        name: user.email.split('@')[0], company, contactEmail, country,
                        registeredAt: new Date()
                    });
                    clientProfile2 = { uid: user.id, name: user.email.split('@')[0], company, contactEmail, country };
                }
                clientProfile2.company = company;
                clientProfile2.contactEmail = contactEmail;
                clientProfile2.country = country;
                btn.textContent = __('saved');
                setTimeout(() => { btn.textContent = __('saveChanges'); btn.disabled = false; }, 1500);
            } catch (e) {
                alert(__('confirmFailedMsg') + (e.message || ''));
                btn.textContent = __('saveChanges');
                btn.disabled = false;
            }
        };

        // ---- SVG dimension annotation lines (post-render) ----
        function annotateDetailSvgs() {
            const svgEls = document.querySelectorAll('.svg-preview svg');
            svgEls.forEach(svgEl => {
                try { annotateOneSvg(svgEl); } catch (e) {}
            });
        }

        function annotateOneSvg(svgEl) {
            if (svgEl.querySelector('.dim-annotation')) return;
            svgEl.setAttribute('overflow', 'visible');

            var paths = svgEl.querySelectorAll('path');
            var pieces = [];
            paths.forEach(function(p) {
                try {
                    var bb = p.getBBox();
                    if (bb.width > 0.1 && bb.height > 0.1) pieces.push({ x: bb.x, y: bb.y, w: bb.width, h: bb.height });
                } catch (e) {}
            });
            if (pieces.length === 0) return;

            pieces.sort(function(a, b) { return a.x - b.x; });
            var chars = [], cur = { xMin: pieces[0].x, xMax: pieces[0].x + pieces[0].w, yMin: pieces[0].y, yMax: pieces[0].y + pieces[0].h };
            for (var i = 1; i < pieces.length; i++) {
                var p = pieces[i];
                if (p.x <= cur.xMax + 50) {
                    cur.xMax = Math.max(cur.xMax, p.x + p.w);
                    cur.yMin = Math.min(cur.yMin, p.y);
                    cur.yMax = Math.max(cur.yMax, p.y + p.h);
                } else {
                    chars.push(cur);
                    cur = { xMin: p.x, xMax: p.x + p.w, yMin: p.y, yMax: p.y + p.h };
                }
            }
            chars.push(cur);

            var pad = 14, ext = 7;
            var hx = chars[0].xMin - pad;
            var hy0 = chars[0].yMin, hy1 = chars[0].yMax;
            var wy = Math.max.apply(null, chars.map(function(c) { return c.yMax; })) + pad;
            var xMin = Math.min.apply(null, chars.map(function(c) { return c.xMin; }));
            var xMax = Math.max.apply(null, chars.map(function(c) { return c.xMax; }));

            var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.classList.add('dim-annotation');
            // Lines via innerHTML (works for pure SVG elements)
            g.innerHTML =
                // Vertical dimension line
                '<line x1="'+hx+'" y1="'+hy0+'" x2="'+hx+'" y2="'+hy1+'" stroke="#2563eb" stroke-width="3"/>' +
                // Vertical arrows (top↓ bottom↑)
                '<polygon points="'+(hx-5)+','+(hy0+10)+' '+hx+','+hy0+' '+(hx+5)+','+(hy0+10)+'" fill="#2563eb"/>' +
                '<polygon points="'+(hx-5)+','+(hy1-10)+' '+hx+','+hy1+' '+(hx+5)+','+(hy1-10)+'" fill="#2563eb"/>' +
                // Tick marks
                '<line x1="'+(hx-ext)+'" y1="'+hy0+'" x2="'+(hx+ext)+'" y2="'+hy0+'" stroke="#2563eb" stroke-width="3"/>' +
                '<line x1="'+(hx-ext)+'" y1="'+hy1+'" x2="'+(hx+ext)+'" y2="'+hy1+'" stroke="#2563eb" stroke-width="3"/>' +
                // Horizontal dimension line
                '<line x1="'+xMin+'" y1="'+wy+'" x2="'+xMax+'" y2="'+wy+'" stroke="#2563eb" stroke-width="3"/>' +
                // Horizontal arrows (left→ right←)
                '<polygon points="'+(xMin+10)+','+(wy-5)+' '+xMin+','+wy+' '+(xMin+10)+','+(wy+5)+'" fill="#2563eb"/>' +
                '<polygon points="'+(xMax-10)+','+(wy-5)+' '+xMax+','+wy+' '+(xMax-10)+','+(wy+5)+'" fill="#2563eb"/>' +
                // Tick marks
                '<line x1="'+xMin+'" y1="'+(wy-ext)+'" x2="'+xMin+'" y2="'+(wy+ext)+'" stroke="#2563eb" stroke-width="3"/>' +
                '<line x1="'+xMax+'" y1="'+(wy-ext)+'" x2="'+xMax+'" y2="'+(wy+ext)+'" stroke="#2563eb" stroke-width="3"/>';
            svgEl.appendChild(g);

            // ---- HTML overlay labels (bypasses SVG text rendering quirks) ----
            var container = svgEl.closest('.svg-preview') || svgEl.closest('.svg-preview-box');
            if (container) {
                container.querySelectorAll('.dim-label-overlay').forEach(function(el) { el.remove(); });

                var hCm = container.getAttribute('data-dim-h') || '';
                var wCm = container.getAttribute('data-dim-w') || '';

                if (hCm || wCm) {
                    var vb = svgEl.getAttribute('viewBox');
                    if (vb) {
                        var vbParts = vb.trim().split(/[\s,]+/);
                        var vbX = parseFloat(vbParts[0]) || 0;
                        var vbY = parseFloat(vbParts[1]) || 0;
                        var vbW = parseFloat(vbParts[2]) || 1000;
                        var vbH = parseFloat(vbParts[3]) || 1000;
                        var svgRect = svgEl.getBoundingClientRect();
                        var cRect = container.getBoundingClientRect();
                        var sx = svgRect.width / vbW;
                        var sy = svgRect.height / vbH;
                        var ox = svgRect.left - cRect.left;
                        var oy = svgRect.top - cRect.top;
                        function toX(v) { return ox + (v - vbX) * sx; }
                        function toY(v) { return oy + (v - vbY) * sy; }

                        if (hCm) {
                            var midY = (hy0 + hy1) / 2;
                            var el = document.createElement('div');
                            el.className = 'dim-label-overlay';
                            el.style.cssText = 'position:absolute;left:' + toX(hx) + 'px;top:' + toY(midY) + 'px;transform:translate(calc(-100% - 6px),-50%);color:#dc2626;font-size:13px;font-weight:bold;font-family:Arial,sans-serif;pointer-events:none;white-space:nowrap;z-index:5;text-shadow:0 0 3px #fff;';
                            el.textContent = __('charHeight') + hCm + 'cm';
                            container.appendChild(el);
                        }
                        if (wCm) {
                            var wcx = (xMin + xMax) / 2;
                            var el = document.createElement('div');
                            el.className = 'dim-label-overlay';
                            el.style.cssText = 'position:absolute;left:' + toX(wcx) + 'px;top:' + toY(wy) + 'px;transform:translate(-50%,6px);color:#dc2626;font-size:13px;font-weight:bold;font-family:Arial,sans-serif;pointer-events:none;white-space:nowrap;z-index:5;text-shadow:0 0 3px #fff;';
                            el.textContent = __('totalWidth') + wCm + 'cm';
                            container.appendChild(el);
                        }
                    }
                }
            }
        }

        // ---- Render process tab ----
        function calcProgress(proc, status) {
            if (status === 'completed') return 100;
            if (!proc || !proc.steps || proc.steps.length === 0) return 0;
            const total = proc.steps.length;
            const done = proc.steps.filter(s => s.done).length;
            return total > 0 ? Math.round(done / total * 100) : 0;
        }

        function renderProcess() {
            const o = order;
            const proc = o.process;

            if (!proc || !proc.steps || proc.steps.length === 0) {
                document.getElementById('tab-process').innerHTML =
                    '<div class="no-process"><h3 style="color:#666;font-size:16px">' + __('noProcessTitle') + '</h3><p>' + __('noProcessBody') + '</p></div>';
                return;
            }

            const pct = calcProgress(proc, order.status);
            let html = '';

            html += '<div class="section"><h4>' + __('overallProgress') + '</h4>';
            html += '<div class="progress-wrap">';
            html += '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
            html += '<span class="progress-pct">' + pct + '%</span>';
            html += '</div></div>';

            // Main steps
            if (proc.steps && proc.steps.length > 0) {
                html += '<div class="section"><h4>' + __('productionProcess') + '</h4><ul class="step-list">';
                proc.steps.forEach(s => {
                    html += '<li class="' + (s.done ? 'done' : '') + '">';
                    html += '<span class="step-check">✓</span>';
                    html += '<span class="step-name">' + esc(__('step_' + s.name) || s.name) + '</span>';
                    html += '</li>';
                });
                html += '</ul></div>';
            }

            document.getElementById('tab-process').innerHTML = html;
        }

        let _chatUnsub = null; // real-time subscription for chat messages
        let _chatConvId = null;
        let _chatSalesEmail = null;
        let _bgPollInterval = null;

        // Initial render
        renderDetail();
        renderProcess();
        startBackgroundChatPoll();

        // Background poll for order status changes (from factory/completed etc.)
        let _lastStatus = order.status || 'pending';
        function startStatusPoll() {
            setInterval(async () => {
                try {
                    if (!order || !order.id) return;
                    // Check customer's own copy first, fall back to sales copy
                    let newStatus = null;
                    const snap = await getDoc(doc(db, 'users', user.id, 'quotes', order.id));
                    if (snap.exists()) {
                        newStatus = snap.data().status || 'pending';
                    } else if (order.publishedByUid) {
                        const salesRid = order.originalRecordId || order.id;
                        const salesSnap = await getDoc(doc(db, 'users', order.publishedByUid, 'quotes', salesRid));
                        if (salesSnap.exists()) newStatus = salesSnap.data().status || 'pending';
                    }
                    if (!newStatus || newStatus === _lastStatus) return;
                    _lastStatus = newStatus;
                    order.status = newStatus;

                    // Update status badge
                    const badge = document.querySelector('.status-badge');
                    if (badge) {
                        badge.textContent = __('status_' + newStatus);
                        badge.className = 'status-badge status-' + newStatus;
                    }

                    // Update confirm button
                    const btn = document.getElementById('btnConfirmInline');
                    const btnArea = btn ? btn.parentElement : null;
                    if (newStatus !== 'pending' && btn) {
                        btn.remove();
                    }
                    if (newStatus === 'confirmed' && btnArea && !document.getElementById('btnConfirmInline')) {
                        const newBtn = document.createElement('button');
                        newBtn.className = 'btn-confirm-inline confirmed';
                        newBtn.id = 'btnConfirmInline';
                        newBtn.disabled = true;
                        newBtn.textContent = __('confirmed');
                        btnArea.appendChild(newBtn);
                    }
                } catch (e) { /* ignore */ }
            }, 5000);
        }
        startStatusPoll();

        // ---- Confirm quote ----
        window.confirmQuote = async function() {
            if (!order || order.status !== 'pending') return;
            const btn = document.getElementById('btnConfirmInline');
            if (btn) { btn.disabled = true; btn.textContent = __('confirming'); }

            // Credit check: if credit customer, verify enough remaining credit
            if (customerPayment && customerPayment.paymentMethod === 'credit' && customerPayment.uid) {
                const limit = customerPayment.creditLimit || 0;
                const used = customerPayment.creditUsed || 0;
                const orderTotal = order.totalPrice || 0;
                if (limit > 0 && used + orderTotal > limit) {
                    const remain = Math.max(0, limit - used);
                    alert(__('creditInsufficient') + '\n' + __('totalCredit') + '：$' + fmt(limit) + '\n' + __('creditUsed') + '：$' + fmt(used) + '\n' + __('creditRemain') + '：$' + fmt(remain) + '\n' + __('total') + '：$' + fmt(orderTotal) + '\n\n' + __('creditAlertContact'));
                    if (btn) { btn.disabled = false; btn.textContent = __('confirmQuote'); }
                    return;
                }
            }

            // Monthly check: block if unpaid statement exists
            if (customerPayment && customerPayment.paymentMethod === 'monthly' && customerPayment.uid) {
                try {
                    const stmtSnap = await getDocs(query(
                        collection(db, 'billingStatements'),
                        where('clientUid', '==', customerPayment.uid),
                        where('status', '==', 'pending')
                    ));
                    if (!stmtSnap.empty) {
                        alert(__('unpaidBillBlock'));
                        if (btn) { btn.disabled = false; btn.textContent = __('confirmQuote'); }
                        return;
                    }
                } catch (e) { console.warn('账单检查失败:', e); }
            }

            // Prepaid: calculate deposit and notify
            let prepaidDepositAmt = 0, prepaidRemainderAmt = 0, isPrepaid = false;
            if (customerPayment && customerPayment.paymentMethod === 'prepaid' && customerPayment.uid) {
                isPrepaid = true;
                const dpPct = customerPayment.depositPercent || 0;
                const total = order.totalPrice || 0;
                prepaidDepositAmt = Math.round(total * dpPct / 100 * 100) / 100;
                prepaidRemainderAmt = Math.round((total - prepaidDepositAmt) * 100) / 100;
                if (dpPct <= 0) {
                    alert(__('prepaidNotSet'));
                    if (btn) { btn.disabled = false; btn.textContent = __('confirmQuote'); }
                    return;
                }
                if (!confirm(__('prepaidConfirmMsg') + fmt(prepaidDepositAmt) + '（' + dpPct + __('prepaidConfirmPost))) {
                    if (btn) { btn.disabled = false; btn.textContent = __('confirmQuote'); }
                    return;
                }
            }

            // Full payment: require 100% payment before production
            let isFull = false;
            if (customerPayment && customerPayment.paymentMethod === 'full' && customerPayment.uid) {
                isFull = true;
                const total = order.totalPrice || 0;
                prepaidDepositAmt = total;
                prepaidRemainderAmt = 0;
                if (!confirm(__('fullConfirmMsg') + fmt(total) + __('fullConfirmPost))) {
                    if (btn) { btn.disabled = false; btn.textContent = __('confirmQuote'); }
                    return;
                }
            }

            try {
                // Deduct credit if credit customer
                if (customerPayment && customerPayment.paymentMethod === 'credit' && customerPayment.uid) {
                    const previousUsed = customerPayment.creditUsed || 0;
                    const newUsed = previousUsed + (order.totalPrice || 0);
                    await updateDoc(doc(db, 'clientProfiles', customerPayment.id), { creditUsed: newUsed });
                    customerPayment.creditUsed = newUsed;
                    await addDoc(collection(db, 'creditTransactions'), {
                        clientUid: customerPayment.uid,
                        type: 'deduction',
                        amount: order.totalPrice || 0,
                        previousUsed: previousUsed,
                        newUsed: newUsed,
                        note: '订单确认：' + (order.quoteNumber || orderId),
                        createdAt: serverTimestamp()
                    }).catch(() => {});
                }

                const proc = { steps: ['作图','厂内工作','包装','发货'].map(name => ({ name, done: false })), confirmed: true };
                const updateData = { status: 'confirmed', process: proc };

                // Prepaid / Full: store payment amounts
                if (isPrepaid || isFull) {
                    updateData.depositAmount = prepaidDepositAmt;
                    updateData.remainderAmount = prepaidRemainderAmt;
                    updateData.depositPercent = isFull ? 100 : (customerPayment.depositPercent || 0);
                    updateData.depositPaid = false;
                    updateData.remainderPaid = false;
                }

                await updateDoc(doc(db, 'users', user.id, 'quotes', orderId), updateData);
                order.status = 'confirmed';
                order.process = proc;
                if (isPrepaid || isFull) {
                    order.depositAmount = prepaidDepositAmt;
                    order.remainderAmount = prepaidRemainderAmt;
                    order.depositPercent = isFull ? 100 : (customerPayment.depositPercent || 0);
                    order.depositPaid = false;
                    order.remainderPaid = false;
                }

                if (order.publishedByUid) {
                    try {
                        const syncData = { process: proc, processPublished: true };
                        if (isPrepaid || isFull) {
                            syncData.status = 'confirmed';
                            syncData.depositAmount = prepaidDepositAmt;
                            syncData.remainderAmount = prepaidRemainderAmt;
                            syncData.depositPercent = isFull ? 100 : (customerPayment.depositPercent || 0);
                            syncData.depositPaid = false;
                            syncData.remainderPaid = false;
                        } else {
                            syncData.status = 'in_production';
                        }
                        const salesRid2 = order.originalRecordId || orderId;
                        await updateDoc(doc(db, 'users', order.publishedByUid, 'quotes', salesRid2), syncData);
                    } catch (e) { console.error('同步确认到销售端失败:', e); }
                }

                // Create notification
                if (isPrepaid) {
                    await addDoc(collection(db, 'notifications'), {
                        clientUid: customerPayment.uid,
                        type: 'bill',
                        title: '预付款待支付',
                        body: '您有一笔预付款定金需要支付：$' + prepaidDepositAmt.toFixed(2) + '（' + (customerPayment.depositPercent || 0) + '%），支付后生产才会开始。点击查看订单详情。',
                        read: false,
                        createdAt: serverTimestamp(),
                        link: '../client/prepaid-bills.html'
                    }).catch(() => {});
                }
                if (isFull) {
                    await addDoc(collection(db, 'notifications'), {
                        clientUid: customerPayment.uid,
                        type: 'bill',
                        title: '全款待支付',
                        body: '您的订单需支付全款 $' + prepaidDepositAmt.toFixed(2) + '，支付后生产才会开始。点击查看订单详情。',
                        read: false,
                        createdAt: serverTimestamp(),
                        link: '../client/full-bills.html'
                    }).catch(() => {});
                }

                if (btn) { btn.textContent = __('confirmed'); btn.className = 'btn-confirm-inline confirmed'; btn.disabled = false; }
                const badge = document.querySelector('.status-badge');
                if (badge) { badge.textContent = __('status_confirmed'); badge.className = 'status-badge status-confirmed'; }
            } catch (err) {
                console.error('确认失败:', err);
                if (btn) { btn.disabled = false; btn.textContent = __('confirmQuote'); }
                alert(__('confirmFailedMsg') + (err.message || '未知错误'));
            }
        };

        // ---- Chat ----
        function formatChatTime(ts) {
            if (!ts) return '';
            const d = new Date(ts);
            const now = new Date();
            const isToday = d.toDateString() === now.toDateString();
            if (isToday) return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            return d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        function renderChatMessages(messages) {
            const container = document.getElementById('chatMessages');
            if (!messages || messages.length === 0) {
                container.innerHTML = '<div class="empty">Send a message and we\'ll get back to you</div>';
                return;
            }
            container.innerHTML = messages.map(m => {
                const isMe = m.from === user.email;
                const cls = isMe ? 'right' : 'left';
                const timeStr = formatChatTime(m.timestamp);
                return '<div class="chat-bubble ' + cls + '">' +
                    esc(m.text || '') +
                    (timeStr ? '<span class="time">' + timeStr + '</span>' : '') +
                    '</div>';
            }).join('');
            container.scrollTop = container.scrollHeight;
        }

        window.openChat = async function() {
            document.getElementById('chatOverlay').classList.add('show');
            document.getElementById('chatMessages').innerHTML = '<div class="empty">Loading...</div>';

            // Determine sales email
            let salesEmail = order.publishedBy || '';
            if (!salesEmail) {
                try {
                    const cpSnap = await getDocs(query(collection(db, 'clientProfiles'), where('uid', '==', user.id)));
                    cpSnap.forEach(d => { if (!salesEmail && d.data().assignedTo) salesEmail = d.data().assignedTo; });
                } catch (e) {}
            }
            _chatSalesEmail = salesEmail;

            // Find or create conversation
            try {
                if (salesEmail) {
                    const convSnap = await getDocs(query(
                        collection(db, 'conversations'),
                        where('ownerUid', '==', user.id),
                        where('salesEmail', '==', salesEmail)
                    ));
                    convSnap.forEach(d => { _chatConvId = d.id; });
                    if (!_chatConvId) {
                        const newConv = await addDoc(collection(db, 'conversations'), {
                            ownerUid: user.id, salesEmail, salesUid: '',
                            customerEmail: user.email,
                            customerName: order.customerName || '',
                            lastMessage: '', lastTimestamp: new Date().toISOString(),
                            unreadForSales: 0, unreadForCustomer: 0
                        });
                        _chatConvId = newConv.id;
                    }
                    // Mark unread as read
                    updateDoc(doc(db, 'conversations', _chatConvId), { unreadForCustomer: 0 }).catch(() => {});
                }
            } catch (e) { console.warn('Chat init error:', e); }

            const pollMessages = async () => {
                if (!document.getElementById('chatOverlay').classList.contains('show')) return;
                try {
                    if (!_chatConvId) return;
                    const q = query(collection(db, 'messages'), where('conversationId', '==', _chatConvId), orderBy('timestamp', 'asc'));
                    const snap = await getDocs(q);
                    const msgs = [];
                    snap.forEach(d => msgs.push({ id: d.id, ...d.data() }));
                    renderChatMessages(msgs);
                } catch (err) {
                    console.error('Chat poll error:', err);
                }
            };
            pollMessages();

            // Real-time subscription
            if (_chatUnsub) _chatUnsub();
            _chatUnsub = subscribe('messages', () => {
                pollMessages();
            });
        };

        window.closeChat = function() {
            document.getElementById('chatOverlay').classList.remove('show');
            _chatConvId = null;
            _chatSalesEmail = null;
            if (_chatUnsub) { _chatUnsub(); _chatUnsub = null; }
        };

        // Background listener for unread messages from sales (shows indicator on button)
        function startBackgroundChatPoll() {
            if (_bgPollInterval) clearInterval(_bgPollInterval);
            const checkUnread = async () => {
                try {
                    let hasUnread = false;
                    const convSnap = await getDocs(query(
                        collection(db, 'conversations'),
                        where('ownerUid', '==', user.id)
                    ));
                    convSnap.forEach(d => {
                        if (d.data().unreadForCustomer > 0) hasUnread = true;
                    });
                    const link = document.getElementById('confusedLink');
                    if (!link) return;
                    if (hasUnread) {
                        link.classList.add('has-unread');
                        link.title = 'You have a new reply!';
                    } else {
                        link.classList.remove('has-unread');
                        link.title = '';
                    }
                } catch (e) { /* ignore */ }
            };
            checkUnread();
            _bgPollInterval = setInterval(checkUnread, 5000);
        }

        window.sendChatMessage = async function() {
            const input = document.getElementById('chatInput');
            const btn = document.getElementById('btnChatSend');
            const text = input.value.trim();
            if (!text) return;

            btn.disabled = true;
            input.disabled = true;

            try {
                // Determine sales email if not already set
                if (!_chatSalesEmail) {
                    _chatSalesEmail = order.publishedBy || '';
                    if (!_chatSalesEmail) {
                        const cpSnap = await getDocs(query(collection(db, 'clientProfiles'), where('uid', '==', user.id)));
                        cpSnap.forEach(d => { if (!_chatSalesEmail && d.data().assignedTo) _chatSalesEmail = d.data().assignedTo; });
                    }
                }

                // Find or create conversation
                if (!_chatConvId && _chatSalesEmail) {
                    const convSnap = await getDocs(query(
                        collection(db, 'conversations'),
                        where('ownerUid', '==', user.id),
                        where('salesEmail', '==', _chatSalesEmail)
                    ));
                    convSnap.forEach(d => { _chatConvId = d.id; });
                    if (!_chatConvId) {
                        const newConv = await addDoc(collection(db, 'conversations'), {
                            ownerUid: user.id, salesEmail: _chatSalesEmail, salesUid: '',
                            customerEmail: user.email,
                            customerName: order.customerName || '',
                            lastMessage: '', lastTimestamp: new Date().toISOString(),
                            unreadForSales: 0, unreadForCustomer: 0
                        });
                        _chatConvId = newConv.id;
                    }
                }

                if (!_chatConvId) {
                    alert(__('cannotFindManager'));
                    return;
                }

                const now = new Date().toISOString();
                await updateDoc(doc(db, 'conversations', _chatConvId), {
                    lastMessage: text,
                    lastTimestamp: now,
                    unreadForSales: 1
                });

                await addDoc(collection(db, 'messages'), {
                    conversationId: _chatConvId,
                    from: user.email,
                    text,
                    timestamp: now
                });

                input.value = '';
                input.style.height = '38px';
                console.log('消息发送成功');
            } catch (err) {
                console.error('发送消息失败:', err);
                alert(__('sendFailed') + ': ' + (err.message || '未知错误'));
            } finally {
                btn.disabled = false;
                input.disabled = false;
                input.focus();
            }
        };

        // ---- Render tracking tab ----
        function renderTrackingTab() {
            const o = order;
            const shipments = o.shipments || [];
            let html = '';

            html += '<div class="detail-header-block">';
            html += '<div class="quote-num">' + __('trackingTitle') + '<br><span>' + esc(o.quoteNumber) + '</span></div>';
            html += '<div class="meta">' + __('customer') + '：' + esc(o.customerName || '-') + '</div>';
            html += '</div>';

            if (shipments.length === 0) {
                html += '<div class="section" style="text-align:center;padding:60px 20px;color:#bbb">';
                html += '<p style="font-size:14px">' + __('noTracking') + '</p>';
                html += '</div>';
            } else {
                shipments.forEach(ship => {
                    if (!ship.publishedToClient) return;
                    const statusText = ship.trackingData ? (ship.trackingData.statusText || __('inTransit')) : __('querying');
                    html += '<div class="section">';
                    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
                    html += '<span class="carrier-tag carrier-' + (ship.carrier || 'dhl').toLowerCase() + '">' + esc(ship.carrier || 'DHL') + '</span>';
                    html += '<span style="font-size:12px;color:#888">' + __('trackingStatus') + '：' + statusText + '</span>';
                    html += '</div>';
                    html += '<div class="tracking-num">' + esc(ship.trackingNumber) + '</div>';
                    if (ship.shipmentType === 'merged' && ship.mergedOrderNumbers && ship.mergedOrderNumbers.length > 1) {
                        html += '<div style="font-size:12px;color:#6366f1;margin:4px 0">' + __('consolidated') + '：' + esc(ship.mergedOrderNumbers.join('、')) + '</div>';
                    }
                    html += '<div class="ship-meta">' + __('shipDate') + '：' + esc(ship.shipDate || '-') + ' · ' + __('estDelivery') + '：' + (ship.trackingData ? esc(ship.trackingData.estimatedDelivery || '-') : '-') + '</div>';

                    if (ship.trackingData && ship.trackingData.events && ship.trackingData.events.length > 0) {
                        html += '<div class="timeline">';
                        ship.trackingData.events.forEach(ev => {
                            html += '<div class="tl-item">';
                            html += '<span class="tl-time">' + esc(ev.time || '') + '</span>';
                            html += esc(ev.location || '') + ' ' + esc(ev.description || ev.status || '');
                            html += '</div>';
                        });
                        html += '</div>';
                    } else {
                        html += '<p style="text-align:center;color:#bbb;font-size:13px;padding:12px">' + __('noLogistics') + '</p>';
                    }
                    html += '</div>';
                });
            }

            document.getElementById('tab-tracking').innerHTML = html;
        }

        // ---- Load tracking on tab switch ----
        document.querySelectorAll('.sidebar-nav li').forEach(li => {
            li.addEventListener('click', function() {
                if (this.dataset.tab === 'tracking') renderTrackingTab();
            });
        });

        // Close chat on overlay click
        document.getElementById('chatOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeChat();
        });

        // Auto-resize textarea
        document.getElementById('chatInput').addEventListener('input', function() {
            this.style.height = '38px';
            this.style.height = Math.min(this.scrollHeight, 80) + 'px';
        });

    </script>
</body>
</html>
