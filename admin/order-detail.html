<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单详情 - 报价系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5; min-height: 100vh;
        }

        .bg-gradient {
            position: fixed; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(99,102,241,0.04) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(34,197,94,0.03) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        .header {
            position: relative; z-index: 1;
            background: #fff; border-bottom: 1px solid #eee;
            padding: 0 32px; height: 56px;
            display: flex; align-items: center; gap: 16px;
        }
        .btn-back {
            font-size: 13px; color: #666;
            background: none; border: none; cursor: pointer;
            padding: 6px 0; text-decoration: none;
        }
        .btn-back:hover { color: #1a1a1a; }
        .header-title { font-size: 16px; font-weight: 600; color: #1a1a1a; }
        .user-email { font-size: 13px; color: #999; margin-left: auto; }

        .header-user-area {
            display: flex; align-items: center; gap: 10px; margin-left: auto;
            cursor: pointer; padding: 4px 8px; border-radius: 8px;
            transition: background 0.15s;
        }
        .header-user-area:hover { background: #f5f5f5; }

        .header-pm-tag {
            display: inline-block; font-size: 11px; font-weight: 600;
            padding: 4px 10px; border-radius: 6px; white-space: nowrap;
            position: relative; cursor: default;
        }
        .header-pm-tag.monthly { background: #eff6ff; color: #2563eb; }
        .header-pm-tag.credit { background: #f3e8ff; color: #7c3aed; }
        .header-pm-tag.pay_before_ship { background: #fff7ed; color: #c2410c; }
        .header-pm-tag.prepaid { background: #f0fdf4; color: #16a34a; }
        .header-pm-tag.full { background: #fef2f2; color: #dc2626; }

        .header-pm-popup {
            display: none; position: absolute; top: calc(100% + 8px); left: 50%;
            transform: translateX(-50%); white-space: nowrap;
            background: #1a1a1a; color: #fff; font-size: 13px; font-weight: 500;
            padding: 12px 16px; border-radius: 10px; line-height: 1.6;
            pointer-events: none; z-index: 300;
        }
        .header-pm-popup .popup-row {
            display: flex; gap: 16px; align-items: center;
        }
        .header-pm-popup .popup-label { color: #aaa; font-size: 11px; font-weight: 400; }
        .header-pm-popup .popup-val { font-size: 15px; font-weight: 700; }
        .header-pm-popup .popup-divider { color: #555; font-size: 15px; }
        .header-pm-tag:hover .header-pm-popup { display: block; }
        .header-pm-warn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 16px; height: 16px; border-radius: 50%;
            background: #f59e0b; color: #fff; font-size: 10px; font-weight: 700;
            margin-right: 3px; vertical-align: middle; cursor: help;
        }
        .header-pm-warn.danger {
            background: #dc2626;
        }
        .header-pm-tag.exhausted {
            background: #fef2f2; color: #dc2626;
        }

        .header-user-text { line-height: 1.3; }
        .header-user-name { font-size: 13px; font-weight: 500; color: #1a1a1a; display: block; }
        .header-user-email { font-size: 11px; color: #999; display: block; }

        .header-bell { position: relative; cursor: pointer; padding: 6px; border-radius: 8px; border: none; background: none; }
        .header-bell:hover { background: #f5f5f5; }
        .header-bell svg { width: 20px; height: 20px; color: #666; display: block; }
        .header-bell-badge { position: absolute; top: 1px; right: 1px; min-width: 16px; height: 16px; background: #dc2626; color: #fff; font-size: 10px; font-weight: 700; border-radius: 8px; display: none; align-items: center; justify-content: center; padding: 0 4px; }
        .header-bell-badge.show { display: flex; }

        .notif-dropdown {
            display: none; position: absolute; top: calc(100% + 8px); right: 0;
            width: 380px; max-height: 480px; background: #fff; border-radius: 14px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.12); border: 1px solid #eee;
            z-index: 200; flex-direction: column; overflow: hidden;
        }
        .notif-dropdown.show { display: flex; }
        .notif-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px; border-bottom: 1px solid #f0f0f0;
            font-size: 14px; font-weight: 600; color: #1a1a1a;
        }
        .notif-mark-all {
            font-size: 12px; color: #6366f1; cursor: pointer; border: none; background: none; font-weight: 500;
        }
        .notif-mark-all:hover { color: #4f46e5; }
        .notif-list { overflow-y: auto; max-height: 400px; }
        .notif-item {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 14px 18px; cursor: pointer; border-bottom: 1px solid #f9f9f9;
            transition: background 0.1s; position: relative;
        }
        .notif-item:hover { background: #f8f9fa; }
        .notif-item.unread { background: #fafaff; }
        .notif-item.unread:hover { background: #f0f0ff; }
        .notif-dot { width: 8px; height: 8px; border-radius: 50%; background: #6366f1; flex-shrink: 0; margin-top: 6px; }
        .notif-dot.read { visibility: hidden; }
        .notif-content { flex: 1; min-width: 0; }
        .notif-title { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; }
        .notif-body { font-size: 12px; color: #888; line-height: 1.5; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .notif-time { font-size: 11px; color: #bbb; flex-shrink: 0; margin-top: 2px; }
        .notif-empty { text-align: center; padding: 40px 20px; color: #ccc; font-size: 13px; }
        .notif-empty svg { width: 36px; height: 36px; margin-bottom: 8px; color: #ddd; }
        @media (max-width: 600px) {
            .notif-dropdown { width: calc(100vw - 32px); right: -60px; }
        }

        .layout {
            position: relative; z-index: 1;
            display: flex; min-height: calc(100vh - 56px);
            max-width: 1000px; margin: 0 auto;
        }

        /* ---- Sidebar ---- */
        .sidebar {
            width: 180px; flex-shrink: 0;
            background: #fff; border-right: 1px solid #eee;
            padding: 20px 0;
        }
        .sidebar-nav { list-style: none; }
        .sidebar-nav li {
            padding: 12px 24px; font-size: 14px; color: #666;
            cursor: pointer; transition: all 0.15s;
            border-right: 2px solid transparent;
        }
        .sidebar-nav li:hover { color: #1a1a1a; background: #fafafa; }
        .sidebar-nav li.active {
            color: #6366f1; font-weight: 600;
            background: #eef2ff; border-right-color: #6366f1;
        }

        /* ---- Main content ---- */
        .main {
            flex: 1; padding: 32px 40px; overflow-y: auto;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ---- Status badge ---- */
        .status-badge {
            display: inline-block; font-size: 12px; font-weight: 500;
            padding: 3px 10px; border-radius: 4px;
        }
        .status-pending { background: #fefce8; color: #a16207; }
        .status-confirmed { background: #fef3c7; color: #b45309; }
        .status-in_production { background: #eff6ff; color: #2563eb; }
        .status-completed { background: #f0fdf4; color: #16a34a; }
        .status-shipped { background: #faf5ff; color: #9333ea; }
        .status-signed { background: #f0fdf4; color: #15803d; }

        /* ---- Detail sections ---- */
        .detail-header-block {
            margin-bottom: 28px; padding: 20px;
            background: #fff; border-radius: 12px;
            border: 1px solid #eee;
        }
        .detail-header-block .quote-num {
            font-size: 13px; color: #999; margin-bottom: 4px;
        }
        .detail-header-block .quote-num span {
            font-size: 22px; font-weight: 700; color: #1a1a1a; letter-spacing: 1px;
        }
        .detail-header-block .meta {
            font-size: 13px; color: #888; margin-top: 10px;
            display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
        }

        .section {
            background: #fff; border-radius: 12px;
            border: 1px solid #eee; padding: 20px 24px;
            margin-bottom: 12px;
        }
        .section h4 {
            font-size: 14px; font-weight: 600; color: #1a1a1a;
            margin-bottom: 12px; padding-bottom: 8px;
            border-bottom: 1px solid #f0f0f0;
        }
        .row {
            display: flex; justify-content: space-between;
            padding: 5px 0; font-size: 14px;
        }
        .row .label { color: #888; }
        .row .value { color: #1a1a1a; font-weight: 500; }

        .price-total {
            text-align: right; padding: 16px 0 0;
            font-size: 26px; font-weight: 700; color: #1a1a1a;
        }
        .price-total small { font-size: 13px; color: #999; font-weight: 400; display: block; }

        .svg-preview {
            text-align: center; padding: 12px;
            max-height: 280px; overflow: auto;
        }
        .svg-preview svg { max-width: 100%; max-height: 250px; }

        /* ---- Progress ---- */
        .progress-wrap {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 20px;
        }
        .progress-bar {
            flex: 1; height: 8px;
            background: #eee; border-radius: 4px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; border-radius: 4px;
            background: #22c55e; transition: width 0.4s;
        }
        .progress-pct { font-size: 14px; font-weight: 600; color: #22c55e; min-width: 40px; }

        .step-list { list-style: none; }
        .step-list li {
            display: flex; align-items: center; padding: 10px 12px;
            border-radius: 8px; margin-bottom: 4px;
            font-size: 14px; color: #1a1a1a;
            background: #fafafa;
        }
        .step-list li.done { background: #f0fdf4; color: #16a34a; }
        .step-check {
            width: 24px; height: 24px; border-radius: 50%;
            border: 2px solid #ddd; margin-right: 12px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: transparent;
        }
        .step-list li.done .step-check {
            background: #22c55e; border-color: #22c55e; color: #fff;
        }
        .step-name { flex: 1; }

        .no-process {
            text-align: center; padding: 40px 0; color: #999; font-size: 14px;
        }
        .no-process p { margin-top: 4px; font-size: 13px; }

        .state-loading {
            text-align: center; padding: 80px 0; color: #999;
        }

        /* Confirm button in detail */
        .btn-confirm-inline {
            display: inline-block; padding: 10px 28px;
            background: #16a34a; color: #fff;
            border: none; border-radius: 8px;
            font-size: 14px; font-weight: 500; cursor: pointer;
            transition: all 0.2s; margin-top: 12px;
        }
        .btn-confirm-inline:hover { background: #15803d; }
        .btn-confirm-inline:disabled { opacity: 0.6; cursor: default; }
        .btn-confirm-inline.confirmed { background: #999; cursor: default; }

        .confused-link {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 12px; color: #888;
            cursor: pointer; transition: all 0.2s;
            padding: 8px 14px; border-radius: 20px;
            border: 1px solid #eee; background: #fafafa;
            white-space: nowrap;
        }
        .confused-link:hover { color: #6366f1; border-color: #6366f1; background: #eef2ff; }
        .confused-link .dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: #6366f1; flex-shrink: 0; transition: all 0.3s;
        }
        .confused-link.has-unread { color: #e03131; border-color: #fecaca; background: #fff5f5; }
        .confused-link.has-unread .dot {
            background: #e03131; animation: pulse-dot 1.2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.8); opacity: 0.4; }
        }

        .detail-header-top {
            display: flex; align-items: flex-start; justify-content: space-between;
            gap: 20px;
        }
        .detail-header-top .left { flex: 1; min-width: 0; }

        /* Chat overlay */
        .chat-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 200; align-items: center; justify-content: center;
        }
        .chat-overlay.show { display: flex; }

        .chat-dialog {
            background: #fff; border-radius: 16px;
            width: 420px; max-height: 560px;
            display: flex; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .chat-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; border-bottom: 1px solid #eee;
            flex-shrink: 0;
        }
        .chat-header h3 { font-size: 16px; font-weight: 600; color: #1a1a1a; }
        .chat-close {
            width: 30px; height: 30px; border-radius: 8px;
            border: none; background: #f5f5f5;
            font-size: 18px; color: #666; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .chat-close:hover { background: #eee; color: #1a1a1a; }

        .chat-messages {
            flex: 1; overflow-y: auto; padding: 16px 20px;
            display: flex; flex-direction: column; gap: 12px;
            min-height: 200px; max-height: 340px;
        }
        .chat-messages .empty { text-align: center; color: #ccc; font-size: 13px; padding: 40px 0; }

        .chat-bubble {
            max-width: 75%; padding: 10px 14px;
            border-radius: 18px; font-size: 14px; line-height: 1.5;
            word-break: break-word; position: relative;
        }
        .chat-bubble.left {
            align-self: flex-start;
            background: #f0f0f0; color: #1a1a1a;
            border-top-left-radius: 4px;
        }
        .chat-bubble.right {
            align-self: flex-end;
            background: #95ec69; color: #1a1a1a;
            border-top-right-radius: 4px;
        }
        .chat-bubble .time {
            display: block; font-size: 11px; color: #999;
            margin-top: 4px; text-align: right;
        }

        .chat-input-area {
            display: flex; gap: 8px; padding: 12px 16px;
            border-top: 1px solid #eee; flex-shrink: 0;
        }
        .chat-input-area textarea {
            flex: 1; height: 38px; max-height: 80px;
            padding: 9px 12px; border: 1px solid #e8e8e8;
            border-radius: 10px; font-size: 14px; color: #1a1a1a;
            background: #fafafa; outline: none; resize: none;
            font-family: inherit;
            transition: border-color 0.15s;
        }
        .chat-input-area textarea:focus { border-color: #6366f1; background: #fff; }
        .chat-send {
            width: 56px; flex-shrink: 0;
            background: #6366f1; color: #fff;
            border: none; border-radius: 10px;
            font-size: 13px; font-weight: 500; cursor: pointer;
            transition: all 0.15s;
        }
        .chat-send:hover { background: #4f46e5; }
        .chat-send:disabled { opacity: 0.5; cursor: default; }

        .shipment-card {
            background: #fafafa; border-radius: 10px;
            padding: 16px; margin-bottom: 10px;
            border: 1px solid #eee;
        }
        .shipment-card .carrier-tag {
            font-size: 12px; padding: 2px 8px; border-radius: 4px;
            font-weight: 500;
        }
        .carrier-dhl { background: #fef3c7; color: #b45309; }
        .carrier-fedex { background: #eff6ff; color: #2563eb; }
        .shipment-card .tracking-num {
            font-size: 16px; font-weight: 700; color: #1a1a1a; letter-spacing: 0.5px; margin-bottom: 4px;
        }
        .shipment-card .ship-meta { font-size: 12px; color: #999; margin-bottom: 8px; }
        .btn-refresh-tracking {
            height: 32px; padding: 0 14px;
            border-radius: 6px; border: 1px solid #ddd;
            background: #fff; color: #666;
            font-size: 12px; cursor: pointer;
        }
        .btn-refresh-tracking:hover { border-color: #6366f1; color: #6366f1; }

        .account-input {
            width: 200px; padding: 6px 10px;
            border: 1px solid #ddd; border-radius: 6px;
            font-size: 13px; color: #1a1a1a; outline: none;
            transition: border-color 0.15s;
        }
        .account-input:focus { border-color: #6366f1; }
        .btn-save-account {
            padding: 10px 28px; background: #1a1a1a; color: #fff;
            border: none; border-radius: 10px; font-size: 14px; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-save-account:hover { background: #333; }
        .btn-save-account:disabled { opacity: 0.6; cursor: default; }

        .payment-tag {
            display: inline-block; font-size: 10px; font-weight: 500;
            padding: 2px 6px; border-radius: 3px; vertical-align: middle;
        }
        .payment-tag.monthly { background: #eff6ff; color: #2563eb; }
        .payment-tag.credit { background: #f3e8ff; color: #7c3aed; }
        .payment-tag.pay_before_ship { background: #fff7ed; color: #c2410c; }
        .payment-tag.prepaid { background: #f0fdf4; color: #16a34a; }
        .payment-tag.full { background: #fef2f2; color: #dc2626; }
        .payment-status-tag {
            font-size: 10px; font-weight: 500; padding: 2px 6px; border-radius: 3px;
            vertical-align: middle; margin-left: 4px;
        }
        .payment-status-tag.paid { background: #f0fdf4; color: #16a34a; }
        .payment-status-tag.unpaid { background: #fef2f2; color: #dc2626; }

        .timeline { position: relative; padding-left: 20px; }
        .timeline::before {
            content: ''; position: absolute; left: 7px; top: 4px; bottom: 4px;
            width: 2px; background: #e5e5e5;
        }
        .tl-item {
            position: relative; padding: 4px 0 10px 16px; font-size: 13px; color: #888;
        }
        .tl-item:last-child { color: #22c55e; font-weight: 500; }
        .tl-item::before {
            content: ''; position: absolute; left: -17px; top: 8px;
            width: 8px; height: 8px; border-radius: 50%; background: #ddd;
        }
        .tl-item:last-child::before { background: #22c55e; }
        .tl-item .tl-time { font-size: 11px; color: #bbb; display: block; }

        @media (max-width: 640px) {
            .layout { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #eee; padding: 0; }
            .sidebar-nav { display: flex; }
            .sidebar-nav li { border-right: none; border-bottom: 2px solid transparent; padding: 10px 16px; font-size: 13px; }
            .sidebar-nav li.active { border-right: none; border-bottom-color: #6366f1; }
            .main { padding: 24px 16px; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <header class="header">
        <a href="../client/user.html" class="btn-back">← 返回</a>
        <span class="header-title">订单详情</span>
        <div class="header-user-area" id="headerUserArea2">
            <span class="header-pm-tag" id="headerPmTag2" style="display:none"></span>
            <div class="header-user-text">
                <span class="header-user-name" id="headerUserName2"></span>
                <span class="header-user-email" id="headerUserEmail2"></span>
            </div>
        </div>
        <div style="position:relative">
            <button class="header-bell" id="headerBell2" onclick="toggleNotif()" title="通知">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                <span class="header-bell-badge" id="bellBadge2">0</span>
            </button>
            <div class="notif-dropdown" id="notifDropdown2">
                <div class="notif-header">
                    <span>消息通知</span>
                    <button class="notif-mark-all" onclick="event.stopPropagation();markAllNotifRead()">全部已读</button>
                </div>
                <div class="notif-list" id="notifList2"></div>
            </div>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <ul class="sidebar-nav">
                <li class="active" data-tab="detail">订单详情</li>
                <li data-tab="process">作业流程</li>
                <li data-tab="tracking">快递进度</li>
            </ul>
        </aside>

        <main class="main">
            <div class="tab-content active" id="tab-detail">
                <div class="state-loading">加载中...</div>
            </div>
            <div class="tab-content" id="tab-process">
                <div class="state-loading">加载中...</div>
            </div>
            <div class="tab-content" id="tab-tracking">
                <div class="state-loading">加载中...</div>
            </div>
        </main>
    </div>

    <!-- Chat overlay -->
    <div class="chat-overlay" id="chatOverlay">
        <div class="chat-dialog">
            <div class="chat-header">
                <h3>Messages</h3>
                <button class="chat-close" onclick="closeChat()">×</button>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="empty">Send a message and we'll get back to you</div>
            </div>
            <div class="chat-input-area">
                <textarea id="chatInput" rows="1" placeholder="Type your message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMessage()}"></textarea>
                <button class="chat-send" id="btnChatSend" onclick="sendChatMessage()">Send</button>
            </div>
        </div>
    </div>

    <!-- Account overlay -->
    <div class="chat-overlay" id="accountOverlay2">
        <div class="chat-dialog" style="width:440px" id="accountDialog2"></div>
    </div>

    <script type="module">
        import { auth, getCurrentUser, db } from "../shared/firebase-init.js";
        import { doc, getDoc, updateDoc, setDoc, addDoc, serverTimestamp, onSnapshot, collection, query, orderBy, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const user = await getCurrentUser();
        if (!user) { window.location.href = '../auth/login.html'; }

        // ---- Render process tab ----
        function calcProgress(proc, status) {
            if (status === 'completed') return 100;
            if (!proc || !proc.steps || proc.steps.length === 0) return 0;
            const total = proc.steps.length;
            const done = proc.steps.filter(s => s.done).length;
            return total > 0 ? Math.round(done / total * 100) : 0;
        }

        function renderProcess() {
            const o = order;
            const proc = o.process;

            if (!proc || !proc.steps || proc.steps.length === 0) {
                document.getElementById('tab-process').innerHTML =
                    '<div class="no-process"><h3 style="color:#666;font-size:16px">暂无工序信息</h3><p>工厂排工序后将在此显示进度</p></div>';
                return;
            }

            const pct = calcProgress(proc, order.status);
            let html = '';

            html += '<div class="section"><h4>整体进度</h4>';
            html += '<div class="progress-wrap">';
            html += '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
            html += '<span class="progress-pct">' + pct + '%</span>';
            html += '</div></div>';

            // Main steps
            if (proc.steps && proc.steps.length > 0) {
                html += '<div class="section"><h4>作业流程</h4><ul class="step-list">';
                proc.steps.forEach(s => {
                    html += '<li class="' + (s.done ? 'done' : '') + '">';
                    html += '<span class="step-check">✓</span>';
                    html += '<span class="step-name">' + esc(s.name) + '</span>';
                    html += '</li>';
                });
                html += '</ul></div>';
            }

            document.getElementById('tab-process').innerHTML = html;
        }

        // Background poll for order status changes (from factory/completed etc.)
        let _lastStatus = order.status || 'pending';
        function startStatusPoll() {
            setInterval(async () => {
                try {
                    if (!order || !order.id) return;
                    // Check customer's own copy first, fall back to sales copy
                    let newStatus = null;
                    const snap = await getDoc(doc(db, 'users', user.uid, 'quotes', order.id));
                    if (snap.exists()) {
                        newStatus = snap.data().status || 'pending';
                    } else if (order.publishedByUid) {
                        const salesSnap = await getDoc(doc(db, 'users', order.publishedByUid, 'quotes', order.id));
                        if (salesSnap.exists()) newStatus = salesSnap.data().status || 'pending';
                    }
                    if (!newStatus || newStatus === _lastStatus) return;
                    _lastStatus = newStatus;
                    order.status = newStatus;

                    // Update status badge
                    const badge = document.querySelector('.status-badge');
                    const statusLabels = { pending:'待确认', confirmed:'已确认', in_production:'生产中', completed:'已完成', shipped:'已发货', signed:'已签收' };
                    if (badge) {
                        badge.textContent = statusLabels[newStatus] || '待确认';
                        badge.className = 'status-badge status-' + newStatus;
                    }

                    // Update confirm button
                    const btn = document.getElementById('btnConfirmInline');
                    const btnArea = btn ? btn.parentElement : null;
                    if (newStatus !== 'pending' && btn) {
                        btn.remove();
                    }
                    if (newStatus === 'confirmed' && btnArea && !document.getElementById('btnConfirmInline')) {
                        const newBtn = document.createElement('button');
                        newBtn.className = 'btn-confirm-inline confirmed';
                        newBtn.id = 'btnConfirmInline';
                        newBtn.disabled = true;
                        newBtn.textContent = '已确认 ✓';
                        btnArea.appendChild(newBtn);
                    }
                } catch (e) { /* ignore */ }
            }, 5000);

            if (!order || order.status !== 'pending') return;
            const btn = document.getElementById('btnConfirmInline');
            if (btn) { btn.disabled = true; btn.textContent = '确认中...'; }

            // Credit check: if credit customer, verify enough remaining credit
            if (customerPayment && customerPayment.paymentMethod === 'credit' && customerPayment.uid) {
                const limit = customerPayment.creditLimit || 0;
                const used = customerPayment.creditUsed || 0;
                const orderTotal = order.totalPrice || 0;
                if (limit > 0 && used + orderTotal > limit) {
                    const remain = Math.max(0, limit - used);
                    alert('信用额度不足！\n总额度：$' + fmt(limit) + '\n已用：$' + fmt(used) + '\n剩余：$' + fmt(remain) + '\n本单金额：$' + fmt(orderTotal) + '\n\n请联系销售充值后再确认。');
                    if (btn) { btn.disabled = false; btn.textContent = '确认报价'; }
                    return;
                }
            }

            // Monthly check: block if unpaid statement exists
            if (customerPayment && customerPayment.paymentMethod === 'monthly' && customerPayment.uid) {
                try {
                    const stmtSnap = await getDocs(query(
                        collection(db, 'billingStatements'),
                        where('clientUid', '==', customerPayment.uid),
                        where('status', '==', 'pending')
                    ));
                    if (!stmtSnap.empty) {
                        alert('存在未付账单，请先结清上月账单后再确认新订单。\n请联系销售了解详情。');
                        if (btn) { btn.disabled = false; btn.textContent = '确认报价'; }
                        return;
                    }
                } catch (e) { console.warn('账单检查失败:', e); }
            }

            // Prepaid: calculate deposit and notify
            let prepaidDepositAmt = 0, prepaidRemainderAmt = 0, isPrepaid = false;
            if (customerPayment && customerPayment.paymentMethod === 'prepaid' && customerPayment.uid) {
                isPrepaid = true;
                const dpPct = customerPayment.depositPercent || 0;
                const total = order.totalPrice || 0;
                prepaidDepositAmt = Math.round(total * dpPct / 100 * 100) / 100;
                prepaidRemainderAmt = Math.round((total - prepaidDepositAmt) * 100) / 100;
                if (dpPct <= 0) {
                    alert('预付款比例未设置，请联系销售设置后再确认。');
                    if (btn) { btn.disabled = false; btn.textContent = '确认报价'; }
                    return;
                }
                if (!confirm('您需要先支付预付款定金 $' + fmt(prepaidDepositAmt) + '（' + dpPct + '%）才能开始生产。\n\n确认后将通知您支付定金。')) {
                    if (btn) { btn.disabled = false; btn.textContent = '确认报价'; }
                    return;
                }
            }

            // Full payment: require 100% payment before production
            let isFull = false;
            if (customerPayment && customerPayment.paymentMethod === 'full' && customerPayment.uid) {
                isFull = true;
                const total = order.totalPrice || 0;
                prepaidDepositAmt = total;
                prepaidRemainderAmt = 0;
                if (!confirm('此订单为全款订单，您需要支付全款 $' + fmt(total) + ' 才能开始生产。\n\n确认后将通知您支付全款。')) {
                    if (btn) { btn.disabled = false; btn.textContent = '确认报价'; }
                    return;
                }
            }

            try {
                // Deduct credit if credit customer
                if (customerPayment && customerPayment.paymentMethod === 'credit' && customerPayment.uid) {
                    const previousUsed = customerPayment.creditUsed || 0;
                    const newUsed = previousUsed + (order.totalPrice || 0);
                    await updateDoc(doc(db, 'clientProfiles', customerPayment.uid), { creditUsed: newUsed });
                    customerPayment.creditUsed = newUsed;
                    await addDoc(collection(db, 'creditTransactions'), {
                        clientUid: customerPayment.uid,
                        type: 'deduction',
                        amount: order.totalPrice || 0,
                        previousUsed: previousUsed,
                        newUsed: newUsed,
                        note: '订单确认：' + (order.quoteNumber || orderId),
                        createdAt: serverTimestamp()
                    }).catch(() => {});
                }

                const proc = { steps: ['作图','厂内工作','包装','发货'].map(name => ({ name, done: false })), confirmed: true };
                const updateData = { status: 'confirmed', process: proc };

                // Prepaid / Full: store payment amounts
                if (isPrepaid || isFull) {
                    updateData.depositAmount = prepaidDepositAmt;
                    updateData.remainderAmount = prepaidRemainderAmt;
                    updateData.depositPercent = isFull ? 100 : (customerPayment.depositPercent || 0);
                    updateData.depositPaid = false;
                    updateData.remainderPaid = false;
                }

                await updateDoc(doc(db, 'users', user.uid, 'quotes', orderId), updateData);
                order.status = 'confirmed';
                order.process = proc;
                if (isPrepaid || isFull) {
                    order.depositAmount = prepaidDepositAmt;
                    order.remainderAmount = prepaidRemainderAmt;
                    order.depositPercent = isFull ? 100 : (customerPayment.depositPercent || 0);
                    order.depositPaid = false;
                    order.remainderPaid = false;
                }

                if (order.publishedByUid) {
                    try {
                        const syncData = { process: proc, processPublished: true };
                        if (isPrepaid || isFull) {
                            syncData.status = 'confirmed';
                            syncData.depositAmount = prepaidDepositAmt;
                            syncData.remainderAmount = prepaidRemainderAmt;
                            syncData.depositPercent = isFull ? 100 : (customerPayment.depositPercent || 0);
                            syncData.depositPaid = false;
                            syncData.remainderPaid = false;
                        } else {
                            syncData.status = 'in_production';
                        }
                        await updateDoc(doc(db, 'users', order.publishedByUid, 'quotes', orderId), syncData);
                    } catch (e) { console.error('同步确认到销售端失败:', e); }
                }

                // Create notification
                if (isPrepaid) {
                    await addDoc(collection(db, 'notifications'), {
                        clientUid: customerPayment.uid,
                        type: 'bill',
                        title: '预付款待支付',
                        body: '您有一笔预付款定金需要支付：$' + prepaidDepositAmt.toFixed(2) + '（' + (customerPayment.depositPercent || 0) + '%），支付后生产才会开始。点击查看订单详情。',
                        read: false,
                        createdAt: serverTimestamp(),
                        link: '../client/prepaid-bills.html'
                    }).catch(() => {});
                }
                if (isFull) {
                    await addDoc(collection(db, 'notifications'), {
                        clientUid: customerPayment.uid,
                        type: 'bill',
                        title: '全款待支付',
                        body: '您的订单需支付全款 $' + prepaidDepositAmt.toFixed(2) + '，支付后生产才会开始。点击查看订单详情。',
                        read: false,
                        createdAt: serverTimestamp(),
                        link: '../client/full-bills.html'
                    }).catch(() => {});
                }

                if (btn) { btn.textContent = '已确认 ✓'; btn.className = 'btn-confirm-inline confirmed'; btn.disabled = false; }
                const badge = document.querySelector('.status-badge');
                if (badge) { badge.textContent = '已确认'; badge.className = 'status-badge status-confirmed'; }
            } catch (err) {
                console.error('确认失败:', err);
                if (btn) { btn.disabled = false; btn.textContent = '确认报价'; }
                alert('确认失败: ' + (err.message || '未知错误'));
            }
        };

        // ---- Chat ----
        function formatChatTime(ts) {
            if (!ts || !ts.seconds) return '';
            const d = new Date(ts.seconds * 1000);
            const now = new Date();
            const isToday = d.toDateString() === now.toDateString();
            if (isToday) return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            return d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        function renderChatMessages(messages) {
            const container = document.getElementById('chatMessages');
            if (!messages || messages.length === 0) {
                container.innerHTML = '<div class="empty">Send a message and we\'ll get back to you</div>';
                return;
            }
            container.innerHTML = messages.map(m => {
                const isMe = m.from === user.email;
                const cls = isMe ? 'right' : 'left';
                const timeStr = formatChatTime(m.timestamp);
                return '<div class="chat-bubble ' + cls + '">' +
                    esc(m.text || '') +
                    (timeStr ? '<span class="time">' + timeStr + '</span>' : '') +
                    '</div>';
            }).join('');
            container.scrollTop = container.scrollHeight;
        }

        window.openChat = function() {
            document.getElementById('chatOverlay').classList.add('show');
            document.getElementById('chatMessages').innerHTML = '<div class="empty">Loading...</div>';

            // Mark unread for customer as false
            setDoc(doc(db, 'users', user.uid, 'conversations', 'main'), { unreadForCustomer: false }, { merge: true }).catch(() => {});

            // Poll messages every 2 seconds
            const pollMessages = async () => {
                if (!document.getElementById('chatOverlay').classList.contains('show')) return;
                try {
                    const q = query(collection(db, 'users', user.uid, 'conversations', 'main', 'messages'), orderBy('timestamp', 'asc'));
                    const snap = await getDocs(q);
                    const msgs = [];
                    snap.forEach(d => msgs.push({ id: d.id, ...d.data() }));
                    renderChatMessages(msgs);
                } catch (err) {
                    console.error('Chat poll error:', err);
                }
            };
            pollMessages();
            if (_chatPollInterval) clearInterval(_chatPollInterval);
            _chatPollInterval = setInterval(pollMessages, 1000);
        };

        window.closeChat = function() {
            document.getElementById('chatOverlay').classList.remove('show');
            if (_chatPollInterval) { clearInterval(_chatPollInterval); _chatPollInterval = null; }
        };

        // Background poll for unread messages from sales (shows indicator on button)
        function startBackgroundChatPoll() {
            if (_bgPollInterval) clearInterval(_bgPollInterval);
            const checkUnread = async () => {
                try {
                    const convSnap = await getDoc(doc(db, 'users', user.uid, 'conversations', 'main'));
                    const link = document.getElementById('confusedLink');
                    if (!link) return;
                    if (convSnap.exists() && convSnap.data().unreadForCustomer) {
                        link.classList.add('has-unread');
                        link.title = 'You have a new reply!';
                    } else {
                        link.classList.remove('has-unread');
                        link.title = '';
                    }
                } catch (e) { /* ignore */ }
            };
            checkUnread();
            _bgPollInterval = setInterval(checkUnread, 3000);
        }

        window.sendChatMessage = async function() {
            const input = document.getElementById('chatInput');
            const btn = document.getElementById('btnChatSend');
            const text = input.value.trim();
            if (!text) return;

            btn.disabled = true;
            input.disabled = true;

            try {
                // Determine sales email: from order, or look up from clientProfiles
                let salesEmail = order.publishedBy || '';
                if (!salesEmail && order.customerName) {
                    try {
                        const q = query(collection(db, 'clientProfiles'), where('name', '==', order.customerName));
                        const snap = await getDocs(q);
                        snap.forEach(d => {
                            if (!salesEmail && d.data().assignedTo) salesEmail = d.data().assignedTo;
                        });
                    } catch (e) { console.error('查找销售失败:', e); }
                }

                // Find sales UID from clientProfiles
                let salesUid = order.publishedByUid || '';
                if (!salesUid) {
                    try {
                        const q = query(collection(db, 'clientProfiles'), where('name', '==', order.customerName));
                        const snap = await getDocs(q);
                        snap.forEach(d => { if (!salesUid) salesUid = d.id; });
                    } catch (e) {}
                }
                // Use sales email prefix to find sales UID
                if (!salesUid && salesEmail) {
                    try {
                        const usersSnap = await getDocs(collection(db, 'clientProfiles'));
                        usersSnap.forEach(d => {
                            if (d.data().name === salesEmail.split('@')[0]) salesUid = d.id;
                        });
                    } catch (e) {}
                }

                // Store conversation under user's own doc space (guaranteed writable)
                const convData = {
                    salesEmail: salesEmail,
                    salesUid: salesUid || salesEmail.replace(/[@.]/g, '_'),
                    customerEmail: user.email,
                    customerName: order.customerName || '',
                    lastMessage: text,
                    lastTimestamp: serverTimestamp(),
                    unreadForSales: true
                };

                // Write to customer's own space
                await setDoc(doc(db, 'users', user.uid, 'conversations', 'main'), convData, { merge: true });
                await addDoc(collection(db, 'users', user.uid, 'conversations', 'main', 'messages'), {
                    from: user.email,
                    text,
                    timestamp: serverTimestamp()
                });

                input.value = '';
                input.style.height = '38px';
                console.log('消息发送成功, salesEmail=' + salesEmail);
            } catch (err) {
                console.error('发送消息失败:', err);
                alert('发送失败，请重试: ' + (err.message || '未知错误'));
            } finally {
                btn.disabled = false;
                input.disabled = false;
                input.focus();
            }
        };

        // ---- Render tracking tab ----
        function renderTrackingTab() {
            const o = order;
            const shipments = o.shipments || [];
            let html = '';

            html += '<div class="detail-header-block">';
            html += '<div class="quote-num">快递进度<br><span>' + esc(o.quoteNumber) + '</span></div>';
            html += '<div class="meta">客户：' + esc(o.customerName || '-') + '</div>';
            html += '</div>';

            if (shipments.length === 0) {
                html += '<div class="section" style="text-align:center;padding:60px 20px;color:#bbb">';
                html += '<p style="font-size:14px">暂无快递信息</p>';
                html += '</div>';
            } else {
                shipments.forEach(ship => {
                    if (!ship.publishedToClient) return;
                    const statusText = ship.trackingData ? (ship.trackingData.statusText || '运输中') : '等待查询';
                    html += '<div class="section">';
                    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
                    html += '<span class="carrier-tag carrier-' + (ship.carrier || 'dhl').toLowerCase() + '">' + esc(ship.carrier || 'DHL') + '</span>';
                    html += '<span style="font-size:12px;color:#888">状态：' + statusText + '</span>';
                    html += '</div>';
                    html += '<div class="tracking-num">' + esc(ship.trackingNumber) + '</div>';
                    if (ship.shipmentType === 'merged' && ship.mergedOrderNumbers && ship.mergedOrderNumbers.length > 1) {
                        html += '<div style="font-size:12px;color:#6366f1;margin:4px 0">合并发货：' + esc(ship.mergedOrderNumbers.join('、')) + '</div>';
                    }
                    html += '<div class="ship-meta">发货时间：' + esc(ship.shipDate || '-') + ' · 预计送达：' + (ship.trackingData ? esc(ship.trackingData.estimatedDelivery || '-') : '-') + '</div>';

                    if (ship.trackingData && ship.trackingData.events && ship.trackingData.events.length > 0) {
                        html += '<div class="timeline">';
                        ship.trackingData.events.forEach(ev => {
                            html += '<div class="tl-item">';
                            html += '<span class="tl-time">' + esc(ev.time || '') + '</span>';
                            html += esc(ev.location || '') + ' ' + esc(ev.description || ev.status || '');
                            html += '</div>';
                        });
                        html += '</div>';
                    } else {
                        html += '<p style="text-align:center;color:#bbb;font-size:13px;padding:12px">暂无物流详情</p>';
                    }
                    html += '</div>';
                });
            }

            document.getElementById('tab-tracking').innerHTML = html;
        }

        // ---- Load tracking on tab switch ----
        document.querySelectorAll('.sidebar-nav li').forEach(li => {
            li.addEventListener('click', function() {
                if (this.dataset.tab === 'tracking') renderTrackingTab();
            });
        });

        // Close chat on overlay click
        document.getElementById('chatOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeChat();
        });

        // Auto-resize textarea
        document.getElementById('chatInput').addEventListener('input', function() {
            this.style.height = '38px';
            this.style.height = Math.min(this.scrollHeight, 80) + 'px';
        });
    </script>
</body>
</html>
