<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运费计算器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        .bg-gradient {
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(99,102,241,0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(139,92,246,0.04) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        .header {
            position: relative; z-index: 1;
            background: #fff; border-bottom: 1px solid #eee;
            padding: 0 32px; height: 56px;
            display: flex; align-items: center; gap: 12px;
        }

        .btn-back {
            text-decoration: none; color: #666; font-size: 14px;
            transition: color 0.15s;
        }
        .btn-back:hover { color: #1a1a1a; }

        .header-title { font-size: 16px; font-weight: 600; color: #1a1a1a; }

        .main {
            position: relative; z-index: 1;
            max-width: 560px; margin: 0 auto; padding: 32px 20px;
        }

        .card {
            background: #fff; border: 1px solid #eee; border-radius: 12px;
            padding: 28px;
        }

        .card-title {
            font-size: 18px; font-weight: 600; color: #1a1a1a;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block; font-size: 13px; font-weight: 500;
            color: #666; margin-bottom: 6px;
        }

        .form-group input, .form-group select {
            width: 100%; height: 42px;
            padding: 0 14px; border: 1px solid #e8e8e8;
            border-radius: 10px; font-size: 14px;
            outline: none; transition: border-color 0.2s;
            background: #fff;
        }
        .form-group input:focus { border-color: #6366f1; }

        .form-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
        }

        /* Country selector */
        .country-selector { position: relative; }
        .country-dropdown {
            display: none; position: absolute; top: 100%; left: 0; right: 0;
            max-height: 200px; overflow-y: auto;
            background: #fff; border: 1px solid #e8e8e8; border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1); z-index: 100;
            margin-top: 4px;
        }
        .country-dropdown.show { display: block; }
        .country-option {
            padding: 10px 14px; font-size: 14px; color: #1a1a1a; cursor: pointer;
            transition: background 0.1s;
        }
        .country-option:hover { background: #f5f5f5; }
        .country-option.selected { background: #eef2ff; color: #6366f1; }

        /* Freight results */
        .freight-card {
            background: #fff; border: 1px solid #eee; border-radius: 12px;
            padding: 20px; margin-bottom: 12px;
        }
        .freight-card.best-price { border-color: #22c55e; background: #f0fdf4; }
        .freight-card .carrier-name {
            font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px;
        }
        .freight-card .freight-price {
            font-size: 28px; font-weight: 700; color: #6366f1; margin: 8px 0;
        }
        .freight-card.best-price .freight-price { color: #22c55e; }
        .freight-card .freight-details {
            margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee;
        }
        .freight-detail-row {
            display: flex; justify-content: space-between;
            padding: 4px 0; font-size: 13px;
        }
        .freight-detail-label { color: #999; }
        .freight-detail-value { color: #1a1a1a; font-weight: 500; }

        .loading { text-align: center; padding: 20px; color: #999; }
        .hint { font-size: 13px; color: #bbb; text-align: center; margin-top: 20px; }

        @media (max-width: 600px) {
            .header { padding: 0 16px; }
            .main { padding: 20px 16px; }
            .card { padding: 24px 20px; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <header class="header">
        <a href="myorders.html" class="btn-back">← 返回</a>
        <span class="header-title">运费计算器</span>
    </header>

    <main class="main">
        <div class="card">
            <div class="card-title">DHL 国际快递运费计算</div>

            <div class="form-group">
                <label>目的地国家</label>
                <div class="country-selector">
                    <input type="text" id="country-search" placeholder="搜索或选择国家..." autocomplete="off">
                    <input type="hidden" id="destination">
                    <div id="country-dropdown" class="country-dropdown"></div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>长度 (cm)</label>
                    <input type="number" id="length" step="0.1" min="0" placeholder="包装长度">
                </div>
                <div class="form-group">
                    <label>宽度 (cm)</label>
                    <input type="number" id="width" step="0.1" min="0" placeholder="包装宽度">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>高度 (cm)</label>
                    <input type="number" id="height" step="0.1" min="0" placeholder="包装高度">
                </div>
                <div class="form-group">
                    <label>实重 (kg) — 可选</label>
                    <input type="number" id="weight" step="0.1" min="0" placeholder="不填则取体积重">
                </div>
            </div>

            <div id="freight-results" style="display:none; margin-top:20px;">
                <div id="results-content"></div>
            </div>

            <div id="initial-hint" class="hint">输入目的地和尺寸后自动计算</div>
        </div>
    </main>

    <script>
        const API_BASE = 'http://localhost:8002';
        let debounceTimer;
        let allCountries = [];
        let selectedCountry = '';

        async function loadCountries() {
            try {
                const response = await fetch(`${API_BASE}/api/countries`);
                allCountries = await response.json();
            } catch (error) {
                console.error('加载国家列表失败:', error);
            }
        }

        const searchInput = document.getElementById('country-search');
        const dropdown = document.getElementById('country-dropdown');
        const destinationInput = document.getElementById('destination');

        searchInput.addEventListener('focus', function() {
            showDropdown(allCountries);
        });

        searchInput.addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            if (searchTerm === '') {
                showDropdown(allCountries);
            } else {
                const filtered = allCountries.filter(c =>
                    c.toLowerCase().includes(searchTerm)
                );
                showDropdown(filtered);
            }
        });

        function showDropdown(countries) {
            dropdown.innerHTML = '';
            countries.forEach(country => {
                const option = document.createElement('div');
                option.className = 'country-option';
                option.textContent = country;
                option.onclick = function() { selectCountry(country); };
                dropdown.appendChild(option);
            });
            dropdown.classList.add('show');
        }

        function selectCountry(country) {
            selectedCountry = country;
            searchInput.value = country;
            destinationInput.value = country;
            dropdown.classList.remove('show');
            document.getElementById('initial-hint').style.display = 'none';
            calculate();
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.country-selector')) {
                dropdown.classList.remove('show');
            }
        });

        async function calculate() {
            const destination = document.getElementById('destination').value;
            const length = parseFloat(document.getElementById('length').value);
            const width = parseFloat(document.getElementById('width').value);
            const height = parseFloat(document.getElementById('height').value);
            const weight = document.getElementById('weight').value ? parseFloat(document.getElementById('weight').value) : null;

            if (!destination || !length || !width || !height) return;

            try {
                const response = await fetch(`${API_BASE}/api/calculate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ destination, length, width, height, weight })
                });

                const results = await response.json();
                displayResults(results);
            } catch (error) {
                console.error('计算失败:', error);
                document.getElementById('results-content').innerHTML =
                    '<div class="loading">计算失败，请检查API服务是否启动</div>';
            }
        }

        function displayResults(results) {
            const data = results['DHL'];

            if (data.error) {
                document.getElementById('freight-results').style.display = 'block';
                document.getElementById('results-content').innerHTML = `
                    <div class="freight-card" style="border-color:#dc2626;background:#fef2f2;">
                        <div class="carrier-name">DHL</div>
                        <div style="color:#dc2626;font-weight:600;">${data.error}</div>
                    </div>`;
                return;
            }

            document.getElementById('freight-results').style.display = 'block';
            document.getElementById('results-content').innerHTML = `
                <div class="freight-card best-price">
                    <div class="carrier-name">DHL</div>
                    <div class="freight-price">¥${data.total_price.toFixed(2)}</div>
                    <div class="freight-details">
                        <div class="freight-detail-row">
                            <span class="freight-detail-label">体积重</span>
                            <span class="freight-detail-value">${data.volumetric_weight} kg</span>
                        </div>
                        <div class="freight-detail-row">
                            <span class="freight-detail-label">计费重量</span>
                            <span class="freight-detail-value">${data.chargeable_weight} kg</span>
                        </div>
                        <div class="freight-detail-row">
                            <span class="freight-detail-label">单价</span>
                            <span class="freight-detail-value">¥${data.unit_price.toFixed(2)}</span>
                        </div>
                        <div class="freight-detail-row">
                            <span class="freight-detail-label">旺季附加费</span>
                            <span class="freight-detail-value">¥${data.peak_surcharge.toFixed(2)}</span>
                        </div>
                        <div class="freight-detail-row">
                            <span class="freight-detail-label">超长附加费</span>
                            <span class="freight-detail-value">¥${data.oversize_fee.toFixed(2)}</span>
                        </div>
                        <div class="freight-detail-row">
                            <span class="freight-detail-label">燃油系数</span>
                            <span class="freight-detail-value">${data.fuel_rate}</span>
                        </div>
                        <div class="freight-detail-row">
                            <span class="freight-detail-label">利润系数</span>
                            <span class="freight-detail-value">${data.profit_rate}</span>
                        </div>
                    </div>
                </div>`;
        }

        function handleInput() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(calculate, 500);
        }

        document.getElementById('length').addEventListener('input', handleInput);
        document.getElementById('width').addEventListener('input', handleInput);
        document.getElementById('height').addEventListener('input', handleInput);
        document.getElementById('weight').addEventListener('input', handleInput);

        loadCountries();
    </script>
</body>
</html>
