<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单处理 - 报价系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5; min-height: 100vh;
        }

        .bg-gradient {
            position: fixed; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(34,197,94,0.05) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(99,102,241,0.03) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        .header {
            position: relative; z-index: 1;
            background: #fff; border-bottom: 1px solid #eee;
            padding: 0 32px; height: 56px;
            display: flex; align-items: center; gap: 16px;
        }
        .btn-back {
            font-size: 13px; color: #666;
            background: none; border: none; cursor: pointer;
            padding: 6px 0; text-decoration: none;
        }
        .btn-back:hover { color: #1a1a1a; }
        .header-title { font-size: 16px; font-weight: 600; color: #1a1a1a; }

        .layout {
            position: relative; z-index: 1;
            display: flex; min-height: calc(100vh - 56px);
            max-width: 1000px; margin: 0 auto;
        }

        .sidebar {
            width: 180px; flex-shrink: 0;
            background: #fff; border-right: 1px solid #eee;
            padding: 20px 0;
        }
        .sidebar-nav { list-style: none; }
        .sidebar-nav li {
            padding: 12px 24px; font-size: 14px; color: #666;
            cursor: pointer; transition: all 0.15s;
            border-right: 2px solid transparent;
        }
        .sidebar-nav li:hover { color: #1a1a1a; background: #fafafa; }
        .sidebar-nav li.active {
            color: #22c55e; font-weight: 600;
            background: #f0fdf4; border-right-color: #22c55e;
        }

        .main {
            flex: 1; padding: 32px 40px; overflow-y: auto;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .status-badge {
            display: inline-block; font-size: 11px; font-weight: 500;
            padding: 2px 8px; border-radius: 4px;
        }
        .status-confirmed { background: #fef3c7; color: #b45309; }
        .status-in_production { background: #eff6ff; color: #2563eb; }
        .status-completed { background: #f0fdf4; color: #16a34a; }

        .section-badge {
            font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 500;
        }
        .badge-done { background: #f0fdf4; color: #22c55e; }
        .badge-published { background: #eef2ff; color: #6366f1; }

        .detail-header-block {
            margin-bottom: 28px; padding: 20px;
            background: #fff; border-radius: 12px;
            border: 1px solid #eee;
        }
        .detail-header-block .quote-num {
            font-size: 13px; color: #999; margin-bottom: 4px;
        }
        .detail-header-block .quote-num span {
            font-size: 22px; font-weight: 700; color: #1a1a1a; letter-spacing: 1px;
        }
        .detail-header-block .meta {
            font-size: 13px; color: #888; margin-top: 10px;
            display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
        }

        .section {
            background: #fff; border-radius: 12px;
            border: 1px solid #eee; padding: 20px 24px;
            margin-bottom: 12px;
        }
        .section h4 {
            font-size: 14px; font-weight: 600; color: #1a1a1a;
            margin-bottom: 12px; padding-bottom: 8px;
            border-bottom: 1px solid #f0f0f0;
            display: flex; align-items: center; justify-content: space-between;
        }

        .progress-wrap { display: flex; align-items: center; gap: 10px; }
        .progress-bar { flex: 1; height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 3px; background: #22c55e; transition: width 0.4s; }
        .progress-pct { font-size: 12px; font-weight: 600; color: #22c55e; min-width: 36px; text-align: right; }

        .step-list { margin-bottom: 20px; }
        .step-item {
            display: flex; align-items: center;
            padding: 10px 12px; margin-bottom: 4px;
            background: #fafafa; border-radius: 8px;
            transition: all 0.15s;
        }
        .step-item.done { background: #f0fdf4; }
        .step-item .step-name { flex: 1; font-size: 14px; color: #1a1a1a; }
        .step-item.done .step-name { color: #22c55e; }
        .step-check {
            width: 28px; height: 28px;
            border-radius: 50%; border: 2px solid #ddd;
            background: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: transparent;
            transition: all 0.15s; flex-shrink: 0;
        }
        .step-item.done .step-check {
            background: #22c55e; border-color: #22c55e; color: #fff;
        }

        .btn-mark-complete {
            display: block; width: 100%;
            height: 44px; border-radius: 10px;
            border: 1px solid #dc2626; background: #fff;
            color: #dc2626; font-size: 14px; font-weight: 500;
            cursor: pointer; transition: all 0.15s;
            margin-top: 8px;
        }
        .btn-mark-complete:hover { background: #fef2f2; }
        .btn-mark-complete.confirming {
            background: #dc2626; color: #fff; border-color: #dc2626;
        }

        .shipment-type-row {
            display: flex; align-items: center; gap: 12px;
            margin-top: 8px;
        }
        .shipment-type-row span.label { font-size: 13px; color: #888; }
        .toggle-option {
            font-size: 13px; padding: 4px 14px; border-radius: 20px;
            border: 1px solid #ddd; background: #fff;
            color: #888; cursor: pointer; transition: all 0.15s;
        }
        .toggle-option.active {
            border-color: #6366f1; background: #eef2ff;
            color: #6366f1; font-weight: 500;
        }
        .merged-orders-hint {
            font-size: 12px; color: #999; margin-top: 6px;
        }

        .merge-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.4); z-index: 200;
            align-items: center; justify-content: center;
        }
        .merge-overlay.show { display: flex; }
        .merge-dialog {
            background: #fff; border-radius: 14px;
            width: 500px; max-height: 70vh;
            padding: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
        }
        .merge-dialog h4 { font-size: 16px; margin-bottom: 16px; }
        .merge-search {
            width: 100%; height: 40px; border: 1px solid #ddd;
            border-radius: 8px; padding: 0 14px; font-size: 14px;
            margin-bottom: 16px; outline: none;
        }
        .merge-search:focus { border-color: #6366f1; }
        .merge-list { flex: 1; overflow-y: auto; margin-bottom: 16px; }
        .merge-list-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 12px; border-radius: 8px;
            border: 1px solid #eee; margin-bottom: 6px;
            cursor: pointer; transition: all 0.15s;
        }
        .merge-list-item:hover { background: #fafafa; }
        .merge-list-item.selected { border-color: #6366f1; background: #eef2ff; }
        .merge-list-item .info { flex: 1; }
        .merge-list-item .info .qnum { font-size: 14px; font-weight: 600; color: #1a1a1a; }
        .merge-list-item .info .qmeta { font-size: 12px; color: #999; }
        .merge-list-item .check-circle {
            width: 22px; height: 22px; border-radius: 50%;
            border: 2px solid #ddd; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: transparent;
        }
        .merge-list-item.selected .check-circle {
            border-color: #6366f1; background: #6366f1; color: #fff;
        }
        .btn-merge-confirm {
            width: 100%; height: 42px; border-radius: 10px;
            border: none; background: #6366f1; color: #fff;
            font-size: 14px; font-weight: 500; cursor: pointer;
        }
        .btn-merge-confirm:hover { background: #4f46e5; }

        .shipment-card {
            background: #fafafa; border-radius: 10px;
            padding: 16px; margin-bottom: 10px;
            border: 1px solid #eee;
        }
        .shipment-card .ship-top {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px;
        }
        .shipment-card .carrier-tag {
            font-size: 12px; padding: 2px 8px; border-radius: 4px;
            font-weight: 500;
        }
        .carrier-dhl { background: #fef3c7; color: #b45309; }
        .carrier-fedex { background: #eff6ff; color: #2563eb; }
        .shipment-card .tracking-num {
            font-size: 16px; font-weight: 700; color: #1a1a1a;
            letter-spacing: 0.5px;
        }
        .shipment-card .ship-meta {
            font-size: 12px; color: #999; margin-bottom: 8px;
        }
        .timeline { position: relative; padding-left: 20px; }
        .timeline::before {
            content: ''; position: absolute; left: 7px; top: 4px; bottom: 4px;
            width: 2px; background: #e5e5e5;
        }
        .tl-item {
            position: relative; padding: 4px 0 10px 16px;
            font-size: 13px; color: #888;
        }
        .tl-item:last-child { color: #22c55e; font-weight: 500; }
        .tl-item::before {
            content: ''; position: absolute; left: -17px; top: 8px;
            width: 8px; height: 8px; border-radius: 50%;
            background: #ddd;
        }
        .tl-item:last-child::before { background: #22c55e; }
        .tl-item .tl-time { font-size: 11px; color: #bbb; display: block; }
        .tl-item .tl-loc { color: #666; }

        .btn-add-shipment {
            display: block; width: 100%; height: 44px;
            border-radius: 10px; border: 2px dashed #ddd;
            background: #fafafa; color: #888;
            font-size: 14px; cursor: pointer; margin-top: 12px;
            transition: all 0.15s;
        }
        .btn-add-shipment:hover { border-color: #6366f1; color: #6366f1; background: #eef2ff; }
        .btn-publish-shipment {
            height: 32px; padding: 0 14px;
            border-radius: 6px; border: 1px solid #22c55e;
            background: #fff; color: #22c55e;
            font-size: 12px; cursor: pointer; transition: all 0.15s;
        }
        .btn-publish-shipment:hover { background: #f0fdf4; }
        .btn-publish-shipment.published {
            background: #f0fdf4; color: #16a34a; cursor: default; border-color: #86efac;
        }
        .btn-refresh-tracking {
            height: 32px; padding: 0 14px;
            border-radius: 6px; border: 1px solid #ddd;
            background: #fff; color: #666;
            font-size: 12px; cursor: pointer; transition: all 0.15s;
        }
        .btn-refresh-tracking:hover { border-color: #6366f1; color: #6366f1; }

        .ship-form {
            background: #fff; border: 2px solid #6366f1; border-radius: 10px;
            padding: 20px; margin-bottom: 16px;
        }
        .ship-form .form-row {
            display: flex; gap: 12px; margin-bottom: 10px;
        }
        .ship-form label {
            font-size: 13px; color: #888; display: block; margin-bottom: 4px;
        }
        .ship-form input, .ship-form select {
            height: 38px; border: 1px solid #ddd; border-radius: 6px;
            padding: 0 10px; font-size: 14px; flex: 1; outline: none;
        }
        .ship-form input:focus, .ship-form select:focus { border-color: #6366f1; }
        .btn-submit-shipment {
            height: 38px; padding: 0 20px; border-radius: 8px;
            border: none; background: #6366f1; color: #fff;
            font-size: 14px; font-weight: 500; cursor: pointer;
        }
        .btn-submit-shipment:hover { background: #4f46e5; }
        .btn-cancel-form {
            height: 38px; padding: 0 16px; border-radius: 8px;
            border: 1px solid #ddd; background: #fff;
            color: #666; font-size: 14px; cursor: pointer;
        }

        .empty-tracking {
            text-align: center; padding: 60px 20px; color: #bbb;
        }
        .empty-tracking .icon { font-size: 48px; margin-bottom: 12px; }
        .empty-tracking p { font-size: 14px; }

        .btn-mark-paid {
            height: 30px; padding: 0 14px; border-radius: 6px;
            border: none; background: #16a34a; color: #fff;
            font-size: 12px; font-weight: 500; cursor: pointer;
            white-space: nowrap; margin-left: auto;
        }
        .btn-mark-paid:hover { background: #15803d; }
        .btn-collect-remainder {
            height: 30px; padding: 0 14px; border-radius: 6px;
            border: none; background: #f59e0b; color: #fff;
            font-size: 12px; font-weight: 500; cursor: pointer;
            white-space: nowrap; margin-left: 8px;
        }
        .btn-collect-remainder:hover { background: #d97706; }
        .payment-tag {
            display: inline-block; font-size: 11px; padding: 2px 8px;
            border-radius: 10px; font-weight: 500;
        }
        .payment-tag.monthly { background: #f0fdf4; color: #16a34a; }
        .payment-tag.credit { background: #eef2ff; color: #6366f1; }
        .payment-tag.pay_before_ship { background: #fef3c7; color: #b45309; }
        .payment-tag.prepaid { background: #fce7f3; color: #be185d; }
        .payment-tag.full { background: #fee2e2; color: #dc2626; }
        .payment-status {
            display: inline-block; font-size: 11px; padding: 2px 8px;
            border-radius: 10px; font-weight: 500;
        }
        .payment-status.paid { background: #f0fdf4; color: #16a34a; }
        .payment-status.unpaid { background: #fef2f2; color: #dc2626; }
        .payment-warn {
            font-size: 12px; color: #b45309; background: #fffbeb;
            border: 1px solid #fde68a; border-radius: 8px;
            padding: 10px 14px; margin-bottom: 16px; line-height: 1.6;
        }
        .step-item.locked { opacity: 0.5; pointer-events: none; }
        .step-item.locked .step-check {
            border-color: #ddd; background: #f5f5f5; cursor: not-allowed;
        }

        @media (max-width: 600px) {
            .layout { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #eee; padding: 8px 16px; }
            .sidebar-nav { display: flex; gap: 0; }
            .sidebar-nav li { border-right: none; border-bottom: 2px solid transparent; padding: 10px 16px; }
            .sidebar-nav li.active { border-right: none; border-bottom-color: #22c55e; }
            .main { padding: 24px 16px; }
            .ship-form .form-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <header class="header">
        <a href="factory.html" class="btn-back">← 返回作业流程</a>
        <span class="header-title">订单处理</span>
    </header>

    <div class="layout">
        <nav class="sidebar">
            <ul class="sidebar-nav">
                <li data-tab="process" class="active">作业流程</li>
                <li data-tab="tracking">快递进度</li>
            </ul>
        </nav>

        <div class="main">
            <div class="tab-content active" id="tab-process"></div>
            <div class="tab-content" id="tab-tracking"></div>
        </div>
    </div>

    <div class="merge-overlay" id="mergeOverlay">
        <div class="merge-dialog" id="mergeDialog"></div>
    </div>

    <script src="../shared/pocketbase.umd.js"></script>
    <script type="module">
        import { auth, db, getCurrentUser, doc, getDoc, updateDoc, collection, getDocs, query, orderBy, where, auditLog, getAuditLogs } from "../shared/pocketbase-init.js";

        const user = await getCurrentUser();
        if (!user) { window.location.href = '../auth/login.html'; throw new Error('未登录'); }

        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('id');
        if (!orderId) { document.getElementById('tab-process').innerHTML = '<p style="text-align:center;padding:60px;color:#999">缺少订单ID</p>'; throw new Error('缺少订单ID'); }

        const DEFAULT_STEPS = ['作图', '厂内工作', '包装', '发货'];

        let order = null;
        let allCustomerQuotes = [];
        try {
            const snap = await getDoc(doc(db, 'users', user.id, 'quotes', orderId));
            if (!snap.exists()) {
                document.getElementById('tab-process').innerHTML = '<p style="text-align:center;padding:60px;color:#999">订单不存在</p>';
                throw new Error('订单不存在');
            }
            order = { id: snap.id, ...snap.data() };
        } catch (e) {
            console.error('加载订单失败:', e);
            if (!order) {
                document.getElementById('tab-process').innerHTML = '<p style="text-align:center;padding:60px;color:#dc2626">加载失败，请刷新重试</p>';
                throw e;
            }
        }

        if (!order.process || !order.process.steps || order.process.steps.length === 0) {
            order.process = { steps: DEFAULT_STEPS.map(name => ({ name, done: false })), confirmed: true };
            if (!order.processPublished) {
                updateDoc(doc(db, 'users', user.id, 'quotes', orderId), {
                    process: order.process,
                    processPublished: true,
                    status: 'in_production'
                });
                order.processPublished = true;
                const oldStatus = order.status;
                order.status = 'in_production';
                if (order.publishedTo) {
                    const clientRecordId = order.publishedToRecordId || orderId;
                    updateDoc(doc(db, 'users', order.publishedTo, 'quotes', clientRecordId), {
                        process: order.process,
                        status: 'in_production'
                    }).catch(() => {});
                }
                auditLog(orderId, 'status_change', '状态', oldStatus, 'in_production');
            } else {
                await updateDoc(doc(db, 'users', user.id, 'quotes', orderId), { process: order.process });
            }
        }

        let customerPayment = null;
        if (order.publishedTo) {
            try {
                const cpSnap = await getDoc(doc(db, 'users', order.publishedTo, 'clientProfiles', order.publishedTo));
                if (cpSnap.exists()) {
                    customerPayment = cpSnap.data();
                }
            } catch (e) { /* ignore */ }
        }

        const custName = order.customerName;
        if (custName) {
            try {
                const ref = collection(db, 'users', user.id, 'quotes');
                const q = query(ref, orderBy('createdAt', 'desc'));
                const snap = await getDocs(q);
                snap.forEach(d => {
                    const data = d.data();
                    if (data.customerName === custName && d.id !== orderId &&
                        (data.status === 'confirmed' || data.status === 'in_production' || data.status === 'completed')) {
                        allCustomerQuotes.push({ id: d.id, ...data });
                    }
                });
            } catch (e) { console.error('加载客户订单失败:', e); }
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        function calcProgress(proc, status) {
            if (status === 'completed') return 100;
            if (!proc || !proc.steps || proc.steps.length === 0) return 0;
            const total = proc.steps.length;
            const done = proc.steps.filter(s => s.done).length;
            return total > 0 ? Math.round(done / total * 100) : 0;
        }

        async function saveProcess() {
            try {
                await updateDoc(doc(db, 'users', user.id, 'quotes', orderId), { process: order.process });
                if (order.publishedTo && order.processPublished) {
                    const clientRecordId2 = order.publishedToRecordId || orderId;
                    updateDoc(doc(db, 'users', order.publishedTo, 'quotes', clientRecordId2), { process: order.process }).catch(() => {});
                }
            } catch (e) { console.error('保存失败:', e); alert('保存失败'); }
        }

        window.collectRemainder = async function() {
            const rmAmt = order.remainderAmount || 0;
            const btn = document.getElementById('btnCollectRemainder');
            if (!confirm('确认向客户催收尾款 $' + rmAmt.toFixed(2) + '？\n\n小铃铛将通知客户支付尾款。')) return;
            if (btn) { btn.disabled = true; btn.textContent = '推送中...'; }
            try {
                const { addDoc, collection, serverTimestamp } = await import("../shared/pocketbase-init.js");
                await addDoc(collection(db, 'notifications'), {
                    clientUid: order.publishedTo || '',
                    type: 'bill',
                    title: '尾款待支付',
                    body: '您的订单 ' + (order.quoteNumber || '') + ' 厂内作业即将完成，请尽快支付尾款 $' + rmAmt.toFixed(2) + ' 以便发货。',
                    read: false,
                    createdAt: serverTimestamp(),
                    link: 'prepaid-bills.html'
                });
                if (btn) { btn.textContent = '已推送 ✓'; btn.style.background = '#16a34a'; }
                setTimeout(() => {
                    if (btn) { btn.disabled = false; btn.textContent = '收尾款'; btn.style.background = '#f59e0b'; }
                }, 2000);
            } catch (e) {
                alert('推送失败: ' + (e.message || '未知错误'));
                if (btn) { btn.disabled = false; btn.textContent = '收尾款'; }
            }
        };

        function renderProcessTab() {
            const o = order;
            const proc = o.process;
            const pct = calcProgress(proc, o.status);
            const date = o.createdAt ? new Date(o.createdAt).toLocaleDateString('zh-CN') : '-';
            const statusLabels = { confirmed:'已确认', in_production:'生产中', completed:'已完成' };
            const st = o.status || 'in_production';

            let html = '';

            // Payment method & status
            const pm = customerPayment ? customerPayment.paymentMethod : null;
            const paid = o.paymentStatus === 'paid';
            const pmLabels = { monthly: '月付', credit: '信用额度', pay_before_ship: '款到发货', prepaid: '预付款', full: '全款' };
            const depositPaid = o.depositPaid;
            const remainderPaid = o.remainderPaid;
            const blockProcess = (pm === 'prepaid' && !depositPaid) || (pm === 'full' && !depositPaid);
            const blockShip = (pm === 'pay_before_ship' && !paid && st !== 'completed') || (pm === 'prepaid' && depositPaid && !remainderPaid);

            html += '<div class="detail-header-block">';
            html += '<div class="quote-num">报价编号<br><span>' + esc(o.quoteNumber || '-') + '</span></div>';
            html += '<div class="meta">';
            html += '<span class="status-badge status-' + st + '">' + (statusLabels[st] || '生产中') + '</span>';
            html += '<span class="section-badge badge-published">已发布</span>';
            if (pm) {
                html += '<span class="payment-tag ' + pm + '">' + (pmLabels[pm] || pm) + '</span>';
                html += '<span class="payment-status ' + (paid ? 'paid' : 'unpaid') + '">' + (paid ? '已收款' : '待收款') + '</span>';
            }
            html += '<span>' + date + '</span>';

            // Prepaid: "收尾款" button when first 3 steps done
            if (pm === 'prepaid' && depositPaid && !remainderPaid) {
                const first3Done = proc.steps.slice(0, 3).every(s => s.done);

        async function fetchTrackingFromAPI(tn, carrier) {
            // Call PocketBase pb_hooks proxy → 17track API (server-side, no CORS issue)
            const apiUrl = 'http://127.0.0.1:8090/api/track?type=' + encodeURIComponent(carrier || 'dhl') + '&postid=' + encodeURIComponent(tn);
            try {
                const resp = await fetch(apiUrl);
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const data = await resp.json();
                // 17track v2.4: { code:0, data:{ accepted:[{ track_info:{ latest_status, tracking:{ providers:[{ events }] } } }] } }
                if (data.code === 0 && data.data && data.data.accepted && data.data.accepted.length > 0) {
                    const ti = data.data.accepted[0].track_info;
                    if (!ti) return { status: 'notfound', statusText: '未找到', estimatedDelivery: '', origin: '', destination: '', events: [], lastUpdated: new Date().toISOString() };
                    const events = (ti.tracking && ti.tracking.providers && ti.tracking.providers[0] && ti.tracking.providers[0].events || []).map(function(d) {
                        return { time: d.time_iso || '', location: d.location || '', description: d.description || '' };
                    });
                    const statusMap = { InfoReceived:'info_received', InTransit:'in_transit', OutForDelivery:'out_for_delivery', Delivered:'delivered', Exception:'exception' };
                    const statusTextMap = { InfoReceived:'已收件', InTransit:'运输中', OutForDelivery:'派送中', Delivered:'已签收', Exception:'异常', Returning:'退回中', Returned:'已退回' };
                    const mainStatus = ti.latest_status ? ti.latest_status.status : 'pending';
                    return {
                        status: statusMap[mainStatus] || 'pending',
                        statusText: statusTextMap[mainStatus] || mainStatus || '运输中',
                        estimatedDelivery: '',
                        origin: (ti.shipping_info && ti.shipping_info.shipper_address && ti.shipping_info.shipper_address.city) || '',
                        destination: (ti.shipping_info && ti.shipping_info.recipient_address && ti.shipping_info.recipient_address.city) || '',
                        events: events,
                        lastUpdated: new Date().toISOString()
                    };
                }
                if (data.code !== 0 && data.msg) {
                    console.warn('17track error:', data.code, data.msg);
                }
            } catch (e) { console.warn('物流查询失败，可稍后刷新', e); }
            return { status: 'pending', statusText: '等待查询', estimatedDelivery: '', origin: '', destination: '', events: [], lastUpdated: new Date().toISOString() };
        }

        async function refreshTracking(shipId) {
            if (!order.shipments) return;
            const ship = order.shipments.find(s => s.id === shipId);
            if (!ship) return;
            const td = await fetchTrackingFromAPI(ship.trackingNumber, ship.carrier);
            ship.trackingData = td;
            const mergedIds = (ship.mergedOrderIds) ? ship.mergedOrderIds : [];
            const allOrderIds = [orderId, ...mergedIds];
            for (const oid of allOrderIds) {
                const oref = doc(db, 'users', user.id, 'quotes', oid);
                const osnap = await getDoc(oref);
                if (osnap.exists()) {
                    const existing = osnap.data().shipments || [];
                    const idx = existing.findIndex(s => s.id === shipId);
                    if (idx >= 0) { existing[idx].trackingData = td; await updateDoc(oref, { shipments: existing }); }
                }
            }
            renderTrackingTab();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.sidebar-nav li').forEach(l => l.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            const li = document.querySelector('.sidebar-nav li[data-tab="' + tabName + '"]');
            if (li) li.classList.add('active');
            document.getElementById('tab-' + tabName).classList.add('active');
            if (tabName === 'tracking') renderTrackingTab();
        }

        document.querySelectorAll('.sidebar-nav li').forEach(li => {
            li.addEventListener('click', function() { switchTab(this.dataset.tab); });
        });

        function startTrackingPolling() {
            setInterval(async () => {
                if (!order.shipments || order.shipments.length === 0) return;
                let changed = false;
                for (const ship of order.shipments) {
                    const data = await fetchTrackingFromAPI(ship.trackingNumber, ship.carrier);
                    if (data.status !== (ship.trackingData && ship.trackingData.status)) {
                        ship.trackingData = data;
                        changed = true;
                    }
                }
                if (changed) {
                    const allMergedIds = new Set();
                    order.shipments.forEach(s => { if (s.mergedOrderIds) s.mergedOrderIds.forEach(id => allMergedIds.add(id)); });
                    const allOrderIds = [orderId, ...Array.from(allMergedIds)];
                    for (const oid of allOrderIds) {
                        await updateDoc(doc(db, 'users', user.id, 'quotes', oid), { shipments: order.shipments });
                    }
                    renderTrackingTab();
                }
            }, 30 * 60 * 1000);
        }

        renderProcessTab();
        renderTrackingTab();
        startTrackingPolling();
    </script>
</body>
